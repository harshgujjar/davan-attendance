<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Davan WA Sender">
<title>Davan WA Bulk Sender — Mobile</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0f172a;
    --surface: #1e293b;
    --border:  #334155;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --green:   #22c55e;
    --amber:   #f59e0b;
    --red:     #ef4444;
    --blue:    #38bdf8;
    --wa:      #25d366;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-title { font-size: 15px; font-weight: 700; color: var(--wa); }
  .topbar-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .topbar-badge {
    background: var(--green); color: #000;
    font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 12px;
  }

  /* ── Progress bar ── */
  .progress-section {
    background: var(--surface);
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .progress-row {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 8px;
  }
  .progress-row strong { color: var(--text); }
  .bar-bg { background: var(--bg); border-radius: 4px; height: 8px; }
  .bar-fill {
    background: var(--green); height: 8px; border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* ── Student card ── */
  .student-section { padding: 16px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card.active   { border-color: var(--wa); }
  .card.sent     { border-color: var(--green); opacity: 0.6; }
  .card.skipped  { border-color: var(--muted); opacity: 0.5; }
  .card.upcoming { opacity: 0.4; }

  .card-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 10px;
  }
  .card-num {
    font-size: 10px; font-family: monospace;
    color: var(--muted); min-width: 24px;
  }
  .card-name  { font-size: 14px; font-weight: 700; flex: 1; }
  .card-class { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .card-phone { font-size: 11px; color: var(--blue); font-family: monospace; margin-top: 2px; }
  .card-pct   {
    font-size: 13px; font-weight: 700;
    padding: 3px 10px; border-radius: 8px;
    background: rgba(239,68,68,0.15); color: var(--red);
  }

  .msg-preview {
    background: var(--bg);
    border-radius: 8px; padding: 10px;
    font-size: 11px; color: var(--muted);
    line-height: 1.6; margin-bottom: 12px;
    max-height: 80px; overflow: hidden;
    position: relative;
  }
  .msg-preview::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 24px;
    background: linear-gradient(transparent, var(--bg));
  }

  .btn-wa {
    display: block; width: 100%;
    background: var(--wa); color: #fff;
    border: none; border-radius: 10px;
    padding: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; text-align: center;
    text-decoration: none; margin-bottom: 8px;
    transition: opacity 0.15s;
  }
  .btn-wa:active { opacity: 0.8; }
  .btn-wa:disabled { opacity: 0.4; background: var(--muted); cursor: not-allowed; }

  .btn-sent {
    display: block; width: 100%;
    background: var(--green); color: #000;
    border: none; border-radius: 10px;
    padding: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; text-align: center;
    transition: opacity 0.15s;
    margin-bottom: 8px;
  }
  .btn-skip {
    display: block; width: 100%;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px; font-size: 12px;
    cursor: pointer; text-align: center;
    transition: opacity 0.15s;
  }

  .status-badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 12px; font-size: 11px; font-weight: 700;
  }
  .badge-sent    { background: rgba(34,197,94,0.15);  color: var(--green); }
  .badge-skipped { background: rgba(100,116,139,0.15); color: var(--muted); }
  .badge-active  { background: rgba(37,211,102,0.15);  color: var(--wa); }

  /* ── Empty / Done ── */
  .empty-state {
    text-align: center; padding: 60px 24px;
    color: var(--muted); font-size: 14px;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h2 { color: var(--text); margin-bottom: 8px; }

  .done-banner {
    background: rgba(34,197,94,0.1);
    border: 1px solid var(--green);
    border-radius: 12px; margin: 16px;
    padding: 20px; text-align: center;
  }
  .done-banner .icon { font-size: 40px; }
  .done-banner h2 { color: var(--green); margin: 8px 0 4px; }
  .done-banner p  { color: var(--muted); font-size: 12px; }

  /* ── Config screen ── */
  #config-screen { padding: 16px; }
  .config-title  { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .config-sub    { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  textarea, input, select {
    width: 100%; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 13px; font-family: inherit;
    resize: vertical;
  }
  textarea:focus, input:focus, select:focus {
    outline: none; border-color: var(--wa);
  }
  .btn-start {
    display: block; width: 100%; margin-top: 20px;
    background: var(--wa); color: #fff;
    border: none; border-radius: 10px;
    padding: 16px; font-size: 16px; font-weight: 700;
    cursor: pointer;
  }
  .paste-hint {
    font-size: 11px; color: var(--muted);
    background: var(--surface); border-radius: 8px;
    padding: 10px; margin-top: 8px; line-height: 1.6;
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  Davan WA Bulk Sender — Mobile PWA Companion
// ══════════════════════════════════════════════════════════════

const LS_KEY = 'davan_bulk_state';

let queue   = [];   // [{ name, phone, message, class, pct }]
let statuses = [];  // 'pending' | 'sent' | 'skipped'
let current = 0;    // index of active card

// ── Restore state from localStorage ──
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    if (saved && saved.queue && saved.queue.length) {
      queue    = saved.queue;
      statuses = saved.statuses || queue.map(() => 'pending');
      current  = saved.current  || 0;
      return true;
    }
  } catch (e) {}
  return false;
}

function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify({ queue, statuses, current }));
}

function clearState() {
  localStorage.removeItem(LS_KEY);
  queue = []; statuses = []; current = 0;
}

// ── URL param import (from main app) ──
function loadFromURL() {
  try {
    const params = new URLSearchParams(location.search);
    const data = params.get('data');
    if (!data) return false;
    const decoded = JSON.parse(atob(data));
    if (Array.isArray(decoded) && decoded.length) {
      queue    = decoded;
      statuses = queue.map(() => 'pending');
      current  = 0;
      saveState();
      // Clean URL so refresh doesn't re-import
      history.replaceState({}, '', location.pathname);
      return true;
    }
  } catch (e) {}
  return false;
}

// ── Phone helpers ──
function cleanPhone(raw) {
  if (!raw) return '';
  const d = String(raw).replace(/\D/g, '');
  if (d.length === 10) return '91' + d;
  if (d.length === 12 && d.startsWith('91')) return d;
  if (d.length === 11 && d.startsWith('0')) return '91' + d.slice(1);
  if (d.length >= 10) return d;
  return '';
}

function buildWALink(phone, message) {
  const p = cleanPhone(phone);
  if (!p) return null;
  const text = encodeURIComponent(message || '');
  // Android intent first, fallback to wa.me
  const isAndroid = /android/i.test(navigator.userAgent);
  if (isAndroid) {
    return `intent://send?phone=${p}&text=${text}#Intent;scheme=whatsapp;package=com.whatsapp;end`;
  }
  return `https://wa.me/${p}?text=${text}`;
}

// ── Render ──
function render() {
  const app = document.getElementById('app');

  // No data → show config screen
  if (!queue.length) {
    renderConfig(app);
    return;
  }

  const sent    = statuses.filter(s => s === 'sent').length;
  const skipped = statuses.filter(s => s === 'skipped').length;
  const done    = sent + skipped >= queue.length;
  const pct     = Math.round(((sent + skipped) / queue.length) * 100);

  let html = `
    <div class="topbar">
      <div>
        <div class="topbar-title">📨 Davan WA Sender</div>
        <div class="topbar-sub">Shortage Student Notifier · Mobile</div>
      </div>
      <div class="topbar-badge">${sent + skipped}/${queue.length}</div>
    </div>

    <div class="progress-section">
      <div class="progress-row">
        <span>Progress</span>
        <strong>${pct}% complete</strong>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-row" style="margin-top:6px;margin-bottom:0;">
        <span>✅ Sent: <strong style="color:var(--green)">${sent}</strong></span>
        <span>⏭ Skipped: <strong style="color:var(--muted)">${skipped}</strong></span>
        <span>⏳ Left: <strong>${queue.length - sent - skipped}</strong></span>
      </div>
    </div>`;

  if (done) {
    html += `
      <div class="done-banner">
        <div class="icon">🎉</div>
        <h2>All Done!</h2>
        <p>${sent} messages sent · ${skipped} skipped</p>
        <button class="btn-start" style="margin-top:16px;" onclick="resetAll()">
          🔄 Start New Session
        </button>
      </div>`;
  }

  html += `<div class="student-section">`;

  queue.forEach((s, i) => {
    const status = statuses[i] || 'pending';
    const isActive = i === current && !done;
    const waLink = buildWALink(s.phone, s.message);

    let cardClass = 'card';
    if (isActive)        cardClass += ' active';
    else if (status === 'sent')    cardClass += ' sent';
    else if (status === 'skipped') cardClass += ' skipped';
    else if (i > current)          cardClass += ' upcoming';

    html += `<div class="${cardClass}" id="card-${i}">
      <div class="card-header">
        <div class="card-num">${i + 1}.</div>
        <div style="flex:1;margin-left:8px;">
          <div class="card-name">${s.name || '—'}</div>
          <div class="card-class">${s.class || ''}</div>
          <div class="card-phone">${s.phone || 'No phone'}</div>
        </div>
        <div>`;

    if (status === 'sent')         html += `<span class="status-badge badge-sent">✅ Sent</span>`;
    else if (status === 'skipped') html += `<span class="status-badge badge-skipped">⏭ Skip</span>`;
    else if (isActive)             html += `<span class="status-badge badge-active">▶ Now</span>`;
    else if (s.pct != null)        html += `<span class="card-pct">${s.pct}%</span>`;

    html += `</div></div>`;

    if (s.message && (isActive || status === 'pending')) {
      html += `<div class="msg-preview">${s.message.replace(/\n/g,'<br>')}</div>`;
    }

    if (isActive && !done) {
      if (waLink) {
        html += `<a class="btn-wa" href="${waLink}" target="_blank" rel="noopener" onclick="onWAOpen(${i})">
          💬 Open WhatsApp
        </a>
        <button class="btn-sent" onclick="markSent(${i})">✅ Mark as Sent</button>
        <button class="btn-skip" onclick="markSkipped(${i})">⏭ Skip this student</button>`;
      } else {
        html += `<div style="color:var(--red);font-size:12px;padding:8px 0;">⚠️ No valid phone number — cannot send</div>
        <button class="btn-skip" onclick="markSkipped(${i})">⏭ Skip</button>`;
      }
    }

    html += `</div>`; // end card
  });

  html += `</div>`; // end student-section

  if (!done) {
    html += `<div style="padding:0 16px 16px;">
      <button class="btn-skip" style="color:var(--red);border-color:var(--red);" onclick="if(confirm('Stop and clear this session?'))resetAll()">
        ■ Stop &amp; Clear Session
      </button>
    </div>`;
  }

  app.innerHTML = html;

  // Scroll active card into view
  if (!done) {
    setTimeout(() => {
      const el = document.getElementById('card-' + current);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

function renderConfig(app) {
  app.innerHTML = `
    <div class="topbar">
      <div>
        <div class="topbar-title">📨 Davan WA Sender</div>
        <div class="topbar-sub">Mobile Companion · Setup</div>
      </div>
    </div>
    <div id="config-screen">
      <div style="margin-top:16px;">
        <div class="config-title">Paste Student Data</div>
        <div class="config-sub">Queue auto-loads from Davan app via Firebase. Or paste JSON manually below.</div>
      </div>
      <div id="fb-status" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <span style="color:var(--muted);">📡 Checking Firebase for latest queue…</span>
        <button onclick="refreshFromFirebase()" style="background:var(--surface2);color:var(--blue);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;">🔄 Refresh</button>
      </div>
      </div>

      <label>JSON Queue (from Davan app)</label>
      <textarea id="json-input" rows="6" placeholder='[{"name":"Rahul K","phone":"9876543210","message":"Dear...","class":"1 BCA","pct":60}]'></textarea>
      <div class="paste-hint">
        📋 In the Davan app → Notify → Bulk Send → tap <strong>"Copy for Mobile"</strong>
        then paste here. Or type student data manually.
      </div>

      <label>Or add students manually:</label>
      <div id="manual-list"></div>
      <button class="btn-skip" style="margin-top:8px;" onclick="addManual()">+ Add Student</button>

      <button class="btn-start" onclick="startFromInput()">
        ▶ Start Bulk Send
      </button>

      <div style="height:20px;"></div>
    </div>`;

  document.getElementById('manual-list').innerHTML = '';
}

let manualCount = 0;
function addManual() {
  manualCount++;
  const div = document.createElement('div');
  div.style.cssText = 'background:var(--surface);border-radius:8px;padding:12px;margin-top:8px;border:1px solid var(--border);';
  div.innerHTML = `
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">Student ${manualCount}</div>
    <input type="text" placeholder="Name" id="m-name-${manualCount}" style="margin-bottom:6px;">
    <input type="tel"  placeholder="Phone (10 digits)" id="m-phone-${manualCount}" style="margin-bottom:6px;">
    <input type="text" placeholder="Class (e.g. 1 BCA)" id="m-class-${manualCount}" style="margin-bottom:6px;">
    <textarea rows="3" placeholder="Message" id="m-msg-${manualCount}"></textarea>`;
  document.getElementById('manual-list').appendChild(div);
}

function startFromInput() {
  // Try JSON first
  const raw = (document.getElementById('json-input')?.value || '').trim();
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) {
        queue    = parsed;
        statuses = queue.map(() => 'pending');
        current  = 0;
        saveState();
        render();
        return;
      }
    } catch (e) {
      alert('Invalid JSON. Please check the format and try again.');
      return;
    }
  }

  // Try manual entries
  const manual = [];
  for (let i = 1; i <= manualCount; i++) {
    const name  = document.getElementById('m-name-' + i)?.value.trim();
    const phone = document.getElementById('m-phone-' + i)?.value.trim();
    const cls   = document.getElementById('m-class-' + i)?.value.trim();
    const msg   = document.getElementById('m-msg-' + i)?.value.trim();
    if (name || phone) manual.push({ name, phone, class: cls, message: msg });
  }

  if (!manual.length) {
    alert('Please paste JSON data or add at least one student manually.');
    return;
  }

  queue    = manual;
  statuses = queue.map(() => 'pending');
  current  = 0;
  saveState();
  render();
}

function onWAOpen(i) {
  // Auto-mark as sent after WhatsApp opens (2.5s delay for app switch)
  setTimeout(() => {
    if (statuses[i] === 'pending') {
      markSent(i);
    }
  }, 2500);
}

function markSent(i) {
  statuses[i] = 'sent';
  // Advance current to next pending
  advanceCurrent();
  saveState();
  render();
}

function markSkipped(i) {
  statuses[i] = 'skipped';
  advanceCurrent();
  saveState();
  render();
}

function advanceCurrent() {
  for (let i = current + 1; i < queue.length; i++) {
    if (statuses[i] === 'pending') {
      current = i;
      return;
    }
  }
  // All done — set current past end
  current = queue.length;
}

function resetAll() {
  clearState();
  queue = []; statuses = []; current = 0;
  render();
}

// ── Firebase config ──
const RTDB_URL = 'https://davan-attendance-2026-default-rtdb.asia-southeast1.firebasedatabase.app';

// ── Fetch queue from Firebase ──
async function loadFromFirebase() {
  try {
    const res = await fetch(RTDB_URL + '/bulk_mobile/queue.json');
    if (!res.ok) return false;
    const data = await res.json();
    if (!data || !data.queue || !data.queue.length) return false;

    // Check if this is newer than what we have saved
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    if (saved && saved.pushedAt === data.pushedAt && saved.queue?.length) {
      // Same session already loaded — don't overwrite progress
      return false;
    }

    queue    = data.queue;
    statuses = queue.map(() => 'pending');
    current  = 0;
    saveState(data.pushedAt);
    showToast('✅ Queue loaded from Davan app — ' + queue.length + ' students', 'green');
    return true;
  } catch (e) {
    console.warn('[Mobile] Firebase fetch failed:', e);
    return false;
  }
}

// ── Toast helper ──
function showToast(msg, color='blue') {
  const colors = { green:'#22c55e', blue:'#38bdf8', red:'#ef4444', amber:'#f59e0b' };
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:${colors[color]||colors.blue};color:#000;padding:10px 20px;
    border-radius:20px;font-size:13px;font-weight:700;z-index:9999;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);max-width:90vw;text-align:center;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Save with pushedAt so we can detect new sessions ──
function saveState(pushedAt) {
  const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  localStorage.setItem(LS_KEY, JSON.stringify({
    queue, statuses, current,
    pushedAt: pushedAt || saved.pushedAt || null
  }));
}

// ── Manual refresh from Firebase ──
async function refreshFromFirebase() {
  const statusEl = document.getElementById('fb-status');
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--muted);">📡 Checking Firebase…</span>';
  // Clear saved pushedAt to force reload
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    saved.pushedAt = null;
    localStorage.setItem(LS_KEY, JSON.stringify(saved));
  } catch(e) {}
  const ok = await loadFromFirebase();
  if (ok) { render(); }
  else {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--amber);">⚠️ No queue found in Firebase yet. Push from desktop first.</span><button onclick="refreshFromFirebase()" style="background:var(--surface2);color:var(--blue);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;">🔄 Retry</button>';
    showToast('No queue found — push from desktop first', 'amber');
  }
}

// ── Boot ──
(async function init() {
  // Priority: URL param > Firebase > localStorage
  if (loadFromURL()) {
    render();
    return;
  }

  // Try Firebase first
  const fromFB = await loadFromFirebase();
  if (!fromFB) {
    // Fall back to localStorage
    loadState();
  }
  render();
})();
</script>
</body>
</html>
