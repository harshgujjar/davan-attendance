    <button class="btn btn-full" style="margin-bottom:11px" onclick="addBook()">➕ Add New Book</button>

      ${ready.map(([id,r])=>{
        const t=STATE.titles[r.tid]||{name:'(unknown)'};

          <div style="min-width:0"><div style="font-size:12px;font-weight:700">${esc(r.name)} <span class="badge badge-sm badge-unknown">${esc(r.uid)}</span></div>
          <div style="font-size:10px;color:var(--muted)">${esc(t.name)}</div>
          <div class="tok" style="font-size:11px;padding:3px 6px;margin-top:4px;display:inline-block">${esc(id)}</div>
          <span class="badge badge-sm ${d<=0?'badge-critical':'badge-warning'}" style="margin-left:5px">${d<=0?'expired':d+'d left'}</span>
          ${r.appt?`<div class="mono" style="font-size:9px;color:var(--ok);margin-top:3px">📅 ${esc(apptLine(r.appt))}</div>`:''}</div></div>
          <div style="text-align:right;flex-shrink:0">
            <button class="btn btn-sm" onclick="doIssue('${id}')">Issue</button>
            <button class="btn btn-sm btn-ghost" style="margin-top:4px;display:block;width:100%" onclick="setAppt('${id}')">${r.appt?'Edit slot':'📅 Slot'}</button>
            <button class="btn btn-sm btn-danger" style="margin-top:4px;display:block;width:100%" onclick="doReject('${id}')">Reject</button></div></div>`;
      }).join('')||'<div class="empty">NOBODY WAITING</div>'}</div>
    <div class="card"><h3>⏳ QUEUE <span class="badge badge-warning badge-sm">${wait.length}</span></h3>
      ${wait.map(([id,r])=>{
        const t=STATE.titles[r.tid]||{name:'(unknown)'};
        return `<div class="rw"><div style="display:flex;gap:9px;align-items:center;min-width:0">${avatar(r.uid,r.name)}
          <div style="min-width:0"><div style="font-size:12px;font-weight:700">${esc(r.name)} <span class="badge badge-sm badge-unknown">${esc(r.uid)}</span>${r.kind==='staff'?' <span class="badge badge-sm badge-info">staff</span>':''}</div>
          <div style="font-size:10px;color:var(--muted)">${esc(t.name)}</div></div></div>
          <span class="badge badge-warning badge-sm">#${qposOf(r2,id,r.tid)}</span></div>`;
      }).join('')||'<div class="empty">QUEUE EMPTY</div>'}</div>
    <div class="card"><h3>🔧 TOOLS</h3>
      <button class="btn btn-full btn-ghost" style="margin-bottom:7px" onclick="openMerge()">🔗 Merge duplicate books</button>
      <button class="btn btn-full btn-ghost" style="margin-bottom:7px" onclick="openTagReview()">🏷️ Tag review</button>
      <button class="btn btn-full btn-ghost" onclick="exportLabels()">🖨️ Accession labels &amp; register numbers</button></div>`;
}
/* Issue: librarian picks the physical copy. We verify the accession number exists,
   belongs to this title, and is actually available — never trust the typed value. */
async function doIssue(reqId){
  const reqs=await getRequests();
  const r=reqs[reqId]; if(!r) return toast('Request not found',true);
  const t=STATE.titles[r.tid]||{name:''};
  const free=await d2get('library/copies');
  const cand=Object.entries(free||{}).filter(([a,c])=>c.titleId===r.tid&&c.status==='available');
  sheet(`<div class="page-title" style="font-size:20px">ISSUE BOOK</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:11px">${esc(t.name)} → <b>${esc(r.name)}</b> (${esc(r.uid)})</div>
    <div class="fld"><label>Accession number</label>
      <select id="accSel" onchange="syncLocalBox()">${cand.length?cand.map(([a,c])=>`<option value="${esc(a)}" data-la="${esc(c.localAcc||'')}">${esc(a)}${c.localAcc?'  ·  reg '+esc(c.localAcc):''}</option>`).join(''):'<option value="">— no free copies —</option>'}</select></div>
    <div class="fld"><label>Your register number (optional)</label><input id="accLocal" placeholder="as written in the book"></div>
    <div class="mono" style="font-size:9.5px;color:var(--muted);margin-bottom:11px">${cand.length} copy/copies available. Pick the physical book you're handing over. If this copy has no register number yet, type it here — it saves against the copy permanently.</div>
    <div id="isErr"></div>
    <button class="btn btn-full" id="isBtn" ${cand.length?'':'disabled'} onclick="confirmIssue('${reqId}')">Confirm issue</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Cancel</button>`);
}
async function confirmIssue(reqId){
  const acc=(document.getElementById('accSel')||{}).value;
  if(!acc) return;
  setBusy('isBtn',true,'Issuing…');
  try{
    const reqs=await getRequests(true); const r=reqs[reqId];
    if(!r||r.st==='collected'){ showErr('isErr','This request was already processed.'); return; }
    const c=await d2get('library/copies/'+acc);
    if(!c) { showErr('isErr','Accession number not found.'); return; }
    if(c.titleId!==r.tid){ showErr('isErr','That copy belongs to a different title.'); return; }
    if(c.status!=='available'){ showErr('isErr','That copy is not available ('+c.status+').'); return; }
    const staffLoan = r.kind==='staff';
    const iid=await bump('library/counters/issueSeq');
    const issueId='ISS'+String(iid).padStart(6,'0');
    const ay=STATE.cfg.currentAY||'2025-26';
    const sem=r.sem||'0';
    const rec={ urn:r.uid, name:r.name, tid:r.tid, acc, out:Date.now(),
      due: staffLoan?null:dueDateFrom(Date.now(),STATE.cfg.loanDays||7), ret:null,
      ay, sem, cls:r.cls||'', fine:0, kind:r.kind, byStaff:STATE.user.name, reqId };
    const patch={};
    const la=((document.getElementById('accLocal')||{}).value||'').trim();
    if(la){ patch['library/copies/'+acc+'/localAcc']=la; rec.localAcc=la; }
    else if(c.localAcc) rec.localAcc=c.localAcc;
    patch['library/issues/'+issueId]=rec;
    patch['library/copies/'+acc+'/status']='issued';
    patch['library/copies/'+acc+'/currentIssueId']=issueId;
    patch['library/requests/'+reqId+'/st']='collected';
    patch['library/byUrn/'+r.uid+'/'+ay+'/'+sem+'/'+issueId]=true;
    await d2update(patch);
    _reqCache.at=0; _issCache.at=0;
    closeSheet(); toast('Issued to '+r.name+' · '+acc); render();
  }catch(e){ showErr('isErr','Failed: '+e.message); }
  finally{ setBusy('isBtn',false,'Confirm issue'); }
}
async function doReject(reqId){
  if(!confirm('Reject this request and release the copy?')) return;
  try{
    const reqs=await getRequests(); const r=reqs[reqId];
    const patch={}; patch['library/requests/'+reqId+'/st']='rejected';
    patch['library/requests/'+reqId+'/byStaff']=STATE.user.name;
    /* released copy goes to the next in queue, else back on the shelf */
    const q=queueFor(reqs,r.tid);
    if(q.length){ patch['library/requests/'+q[0][0]+'/st']='ready';
      patch['library/requests/'+q[0][0]+'/exp']=pickupDateFrom(STATE.cfg.pickupDays||2); }
    else patch['library/avail/'+r.tid]=availOf(r.tid)+1;
    await d2update(patch); _reqCache.at=0; await loadAvail(true);
    toast(q.length?'Rejected → passed to #1 in queue':'Rejected — copy released'); render();
  }catch(e){ toast('Failed: '+e.message,true); }
}
/* Return: copy frees, fine locks in, and the copy auto-holds for #1 in queue
   rather than going back to the shelf (Koha behaviour). */
/* v1.36: opt = {collected, fineDue, reason} from returnSheet(). Absent = the
   old behaviour (settle at the full computed fine). We record fineDue (what the
   rules said) ALONGSIDE fine (what was actually collected) — overwriting fine
   alone would erase the evidence a discount happened and make the Reports
   "collected" total silently disagree with the rules. */
async function doReturn(issueId,opt){
  try{
    const iss=await getIssues(true); const x=iss[issueId];
    if(!x||x.ret) return toast(x&&x.outcome?('Already closed as '+x.outcome):'Already returned',true);
    const computed=x.due?fineOf(x.due):0;
    const f=opt?Math.max(0,Math.min(computed,Number(opt.collected)||0)):computed;
    const reqs=await getRequests(true);
    const q=queueFor(reqs,x.tid);
    const patch={};
    patch['library/issues/'+issueId+'/ret']=Date.now();
    patch['library/issues/'+issueId+'/fine']=f;
    patch['library/issues/'+issueId+'/retBy']=STATE.user.name;
    if(computed>0){
      patch['library/issues/'+issueId+'/fineDue']=computed;
      if(f<computed){
        patch['library/issues/'+issueId+'/waived']=computed-f;
        patch['library/issues/'+issueId+'/waiveReason']=(opt&&opt.reason)||'';
        patch['library/issues/'+issueId+'/waivedBy']=STATE.user.name;
      }
    }
    patch['library/copies/'+x.acc+'/status']='available';
    patch['library/copies/'+x.acc+'/currentIssueId']=null;
    if(q.length){
      patch['library/requests/'+q[0][0]+'/st']='ready';
      patch['library/requests/'+q[0][0]+'/exp']=pickupDateFrom(STATE.cfg.pickupDays||2);
    } else {
      patch['library/avail/'+x.tid]=availOf(x.tid)+1;
    }
    await d2update(patch);
    _issCache.at=0; _reqCache.at=0; await loadAvail(true);
    const wv=(x.due?fineOf(x.due):0)-f;
    toast(q.length?('Returned → auto-held for #1 '+q[0][1].name)
      :(f?('Returned · collected ₹'+f+(wv>0?' · waived ₹'+wv:''))
         :(wv>0?'Returned · fine ₹'+wv+' waived':'Returned on time')));
    render();
  }catch(e){ toast('Failed: '+e.message,true); }
}

/* ═══ §RETURN+ (v1.36) — waiver / undo / renew ═══════════════════════════════
   doReturn() fired instantly with no confirmation and settled the fine at the
   full computed amount, with no way to discount it and no way back if the
   button was hit by mistake. Three related additions, all sharing one rule:
   a return is a FINANCIAL + CUSTODY event, so every variation is written to
   the record with who did it and why — never silently.

   WAIVER — returnSheet() replaces the bare doReturn() call whenever a fine is
   owed: shows the computed amount and lets the librarian collect it in full,
   part, or waive it entirely with a reason. We store BOTH numbers: fineDue
   (what the rules said) and fine (what was actually taken). Overwriting fine
   alone would erase the evidence that a discount ever happened, and the
   Reports "collected" totals would silently disagree with the rules.

   UNDO — undoReturn() reverses a return within a window. It is NOT allowed
   once the freed copy has been promised to the next student in the queue:
   doReturn() promotes q[0] to 'ready', and un-returning after that would take
   back a book someone has already been told to collect. In that case we say so
   rather than quietly breaking the promise.

   RENEW — doRenew() closes the current loan (ret + renewedTo) and opens a
   fresh one on the SAME copy, so the register reads exactly as the librarian
   asked: returned and re-issued, without the book physically moving. Blocked
   when anyone is waiting — a renewal must not jump a queue. */
const MAX_RENEWALS=2;

function returnSheet(issueId){
  const x=(_issCache.v||{})[issueId]; if(!x) return;
  const t=STATE.titles[x.tid]||{name:'(unknown)'};
  const due=x.due?fineOf(x.due):0;
  if(!due) return doReturn(issueId);        /* nothing owed — no sheet needed */
  const late=-daysLeft(x.due);
  sheet(`<div class="page-title" style="font-size:19px">RETURN &amp; FINE</div>
    <div style="font-size:13px;font-weight:700">${esc(t.name)}</div>
    <div class="mono" style="font-size:10px;color:var(--muted);margin-bottom:10px">${esc(x.name)} · ${esc(x.urn)} · ${esc(x.acc)}</div>
    <div class="alert alert-err" style="font-size:11.5px">${late} day${late>1?'s':''} late · fine due <b>₹${due}</b> (₹${STATE.cfg.finePerDay||5}/day)</div>
    <div class="fld"><label>Amount collected ₹</label>
      <input id="rt-amt" type="number" min="0" max="${due}" value="${due}" oninput="rtSync()"></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin:-4px 0 9px">
      <button type="button" class="cc" onclick="rtSet(${due})">Full ₹${due}</button>
      <button type="button" class="cc" onclick="rtSet(${Math.round(due/2)})">Half ₹${Math.round(due/2)}</button>
      <button type="button" class="cc" onclick="rtSet(0)">Waive all</button></div>
    <div id="rt-wv" style="display:none">
      <div class="fld"><label>Reason for discount / waiver *</label>
        <input id="rt-rsn" placeholder="e.g. book was recalled late, medical leave"></div></div>
    <div id="rtErr"></div>
    <button class="btn btn-full" id="rtBtn" onclick="confirmReturn('${issueId}',${due})">Confirm return</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Cancel</button>`);
  rtSync();
}
function rtSet(v){ const e=document.getElementById('rt-amt'); if(e){ e.value=v; rtSync(); } }
function rtSync(){
  const amt=Number((document.getElementById('rt-amt')||{}).value||0);
  const full=Number((document.getElementById('rt-amt')||{}).max||0);
  const wv=document.getElementById('rt-wv');
  if(wv) wv.style.display=(amt<full)?'block':'none';   /* reason only when discounting */
}
async function confirmReturn(issueId,due){
  const amt=Math.max(0,Math.min(due,Number((document.getElementById('rt-amt')||{}).value||0)));
  const rsn=((document.getElementById('rt-rsn')||{}).value||'').trim();
  if(amt<due && !rsn) return showErr('rtErr','A reason is required to discount or waive a fine.');
  setBusy('rtBtn',true,'Saving…');
  try{ await doReturn(issueId,{collected:amt,fineDue:due,reason:rsn}); closeSheet(); }
  catch(e){ showErr('rtErr','Failed: '+e.message); }
  finally{ setBusy('rtBtn',false,'Confirm return'); }
}

/* Reversal window — long enough for "wrong row" but not so long that it
   becomes a way to rewrite settled history. */
const UNDO_MINS=30;
function canUndo(x){
  return x.ret && (Date.now()-x.ret) < UNDO_MINS*60000;
}
async function undoReturn(issueId){
  try{
    const iss=await getIssues(true); const x=iss[issueId];
    if(!x||!x.ret) return toast('Not a returned loan',true);
    if(x.outcome) return toast('Closed as '+x.outcome+' — restore the copy from Edit Book instead',true);
    if(!canUndo(x)) return toast('Undo window ('+UNDO_MINS+' min) has passed',true);
    /* Refuse if the freed copy was promised onward — see §RETURN+ note. */
    const c=await d2get('library/copies/'+x.acc);
    if(c&&c.status!=='available') return toast('That copy has already been re-issued',true);
    const reqs=await getRequests(true);
    const promised=Object.entries(reqs||{}).find(([i,r])=>r.tid===x.tid&&r.st==='ready'&&r.exp&&r.exp>Date.now());
    if(promised) return toast('Copy already held for '+promised[1].name+' — cannot undo',true);
    const patch={};
    patch['library/issues/'+issueId+'/ret']=null;
    patch['library/issues/'+issueId+'/retBy']=null;
    patch['library/issues/'+issueId+'/fine']=0;
    patch['library/issues/'+issueId+'/fineDue']=null;
    patch['library/issues/'+issueId+'/waiveReason']=null;
    patch['library/issues/'+issueId+'/undoneBy']=STATE.user.name;
    patch['library/issues/'+issueId+'/undoneAt']=Date.now();
    patch['library/copies/'+x.acc+'/status']='issued';
    patch['library/copies/'+x.acc+'/currentIssueId']=issueId;
    patch['library/avail/'+x.tid]=Math.max(0,availOf(x.tid)-1);
    await d2update(patch);
    _issCache.at=0; _reqCache.at=0; await loadAvail(true);
    toast('Return reversed — book is back with '+x.name); render();
  }catch(e){ toast('Failed: '+e.message,true); }
}

async function doRenew(issueId){
  try{
    const iss=await getIssues(true); const x=iss[issueId];
    if(!x||x.ret) return toast('Not an open loan',true);
    if(!x.due) return toast('Staff loans have no due date to extend',true);
    const n=(x.renewCount||0);
    if(n>=MAX_RENEWALS) return toast('Already renewed '+n+' times (max '+MAX_RENEWALS+')',true);
    const reqs=await getRequests(true);
    if(queueFor(reqs,x.tid).length) return toast('Someone is waiting for this title — cannot renew',true);
    const t=STATE.titles[x.tid]||{name:'(unknown)'};
    const f=fineOf(x.due);
    if(f) return toast('Fine ₹'+f+' outstanding — settle via Return first',true);
    const days=STATE.cfg.loanDays||7;
    const newDue=dueDateFrom(Date.now(),days);
    if(!confirm('Renew "'+t.name+'" for '+x.name+'?\n\nThe register will show this copy returned and re-issued today.\nNew due date: '+dueLong(newDue))) return;
    /* Close the old loan and open a new one on the SAME copy — the register
       reads returned + re-issued, exactly as asked, book never moves. */
    const nid='I'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    const rec={ urn:x.urn, name:x.name, tid:x.tid, acc:x.acc, out:Date.now(),
      due:newDue, ret:null, ay:STATE.cfg.currentAY||x.ay, sem:x.sem, cls:x.cls||'',
      fine:0, kind:x.kind, byStaff:STATE.user.name, reqId:x.reqId||null,
      renewCount:n+1, renewedFrom:issueId };
    if(x.localAcc) rec.localAcc=x.localAcc;
    const patch={};
    patch['library/issues/'+issueId+'/ret']=Date.now();
    patch['library/issues/'+issueId+'/retBy']=STATE.user.name;
    patch['library/issues/'+issueId+'/fine']=0;
    patch['library/issues/'+issueId+'/renewedTo']=nid;
    patch['library/issues/'+nid]=rec;
    /* Copy stays 'issued' throughout and avail never moves — the book did not
       come back to the shelf, so pretending it did would let it be double-issued. */
    patch['library/copies/'+x.acc+'/status']='issued';
    patch['library/copies/'+x.acc+'/currentIssueId']=nid;
    await d2update(patch);
    _issCache.at=0; _reqCache.at=0; await loadAvail(true);
    toast('Renewed → due '+dueLong(newDue)); render();
  }catch(e){ toast('Failed: '+e.message,true); }
}


/* ═══ §LOST (v1.37) — lost / damaged close-out ══════════════════════════════
   Until now an open loan had exactly two endings: returned, or renewed. A book
   that is never coming back had neither — the librarian's only options were to
   leave it open forever (the fine clock ticking up toward an amount nobody
   will ever collect, and the student permanently blocked from borrowing), or
   to fake a Return, which puts a copy that does not exist back on the shelf
   and lets it be issued to someone else.

   retireCopy() already existed in Edit Book but only renders when
   status==='available' — i.e. it could retire a copy sitting on the shelf, but
   never the one actually out with a student, which is the case that matters.

   A lost close-out settles THREE things at once, which is why it is one sheet:
     · the LOAN  — closed with outcome:'lost', ret stamped so it stops being
                   open (the student is unblocked and the fine clock stops).
     · the MONEY — accrued fine to date is optional (usually waived — chasing a
                   late fee on top of a replacement charge is punitive), plus a
                   replacement charge. Both are recorded separately from an
                   ordinary fine so Reports never mixes "late fee" revenue with
                   "replacement cost" recovery.
     · the COPY  — status 'lost'/'damaged', NOT 'available'. avail decrements.
                   totalCopies is deliberately NOT touched: it is derived from
                   real copy records (see ADD/EDIT note), each with a real
                   accession number, and the copy still physically exists as a
                   record — it is simply out of circulation. Dropping it would
                   orphan the accession number and misreport the register.
   Reversible via restoreCopy() if the book turns up (the accession is intact,
   which is exactly why we kept it). */
function lostSheet(issueId){
  const x=(_issCache.v||{})[issueId]; if(!x) return;
  const t=STATE.titles[x.tid]||{name:'(unknown)'};
  const accrued=x.due?fineOf(x.due):0;
  const dflt=Number(STATE.cfg.replaceCost||0)||'';
  sheet(`<div class="page-title" style="font-size:19px">LOST / DAMAGED</div>
    <div style="font-size:13px;font-weight:700">${esc(t.name)}</div>
    <div class="mono" style="font-size:10px;color:var(--muted);margin-bottom:10px">${esc(x.name)} · ${esc(x.urn)} · ${esc(x.acc)}</div>
    <div class="alert" style="font-size:11px">This closes the loan and takes copy <b>${esc(x.acc)}</b> out of circulation. The accession number is kept, so it can be restored from Edit Book if the book turns up.</div>
    <div class="fld"><label>Outcome</label>
      <select id="ls-st"><option value="lost">Lost — not coming back</option><option value="damaged">Damaged — unusable</option></select></div>
    <div class="fld"><label>Replacement charge ₹</label>
      <input id="ls-cost" type="number" min="0" value="${dflt}" placeholder="0"></div>
    ${accrued?`<div class="fld"><label>Late fine already accrued: ₹${accrued}</label>
      <select id="ls-fine"><option value="0">Waive it — charge replacement only</option><option value="${accrued}">Also collect ₹${accrued}</option></select></div>`:''}
    <div class="fld"><label>Note ${accrued?'':'(optional)'}</label>
      <input id="ls-note" placeholder="e.g. student reported lost, paying by cash"></div>
    <div id="lsErr"></div>
    <button class="btn btn-full btn-danger" id="lsBtn" onclick="confirmLost('${issueId}',${accrued})">Confirm — close loan</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Cancel</button>`);
}
async function confirmLost(issueId,accrued){
  const st=val('ls-st')||'lost';
  const cost=Math.max(0,Number(val('ls-cost')||0));
  const fine=accrued?Math.max(0,Number(val('ls-fine')||0)):0;
  const note=val('ls-note');
  if(!cost && !confirm('No replacement charge entered. Close anyway?')) return;
  setBusy('lsBtn',true,'Saving…');
  try{
    const iss=await getIssues(true); const x=iss[issueId];
    if(!x||x.ret) throw new Error('Loan is not open');
    const patch={};
    /* Close the loan. ret is stamped so every "open loan" query stops seeing
       it — that is what unblocks the student and stops the fine clock. */
    patch['library/issues/'+issueId+'/ret']=Date.now();
    patch['library/issues/'+issueId+'/retBy']=STATE.user.name;
    patch['library/issues/'+issueId+'/outcome']=st;
    patch['library/issues/'+issueId+'/fine']=fine;
    if(accrued){
      patch['library/issues/'+issueId+'/fineDue']=accrued;
      if(fine<accrued){
        patch['library/issues/'+issueId+'/waived']=accrued-fine;
        patch['library/issues/'+issueId+'/waiveReason']='Lost/damaged — replacement charged instead';
        patch['library/issues/'+issueId+'/waivedBy']=STATE.user.name;
      }
    }
    /* Replacement is NOT a fine — kept in its own field so Reports can never
       fold recovery of an asset into late-fee revenue. */
    patch['library/issues/'+issueId+'/replaceCost']=cost;
    patch['library/issues/'+issueId+'/lostNote']=note||'';
    /* Copy leaves circulation. Never 'available' — the book does not exist. */
    patch['library/copies/'+x.acc+'/status']=st;
    patch['library/copies/'+x.acc+'/currentIssueId']=null;
    patch['library/copies/'+x.acc+'/retiredBy']=STATE.user.name;
    patch['library/copies/'+x.acc+'/retiredAt']=Date.now();
    /* avail was already decremented when the copy was issued, so it must NOT
       be decremented again here — the copy simply never comes back. */
    await d2update(patch);
    _issCache.at=0; await loadAvail(true);
    closeSheet();
    toast(x.name+' — '+st+(cost?' · replacement ₹'+cost:''));
    render();
  }catch(e){ showErr('lsErr','Failed: '+e.message); }
  finally{ setBusy('lsBtn',false,'Confirm — close loan'); }
}

/* v1.28: doRecall()'s WhatsApp offer only fires ONCE, at the moment of
   recalling — a book that was already recalled earlier had no way to
   re-send that notice, since Recall itself is hidden once x.recalled is
   true. This is the standalone re-send, independent of the recall action. */
async function resendRecall(issueId){
  const iss=await getIssues();
  const x=iss[issueId];
  if(!x) return toast('Not found',true);
  if(!x.phone) return toast('No phone number on file',true);
  const t=STATE.titles[x.tid]||{name:'this book'};
  const ph=String(x.phone).replace(/\D/g,'');
  const msg='Dear '+(x.name||'')+',\n\nReminder: your library book "'+(t.name||'')+'" has been RECALLED and is needed back urgently. Please return it at the library counter at the earliest.\n\n— Davan Library';
  window.open('https://wa.me/91'+ph+'?text='+encodeURIComponent(msg),'_blank');
}
/* v1.15: Recall — librarian demands immediate return regardless of due date.
   Flags the loan; student's own My Books shows "RETURN NOW" instead of a
   normal countdown so it reads as urgent, distinct from ordinary overdue. */
/* v1.27: recall previously only set a flag — the student found out ONLY by
   opening the app. Now offers to send an actual WhatsApp with a message
   distinct from the ordinary reminder/overdue text, since "recalled" means
   something more urgent than a routine due-date nudge. */
/* v1.29: in-app sheet instead of a second native confirm() — some mobile
   browsers/webviews block or silently auto-dismiss chained confirm()
   dialogs, which would make the WhatsApp offer never appear at all with no
   error, indistinguishable from the button genuinely being missing.
   Sequenced so the recall SAVES first, then this sheet shows — no render()
   racing against a dialog the user is looking at. */
async function doRecall(issueId){
  const iss=await getIssues();
  const x=iss[issueId];
  if(!x) return toast('Not found',true);
  /* v1.32: fall back to a live lookup if the cached issue has no phone yet
     (e.g. fillMissingPhones() hasn't completed this session) — same
     pattern waRemind() already uses, so the Recall sheet is never stuck
     showing "no phone" when one genuinely exists in portal_students. */
  if(!x.phone){
    const s=await d2get('davan_pub/portal_students/'+x.urn);
    if(s&&s.phone){ x.phone=s.phone; d2update({['library/issues/'+issueId+'/phone']:s.phone}).catch(()=>{}); }
  }
  const t=STATE.titles[x.tid]||{name:'this book'};
  sheet(`<div class="page-title" style="font-size:20px">RECALL BOOK</div>
    <div style="font-size:13px;margin-bottom:4px"><b>${esc(t.name)}</b></div>
    <div class="mono" style="font-size:11px;color:var(--muted);margin-bottom:14px">${esc(x.name)} · ${esc(x.urn)}</div>
    <div class="alert">This flags the loan as recalled — the student/staff will see "RETURN NOW" on their login${x.phone?', and you can also send a WhatsApp notice right now.':'.'}</div>
    <button class="btn btn-full" style="background:var(--danger)" id="rcBtn2" onclick="confirmDoRecall('${issueId}',true)">${x.phone?'Recall &amp; notify by WhatsApp':'Recall'}</button>
    ${x.phone?`<button class="btn btn-full btn-ghost" style="margin-top:8px" onclick="confirmDoRecall('${issueId}',false)">Recall only, no message</button>`:''}
    <button class="btn btn-full btn-ghost" style="margin-top:8px" onclick="closeSheet()">Cancel</button>`);
}
async function confirmDoRecall(issueId,sendWa){
  setBusy('rcBtn2',true,'Recalling…');
  try{
    const iss=await getIssues(true);
    const x=iss[issueId];
    await d2update({['library/issues/'+issueId+'/recalled']:true,['library/issues/'+issueId+'/recalledBy']:STATE.user.name,['library/issues/'+issueId+'/recalledAt']:Date.now()});
    _issCache.at=0;
    closeSheet();
    toast('Recalled');
    if(sendWa&&x&&x.phone){
      const t=STATE.titles[x.tid]||{name:'this book'};
      const ph=String(x.phone).replace(/\D/g,'');
      const msg='Dear '+(x.name||'')+',\n\nYour library book "'+(t.name||'')+'" has been RECALLED and is needed back urgently. Please return it at the library counter at the earliest.\n\n— Davan Library';
      window.open('https://wa.me/91'+ph+'?text='+encodeURIComponent(msg),'_blank');
    }
    render();
  }catch(e){ toast('Failed: '+e.message,true); }
}
/* v1.24: v1.22 added a "loading…" placeholder in #ph-{id} spans but never
   wrote the code to actually fill them — the placeholder was permanent
   because nothing was ever going to resolve it. This fetches each unique
   URN's phone from portal_students (skipping issues that already have one
   stamped) and paints it into the matching span once resolved. One request
   per unique student, not per issue, so two books out to the same student
   only costs one fetch. */
async function fillMissingPhones(){
  const iss=await getIssues();
  const open=Object.entries(iss||{}).filter(([i,x])=>!x.ret&&!x.phone);
  if(!open.length) return;
  const urns=[...new Set(open.map(([i,x])=>x.urn))];
  const results=await Promise.all(urns.map(u=>d2get('davan_pub/portal_students/'+u)));
  const byUrn={}; urns.forEach((u,i)=>byUrn[u]=results[i]);
  /* v1.32: previously only wrote into the DOM span — waRemind()/doRecall()
     read getIssues() afterward and saw x.phone still empty, because the
     underlying cache/database was never updated, only the pixel on screen.
     Now writes to _issCache (so this render session is correct everywhere)
     AND persists to library/issues/{id}/phone (so it's correct permanently,
     and never needs re-fetching for this issue again). */
  const patch={};
  open.forEach(([id,x])=>{
    const el=document.getElementById('ph-'+id);
    const ph=byUrn[x.urn]&&byUrn[x.urn].phone;
    if(ph){
      x.phone=ph;                                    // fix the cached object
      patch['library/issues/'+id+'/phone']=ph;        // persist permanently
    }
    if(el) el.innerHTML=ph?(`<a href="tel:${esc(ph)}" style="color:var(--muted);text-decoration:none">📱 ${esc(ph)}</a>`):'<span style="opacity:.5">no phone on file</span>';
  });
  if(Object.keys(patch).length){
    try{ await d2update(patch); }catch(e){ warn('phone backfill save failed: '+e.message); }
  }
}
async function waRemindAllStaff(){
  const iss=await getIssues();
  const staff=Object.entries(iss||{}).filter(([i,x])=>!x.ret&&!x.due&&x.phone);
  if(!staff.length) return toast('No staff loans with a phone number on file',true);
  if(!confirm('Open WhatsApp for '+staff.length+' staff member(s), one at a time?')) return;
  staff.forEach(([i,x],idx)=>setTimeout(()=>waRemind(x.urn,true),idx*400));
}
/* Librarian-initiated, one recipient at a time. Never automated.
   staffMode=true builds a "semester ending, please return" message for staff
   loans (no due date) instead of the overdue-fine message for students. */
/* v1.22: general-purpose reminder — previously the non-staff path only
   matched OVERDUE issues (daysLeft<0), so clicking WhatsApp on a book that
   still had days left silently matched nothing. Now sends an appropriate
   message whether the book is overdue, due soon, or just a general nudge —
   and falls back to a live phone lookup if the issue record itself never
   had one stamped (older issues predate phone-capture on the request). */
async function waRemind(urn,staffMode,issueId){
  const iss=await getIssues();
  if(staffMode){
    const mine=Object.values(iss||{}).filter(x=>x.urn===urn&&!x.ret&&!x.due);
    if(!mine.length) return toast('No open staff loans for '+urn,true);
    const ph=String(mine[0].phone||'').replace(/\D/g,'');
    if(!ph) return toast('No phone number on file for '+urn,true);
    const lines=mine.map(x=>'• '+((STATE.titles[x.tid]||{}).name||'')).join('\n');
    const msg='Dear '+(mine[0].name||'')+',\n\nThe semester is ending — kindly return the following library book(s) at your earliest convenience so they can be reissued for the next term:\n\n'+lines+'\n\n— Davan Library';
    window.open('https://wa.me/91'+ph+'?text='+encodeURIComponent(msg),'_blank');
    return;
  }
  const s=await d2get('davan_pub/portal_students/'+urn);
  let mine=Object.values(iss||{}).filter(x=>x.urn===urn&&!x.ret&&x.due&&daysLeft(x.due)<0);
  let overdue=true;
  if(!mine.length){ mine=Object.values(iss||{}).filter(x=>x.urn===urn&&!x.ret); overdue=false; }
  if(!mine.length) return toast('No open loans for '+urn,true);
  const ph=String((s&&s.phone)||mine[0].phone||'').replace(/\D/g,'');
  if(!ph) return toast('No phone number on file for '+urn,true);
  const name=(s&&s.name)||mine[0].name||'Student';
  let msg;
  if(overdue){
    const lines=mine.map(x=>'• '+((STATE.titles[x.tid]||{}).name||'')+' ('+(-daysLeft(x.due))+' days late, fine ₹'+fineOf(x.due)+', due '+dueLong(x.due)+')').join('\n');
    msg='Dear '+name+',\n\nThe following library book(s) are overdue:\n\n'+lines+'\n\nPlease return them at the library counter.\n\n— Davan Library';
  } else {
    const lines=mine.map(x=>'• '+((STATE.titles[x.tid]||{}).name||'')+' (due '+dueLong(x.due)+')').join('\n');
    msg='Dear '+name+',\n\nThis is a reminder about the following library book(s) you currently have:\n\n'+lines+'\n\nPlease return by the due date to avoid a fine.\n\n— Davan Library';
  }
  window.open('https://wa.me/91'+ph+'?text='+encodeURIComponent(msg),'_blank');
}

<script>
/* ═══ ADD / EDIT BOOKS ═════════════════════════════════════════════════════
   Quantity is NOT an editable number. totalCopies is derived from real copy
   records, each with its own accession number and status — otherwise a title
   could claim 15 copies with only 12 accession numbers behind it and the issue
   screen would break on the 13th. So: "+ Add copies" and per-copy retire. */

}
function addBook(){

      <div class="fld" style="flex:1"><label>Campus</label><select id="f-cam" onchange="accPreview()">${CAMPUSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="fld" style="flex:1"><label>Stream</label><select id="f-str" onchange="accPreview()">${STREAMS.map(c=>`<option>${c}</option>`).join('')}</select></div></div>

/* ═══ MERGE — soft, reversible. Copies/issues/queue re-point; accession numbers
   never change (the physical label on the book stays correct). ═══ */
function simKey(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function editDist(a,b){
  if(Math.abs(a.length-b.length)>Math.max(a.length,b.length)*0.3) return 99;
  let p=Array.from({length:b.length+1},(_,i)=>i);
  for(let i=1;i<=a.length;i++){ const c=[i];
    for(let j=1;j<=b.length;j++) c.push(Math.min(p[j]+1,c[j-1]+1,p[j-1]+(a[i-1]!==b[j-1]?1:0)));
    p=c; }
  return p[b.length];
}
/* EDITION GUARD — never fold different years/editions/volumes together. */
function edTokens(t){
  const s=String(t||'').toLowerCase(); const o=new Set();
  (s.match(/(19|20)\d{2}/g)||[]).forEach(x=>o.add(x));
  (s.match(/\b\d+\s*(st|nd|rd|th)\b/g)||[]).forEach(x=>o.add(x.replace(/\s/g,'')));
  (s.match(/\bvol(ume)?\s*\.?\s*\w+/g)||[]).forEach(x=>o.add(x.replace(/\s/g,'')));
  (s.match(/\bpart\s*\.?\s*\w+/g)||[]).forEach(x=>o.add(x.replace(/\s/g,'')));
  return Array.from(o).sort().join('|');
}
function findDupes(){
  const L=Object.entries(STATE.titles).filter(([i,t])=>t.status!=='merged'&&t.status!=='retired');
  const bucket={};
  L.forEach(([i,t])=>{
    const a=simKey(t.author).split(' ').filter(w=>w.length>2)[0]||'~';
    (bucket[a]=bucket[a]||[]).push([i,t]);
  });
  const out=[];
  Object.values(bucket).forEach(g=>{
    if(g.length<2||g.length>200) return;
    const seen=new Set();
    for(let x=0;x<g.length;x++){
      if(seen.has(g[x][0])) continue;
      const cl=[g[x]];
      for(let y=x+1;y<g.length;y++){
        if(seen.has(g[y][0])) continue;
        const a=simKey(g[x][1].name), b=simKey(g[y][1].name);
        if(!a||!b) continue;
        if(edTokens(g[x][1].name)!==edTokens(g[y][1].name)) continue;
        if(editDist(a,b)<=Math.max(2,Math.floor(Math.max(a.length,b.length)*0.15))){ cl.push(g[y]); seen.add(g[y][0]); }
      }
      if(cl.length>1){ out.push(cl); seen.add(g[x][0]); }
    }
  });
  return out.sort((a,b)=>b.length-a.length);
}
async function openMerge(){
  sheet('<div class="empty">Scanning catalogue…</div>');
  const cl=findDupes();
  sheet(`<div class="page-title" style="font-size:20px">MERGE DUPLICATES</div>
    <div class="alert">Found <b>${cl.length}</b> suspected cluster(s). Editions are never merged — "…2016-2017" and "…2017-2018" stay separate by design. Merging re-points copies, live loans and queue positions; accession numbers are untouched and the merge is reversible.</div>
    ${cl.slice(0,25).map((c,ix)=>`<div class="card">
      <h3 style="font-size:14px">CLUSTER ${ix+1} <span class="badge badge-warning badge-sm">${c.reduce((a,x)=>a+(x[1].totalCopies||0),0)} copies</span></h3>
      ${c.map(([i,t],k)=>`<label style="display:flex;gap:8px;align-items:flex-start;padding:6px 0;text-transform:none;letter-spacing:0;font-family:var(--body);font-size:11.5px;color:var(--text)">
        <input type="radio" name="keep${ix}" value="${i}" ${k===0?'checked':''} style="width:auto;margin-top:3px">
        <span><b>${esc(t.name)}</b><br><span class="mono" style="font-size:9.5px;color:var(--muted)">${esc(i)} · ${t.totalCopies||0} copies · ${esc(t.author||'')}</span></span></label>`).join('')}
      <button class="btn btn-sm btn-full" style="margin-top:7px" onclick="doMerge(${ix},'${c.map(x=>x[0]).join(',')}')">Merge into selected</button>
    </div>`).join('')||'<div class="empty">NO DUPLICATES FOUND</div>'}
    <button class="btn btn-full btn-ghost" onclick="closeSheet()">Close</button>`);
}
async function doMerge(ix,idsCsv){
  const ids=idsCsv.split(',');
  const sel=document.querySelector('input[name="keep'+ix+'"]:checked');
  if(!sel) return;
  const keep=sel.value, drop=ids.filter(i=>i!==keep);
  if(!confirm('Merge '+drop.length+' record(s) into "'+STATE.titles[keep].name+'"?')) return;
  try{
    const [copies,iss,reqs]=await Promise.all([d2get('library/copies'),getIssues(true),getRequests(true)]);
    const patch={}; let n=0;
    Object.entries(copies||{}).forEach(([a,c])=>{
      if(drop.includes(c.titleId)){
        patch['library/copies/'+a+'/origTitleId']=c.titleId;   /* enables unmerge */
        patch['library/copies/'+a+'/titleId']=keep; n++;
      }
    });
    Object.entries(iss||{}).forEach(([i,x])=>{ if(drop.includes(x.tid)){ patch['library/issues/'+i+'/origTid']=x.tid; patch['library/issues/'+i+'/tid']=keep; } });
    Object.entries(reqs||{}).forEach(([i,r])=>{ if(drop.includes(r.tid)){ patch['library/requests/'+i+'/origTid']=r.tid; patch['library/requests/'+i+'/tid']=keep; } });
    const tot=ids.reduce((a,i)=>a+((STATE.titles[i]||{}).totalCopies||0),0);
    const av=ids.reduce((a,i)=>a+availOf(i),0);
    patch['library/titles/'+keep+'/totalCopies']=tot;
    patch['library/titles/'+keep+'/variants']=ids.map(i=>(STATE.titles[i]||{}).name).filter(Boolean);
    patch['library/avail/'+keep]=av;
    drop.forEach(i=>{
      patch['library/titles/'+i+'/status']='merged';
      patch['library/titles/'+i+'/mergedInto']=keep;
      patch['library/titles/'+i+'/mergedBy']=STATE.user.name;
      patch['library/avail/'+i]=0;
    });
    await d2update(patch);
    await loadCatalogue(true); await loadAvail(true); _issCache.at=0; _reqCache.at=0;
    bumpCatNow(); closeSheet(); toast('Merged '+drop.length+' record(s) · '+n+' copies re-pointed'); render();
  }catch(e){ toast('Merge failed: '+e.message,true); }
}

      <textarea id="hol-list" placeholder="2026-08-15
2026-10-02" style="width:100%;height:66px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px;font-family:var(--mono);font-size:11px">${(c.holidays||[]).join('\n')}</textarea>

      <div id="impBox"></div>

      <button class="btn btn-full btn-ghost" style="margin-bottom:7px;border-color:rgba(239,68,68,.35);color:#fca5a5" onclick="replaceCatalogue()">♻️ Replace catalogue (corrected data)</button>
      <button class="btn btn-full btn-ghost" style="margin-bottom:7px" onclick="cleanTitleNames()">🧹 Clean title names (strip leading ; . , junk)</button>
      <button class="btn btn-full btn-ghost" style="margin-bottom:7px" onclick="fixPickupDates()">📅 Fix pickup dates landing on Sunday/holiday</button>
      <button class="btn btn-full btn-ghost" style="margin-bottom:7px" onclick="recount()">🔄 Recount availability</button>
      <button class="btn btn-full btn-ghost" onclick="loadCatalogue(true).then(()=>{toast('Catalogue refreshed');render()})">♻️ Force catalogue refresh</button></div>`:''}
    <div class="alert">Roles read from DB1 Firestore <b>staff_directory</b> (admin / manager / vp / fulltime / visiting). The <b>librarian</b> role is overlaid from DB2 <b>library/staff</b>, so DB1 keeps its existing shape and this app never writes to it.</div>`;
}
/* v1.33: reconcile stored fine on OPEN overdue loans with the live computed
   value. Runs opportunistically on Admin/Out tab loads (no scheduler exists on
   GitHub Pages). Guarded to circulation staff — students must never write here.
   Returned loans are skipped: doReturn() already froze the settled figure and
   overwriting it would corrupt the historical record. */
async function syncFines(){
  if(!canCirc()) return 0;
  try{
    const iss=await getIssues(true);
    const patch={};
    Object.entries(iss||{}).forEach(([id,x])=>{
      if(x.ret||!x.due) return;             /* settled or staff loan */
      const live=fineOf(x.due);
      if(live!==(x.fine||0)) patch['library/issues/'+id+'/fine']=live;
    });
    const n=Object.keys(patch).length;
    if(n){ await d2update(patch); log('synced fine on '+n+' open loan(s)'); }
    return n;
  }catch(e){ warn('fine sync failed: '+e.message); return 0; }
}
/* v1.35: one-time repair for import junk — see cleanTitle(). Patches only rows
   whose cleaned name differs, so re-running is a no-op. */
/* v1.40: one-time repair for pickup deadlines stamped before v1.39's
   holiday-aware pickupDateFrom() existed. Only touches 'ready' requests whose
   exp actually falls on a Sunday/holiday; re-running is a no-op. */
async function fixPickupDates(){
  if(!isAdmin()) return;
  try{
    _reqCache={at:0,v:{}};                    /* force a genuinely fresh read */
    const reqs=await getRequests(true);
    const patch={}; let n=0; const touched=[];
    Object.entries(reqs||{}).forEach(([id,r])=>{
      if(r.st!=='ready'||!r.exp) return;
      const before=new Date(r.exp);
      if(!isHoliday(before)) return;
      const d=new Date(r.exp);
      while(isHoliday(d)) d.setDate(d.getDate()+1);
      patch['library/requests/'+id+'/exp']=d.getTime();
      touched.push(id+': '+dueLong(r.exp)+' → '+dueLong(d.getTime()));
      n++;
    });
    /* v1.41: named so a misfire is visible instead of a bare count nobody can
       verify — this exists BECAUSE a prior run reportedly changed nothing. */
    log('fixPickupDates: '+(n||'0')+' request(s)'+(touched.length?'\n  '+touched.join('\n  '):''));
    if(!n){ toast('No pickup dates needed fixing — none are currently on a Sunday/holiday'); return; }
    await d2update(patch);
    _reqCache={at:0,v:{}};
    toast('Fixed '+n+' pickup date(s): '+touched.map(t=>t.split(':')[0]).join(', '));
    render();
  }catch(e){ toast('Failed: '+e.message,true); log('fixPickupDates failed: '+e.message); }
}
async function cleanTitleNames(){
  if(!isAdmin()) return;
  const patch={}; let n=0;
  Object.entries(STATE.titles).forEach(([tid,t])=>{
    if(t.status==='merged'||t.status==='retired') return;
    const c=cleanTitle(t.name);
    if(c&&c!==t.name){ patch['library/titles/'+tid+'/name']=c; t.name=c; n++; }
  });
  if(!n) return toast('All titles already clean');
  try{
    await d2update(patch);
    await idbSet('titles',STATE.titles); bumpCat();
    toast('Cleaned '+n+' title name(s)'); render();
  }catch(e){ toast('Failed: '+e.message,true); }
}

/* ═══ IMPORTER — chunked, resumable, idempotent ════════════════════════════
   NOT a single set(): 8557 nodes in one request times out on college wifi and
   leaves the DB half-written. Batched update() on explicit keyed paths, so
   re-running writes identical data (never push(), which would duplicate).
   Live circulation nodes are never named in the patch → survive a re-import.
   availCopies is written on FIRST import only; on re-runs it is left alone and
   rebuilt from copy statuses, otherwise a re-import would reset shelf counts
   while books are physically out with students. */
/* ═══ REPLACE CATALOGUE (v1.21) ════════════════════════════════════════════
   Distinct from the additive Import above. Import only ever ADDS/updates —
   its guard recognises "have I imported before" but has no notion of "this
   is a corrected replacement." Running Import again after a catalogue
   correction (e.g. the v1.20 duplicate-title fix) would have ADDED the
   corrected 2060 titles on top of the existing buggy ones — not replaced
   them. This does a real replace:
     1. Any copy currently ISSUED is identified and its accession number +
        current issue are preserved — never deleted, only re-pointed to the
        NEW title ID if that title still exists in the new catalogue by
        matching normalized name, so a student's live loan doesn't break.
     2. Every title/copy from the OLD catalogue that is NOT an issued copy
        is deleted.
     3. The new catalogue is written in.
     4. library/issues, library/requests, library/byUrn — circulation
        HISTORY — are NEVER touched by this or the normal importer. Only
        titles/copies/avail change. ═══ */
async function replaceCatalogue(){
  toast('Checking what would change…');
  try{
    const [oldTitles,oldCopies,r]=await Promise.all([
      d2get('library/titles'),d2get('library/copies'),fetch(IMPORT_URL)
    ]);
    if(!r.ok) throw new Error('library_import.json not found next to this file');
    const nd=await r.json();
    const newTitles=nd.titles||{}, newCopies=nd.copies||{};
    const issuedAccs=new Set(Object.entries(oldCopies||{}).filter(([a,c])=>c.status==='issued').map(([a])=>a));
    const nk=t=>String(t||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
    const newByName={}; Object.entries(newTitles).forEach(([tid,t])=>newByName[nk(t.name)]=tid);
    let matched=0,unmatched=0;
    issuedAccs.forEach(a=>{
      const oldTid=(oldCopies[a]||{}).titleId;
      const oldName=(oldTitles[oldTid]||{}).name;
      if(newByName[nk(oldName)]) matched++; else unmatched++;
    });
    sheet(`<div class="page-title" style="font-size:20px">REPLACE CATALOGUE</div>
      <div class="alert" style="border-color:rgba(239,68,68,.3)">This is DIFFERENT from Import — it REPLACES the existing catalogue instead of adding to it. Use this only after correcting the source data (e.g. a duplicate-title fix), not for routine re-imports.</div>
      <div class="card"><h3>WHAT HAPPENS</h3>
        <div class="rw"><span style="font-size:12px">Titles in new catalogue</span><span class="mono">${Object.keys(newTitles).length}</span></div>
        <div class="rw"><span style="font-size:12px">Copies in new catalogue</span><span class="mono">${Object.keys(newCopies).length}</span></div>
        <div class="rw"><span style="font-size:12px">Old titles/copies deleted</span><span class="mono">${Object.keys(oldTitles||{}).length} / ${Object.keys(oldCopies||{}).length}</span></div>
        <div class="rw"><span style="font-size:12px;color:var(--ok)">Currently issued copies</span><span class="mono">${issuedAccs.size} — <b>preserved</b>, never deleted</span></div>
        <div class="rw"><span style="font-size:12px">→ re-matched to new title by name</span><span class="mono">${matched}</span></div>
        ${unmatched?`<div class="rw"><span style="font-size:12px;color:var(--warn)">→ title not found in new data</span><span class="mono">${unmatched} — copy kept, title unchanged</span></div>`:''}
        <div class="rw"><span style="font-size:12px;color:var(--ok)">Issues / requests / history</span><span class="mono">never touched</span></div></div>
      <div id="rcErr"></div>
      <button class="btn btn-full" id="rcBtn" style="background:var(--danger)" onclick="confirmReplace()">Replace catalogue now</button>
      <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Cancel</button>`);
    window._replaceData={oldTitles,oldCopies,newTitles,newCopies,nd};
  }catch(e){ toast('Failed: '+e.message,true); }
}
async function confirmReplace(){
  const {oldTitles,oldCopies,newTitles,newCopies,nd}=window._replaceData||{};
  if(!nd) return;
  setBusy('rcBtn',true,'Replacing…');
  try{
    const nk=t=>String(t||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
    const newByName={}; Object.entries(newTitles).forEach(([tid,t])=>newByName[nk(t.name)]=tid);
    const patch={};
    /* delete every old title/copy first */
    Object.keys(oldTitles||{}).forEach(tid=>patch['library/titles/'+tid]=null);
    Object.keys(oldCopies||{}).forEach(acc=>patch['library/copies/'+acc]=null);
    /* re-point issued copies to survive, using their OLD accession number
       (the physical book's label doesn't change) but the NEW title ID */
    Object.entries(oldCopies||{}).forEach(([acc,c])=>{
      if(c.status!=='issued') return;
      const oldName=(oldTitles[c.titleId]||{}).name;
      const newTid=newByName[nk(oldName)];
      patch['library/copies/'+acc]=Object.assign({},c,{titleId:newTid||c.titleId,preservedFromReplace:true});
    });
    await d2update(patch);
    /* write new catalogue in batches, same chunking as normal import */
    const T=Object.entries(newTitles), C=Object.entries(newCopies).filter(([a])=>!(oldCopies&&oldCopies[a]&&oldCopies[a].status==='issued'));
    const B=400;
    for(let i=0;i<T.length;i+=B){
      const p={}; T.slice(i,i+B).forEach(([k,v])=>{ p['library/titles/'+k]=v; p['library/avail/'+k]=v.availCopies!=null?v.availCopies:v.totalCopies; });
      await d2update(p); setBusy('rcBtn',true,'Titles '+Math.min(i+B,T.length)+'/'+T.length);
    }
    for(let i=0;i<C.length;i+=B){
      const p={}; C.slice(i,i+B).forEach(([k,v])=>p['library/copies/'+k]=v);
      await d2update(p); setBusy('rcBtn',true,'Copies '+Math.min(i+B,C.length)+'/'+C.length);
    }
    await d2update({
      'library/meta/importVersion':(nd.meta&&nd.meta.importVersion)||'import-v1',
      'library/meta/importedAt':Date.now(),'library/meta/importedBy':STATE.user.name,
      'library/meta/catVersion':Date.now(),'library/counters/titleSeq':T.length
    });
    await loadCatalogue(true); await loadAvail(true);
    closeSheet(); toast('Catalogue replaced — '+T.length+' titles, '+issuedAccs_count(oldCopies)+' live loans preserved'); render();
  }catch(e){ toast('Replace failed: '+e.message,true); }
  finally{ setBusy('rcBtn',false,'Replace catalogue now'); }
}
function issuedAccs_count(oldCopies){ return Object.values(oldCopies||{}).filter(c=>c.status==='issued').length; }
async function runImport(){
  const meta=await d2get('library/meta');
  if(meta&&meta.importVersion){
    if(!confirm('Catalogue already imported ('+meta.importVersion+').\n\nRe-running updates book details and adds new copies, but will NOT reset availability or touch live loans.\n\nContinue?')) return;
  }
  setBusy('impBtn',true,'Fetching…');
  const box=document.getElementById('impBox');
  const say=m=>{ if(box) box.innerHTML='<div class="alert">'+m+'</div>'; };
  try{
    const r=await fetch(IMPORT_URL);
    if(!r.ok) throw new Error('library_import.json not found next to this file ('+r.status+')');
    const d=await r.json();
    const first=!(meta&&meta.importVersion);
    const T=Object.entries(d.titles||{}), C=Object.entries(d.copies||{});
    const cur=await d2get('library/meta/importCursor')||{t:0,c:0};
    const B=400;
    for(let i=(cur.t||0);i<T.length;i+=B){
      const p={};
      T.slice(i,i+B).forEach(([k,v])=>{
        const o=Object.assign({},v);
        if(!first) delete o.availCopies;   /* never clobber live shelf state */
        delete o.sources;
        p['library/titles/'+k]=o;
        if(first) p['library/avail/'+k]=v.availCopies!=null?v.availCopies:v.totalCopies;
      });
      p['library/meta/importCursor']={t:i+B,c:cur.c||0};
      await d2update(p);
      say('Writing titles… '+Math.min(i+B,T.length)+' / '+T.length);
      setBusy('impBtn',true,'Titles '+Math.min(i+B,T.length)+'/'+T.length);
    }
    for(let i=(cur.c||0);i<C.length;i+=B){
      const p={}; const ex=first?null:await Promise.resolve(null);
      C.slice(i,i+B).forEach(([k,v])=>{
        /* only seed genuinely new accession numbers; issued copies keep status */
        /* localAcc starts empty — it is filled from your register, never invented */
        p['library/copies/'+k]=first?Object.assign({localAcc:''},v):{titleId:v.titleId,status:'available',localAcc:''};
      });
      p['library/meta/importCursor']={t:T.length,c:i+B};
      await d2update(p);
      say('Writing copies… '+Math.min(i+B,C.length)+' / '+C.length);
      setBusy('impBtn',true,'Copies '+Math.min(i+B,C.length)+'/'+C.length);
    }
    const patch={};
    patch['library/meta/importVersion']=(d.meta&&d.meta.importVersion)||'import-v1';
    patch['library/meta/importedAt']=Date.now();
    patch['library/meta/importedBy']=STATE.user.name;
    patch['library/meta/importCursor']=null;
    patch['library/meta/catVersion']=Date.now();
    if(first&&d.config) patch['library/config']=d.config;
    if(first) patch['library/counters/titleSeq']=T.length;
    await d2update(patch);
    await loadCatalogue(true); await loadAvail(true); await loadCfg();
    say('✅ Imported '+T.length+' titles / '+C.length+' copies.');
    toast('Import complete'); render();
  }catch(e){
    say('❌ '+e.message+'<br>Progress was checkpointed — press Import again to resume from where it stopped.');
    toast('Import failed: '+e.message,true);
  } finally { setBusy('impBtn',false,'📥 Import catalogue'); }
}
async function exportBackup(){
  toast('Building backup…');
  try{
    const [t,c,i,r,cfg]=await Promise.all([d2get('library/titles'),d2get('library/copies'),
      d2get('library/issues'),d2get('library/requests'),d2get('library/config')]);
    const blob=new Blob([JSON.stringify({meta:{exportedAt:new Date().toISOString(),by:STATE.user.name,app:APP_VERSION},
      titles:t,copies:c,issues:i,requests:r,config:cfg},null,1)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='library_backup_'+dkey(new Date())+'.json';
    a.click(); URL.revokeObjectURL(a.href);
    toast('Backup downloaded');
  }catch(e){ toast('Export failed: '+e.message,true); }
}
/* Self-healing: rebuilds every avail counter from real copy statuses. */
async function recount(){
  if(!confirm('Rebuild all availability counters from copy records?')) return;
  toast('Recounting…');
  try{
    const c=await d2get('library/copies');
    const n={};
    Object.values(c||{}).forEach(x=>{ if(x.status==='available') n[x.titleId]=(n[x.titleId]||0)+1; });
    const patch={};
    Object.keys(STATE.titles).forEach(t=>patch['library/avail/'+t]=n[t]||0);
    await d2update(patch); await loadAvail(true);
    toast('Recount done — '+Object.keys(patch).length+' counters rebuilt'); render();
  }catch(e){ toast('Recount failed: '+e.message,true); }
}

/* ═══ §REPORTS (v1.35) ═══════════════════════════════════════════════════════
   One summary view for admin/vp/manager/librarian: fines collected +
   outstanding, circulation by period, issues by course, catalogue growth, top
   titles. buildReport() computes everything ONCE into a plain object; the
   on-screen view, the CSV download and the print sheet all render from that
   same object, so the three can never disagree.
   Periods: WEEK = rolling last 7 days; MONTH = current calendar month;
   AY = rows stamped with cfg.currentAY at issue time (the closest thing to
   "this sem" the data supports — issues carry the student's semester number,
   which is a cohort label, not a calendar period). */
function repCourseOf(x,reqs){
  if(x.kind==='staff') return 'STAFF';
  const cls=x.cls||((reqs||{})[x.reqId]||{}).cls||'';
  return courseTokenOf(cls)||'(unknown)';
}
async function buildReport(){
  const [iss,reqs]=await Promise.all([getIssues(true),getRequests(true)]);
  const now=Date.now(), wk=now-7*864e5;
  const mo=new Date(); mo.setDate(1); mo.setHours(0,0,0,0); const moTs=mo.getTime();
  const ay=STATE.cfg.currentAY||'2025-26';
  const A=Object.values(iss||{});
  const inWk=t=>t>=wk, inMo=t=>t>=moTs;
  /* fines collected = settled at return time */
  const col=A.filter(x=>x.ret&&x.fine>0);
  const sum=a=>a.reduce((s,x)=>s+x.fine,0);
  const colWk=col.filter(x=>inWk(x.ret)), colMo=col.filter(x=>inMo(x.ret)), colAy=col.filter(x=>x.ay===ay);
  /* v1.36: waivers — fines the rules charged but the librarian discounted.
     Invisible in the collected total by definition, so report them separately;
     otherwise "collected ₹X" silently reads as "owed ₹X". */
  const wv=A.filter(x=>x.ret&&x.waived>0);
  const sumW=a=>a.reduce((s,x)=>s+(x.waived||0),0);
  const wvRows=wv.sort((a,b)=>b.ret-a.ret).map(x=>({
    name:x.name,urn:x.urn,book:(STATE.titles[x.tid]||{}).name||'(unknown)',
    waived:x.waived,due:x.fineDue||0,paid:x.fine||0,reason:x.waiveReason||'',
    date:fmt(x.ret),by:x.waivedBy||x.retBy||''}));
  /* outstanding = open + overdue, live */
  const openOd=A.filter(x=>!x.ret&&x.due&&daysLeft(x.due)<0);
  const outstanding=openOd.reduce((s,x)=>s+fineOf(x.due),0);
  /* circulation */
  const issued={wk:A.filter(x=>inWk(x.out)).length, mo:A.filter(x=>inMo(x.out)).length, ay:A.filter(x=>x.ay===ay).length, all:A.length};
  /* v1.37: a lost/damaged close-out stamps ret to end the loan, but the book
     did NOT come back — counting it as a return would inflate the figure with
     books that no longer exist. */
  const RET=x=>x.ret&&!x.outcome;
  const returned={wk:A.filter(x=>RET(x)&&inWk(x.ret)).length, mo:A.filter(x=>RET(x)&&inMo(x.ret)).length, ay:A.filter(x=>RET(x)&&x.ay===ay).length};
  /* Replacement charges are recovery of an ASSET, never late-fee revenue —
     kept apart so the two can never be added together by accident. */
  const lost=A.filter(x=>x.outcome);
  const sumR=a=>a.reduce((s,x)=>s+(x.replaceCost||0),0);
  const lostMo=lost.filter(x=>inMo(x.ret)), lostAy=lost.filter(x=>x.ay===ay);
  const lostRows=lost.sort((a,b)=>b.ret-a.ret).map(x=>({
    name:x.name,urn:x.urn,book:(STATE.titles[x.tid]||{}).name||'(unknown)',
    acc:x.acc,outcome:x.outcome,cost:x.replaceCost||0,note:x.lostNote||'',
    date:fmt(x.ret),by:x.retBy||''}));
  const open=A.filter(x=>!x.ret);
  const staffOut=open.filter(x=>x.kind==='staff').length;
  const queue=Object.values(reqs||{}).filter(r=>r.st==='waiting').length;
  /* by course (issue events, not unique students) */
  const cc={};
  A.forEach(x=>{
    const c=repCourseOf(x,reqs);
    cc[c]=cc[c]||{wk:0,mo:0,ay:0,all:0};
    cc[c].all++;
    if(inWk(x.out)) cc[c].wk++;
    if(inMo(x.out)) cc[c].mo++;
    if(x.ay===ay) cc[c].ay++;
  });
  const byCourse=Object.entries(cc).sort((a,b)=>b[1].all-a[1].all);
  /* catalogue growth — addedAt only exists on manual adds; imported rows have
     none and are simply not counted as "new", which is correct. */
  const T=Object.entries(STATE.titles).filter(([i,t])=>t.status!=='merged'&&t.status!=='retired');
  const newMo=T.filter(([i,t])=>t.addedAt&&inMo(t.addedAt));
  const newWk=T.filter(([i,t])=>t.addedAt&&inWk(t.addedAt));
  /* top titles this AY */
  const tc={};
  A.filter(x=>x.ay===ay).forEach(x=>{ tc[x.tid]=(tc[x.tid]||0)+1; });
  const top=Object.entries(tc).sort((a,b)=>b[1]-a[1]).slice(0,10)
    .map(([tid,n])=>[(STATE.titles[tid]||{}).name||'(unknown)',n]);
  /* recent fine collections, newest first */
  const colRows=col.sort((a,b)=>b.ret-a.ret).map(x=>({
    name:x.name,urn:x.urn,book:(STATE.titles[x.tid]||{}).name||'(unknown)',
    fine:x.fine,date:fmt(x.ret),by:x.retBy||''}));
  return { ay, gen:new Date().toLocaleString('en-IN',{hour12:true}),
    fines:{ colWk:{n:colWk.length,r:sum(colWk)}, colMo:{n:colMo.length,r:sum(colMo)},
            colAy:{n:colAy.length,r:sum(colAy)}, colAll:{n:col.length,r:sum(col)},
            outstanding, odCount:openOd.length, rows:colRows,
            wvMo:{n:wv.filter(x=>inMo(x.ret)).length,r:sumW(wv.filter(x=>inMo(x.ret)))},
            wvAll:{n:wv.length,r:sumW(wv)}, wvRows },
    circ:{ issued, returned, outNow:open.length, staffOut, queue },
    lost:{ mo:{n:lostMo.length,r:sumR(lostMo)}, ay:{n:lostAy.length,r:sumR(lostAy)},
           all:{n:lost.length,r:sumR(lost)}, rows:lostRows },
    byCourse, newBooks:{wk:newWk.length,mo:newMo.length}, top };
}

    </table></div>`:''}
    ${R.fines.rows.length?`<h3 style="margin-top:12px">COLLECTED FROM</h3>
    <div style="max-height:260px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">

        <td style="border-top:1px solid var(--border);text-align:right;color:var(--danger);font-weight:700">₹${r.fine}</td>
        <td style="border-top:1px solid var(--border);text-align:right" class="mono">${esc(r.date)}</td></tr>`).join('')}
    </table></div>${R.fines.rows.length>40?`<div class="mono" style="font-size:9px;color:var(--muted);margin-top:4px">Showing 40 of ${R.fines.rows.length} — full list in CSV.</div>`:''}`:''}</div>

        <td style="padding:5px 3px;border-top:1px solid var(--border)">${esc(r.name)}<div class="mono" style="font-size:8.5px;color:var(--muted)">${esc(r.urn)}</div></td>

        <td style="border-top:1px solid var(--border)"><span class="badge badge-sm badge-warning">${esc(r.outcome)}</span></td>

  <div class="card"><h3>🎓 ISSUES BY COURSE</h3>

      ${R.byCourse.map(([c,v])=>`<tr>

  <div class="card"><h3>📚 CATALOGUE &amp; TOP TITLES</h3>
    <div class="kp" style="grid-template-columns:repeat(2,1fr)">

    ${R.top.length?`<h3 style="margin-top:12px">MOST ISSUED · AY ${esc(R.ay)}</h3>
      ${R.top.map(([n,c],i)=>`<div class="rw"><div style="font-size:11.5px;min-width:0"><span class="mono" style="color:var(--muted);font-size:10px">${i+1}.</span> ${esc(n)}</div><span class="badge badge-sm badge-info">${c}×</span></div>`).join('')}`

function downloadReportCSV(){
  const R=window._repData; if(!R) return;
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const L=[];
  L.push(['DAVAN LIBRARY REPORT','AY '+R.ay,'generated '+R.gen].map(q).join(','));
  L.push('');
  L.push(['FINES','count','rupees'].map(q).join(','));
  L.push(['Collected this week',R.fines.colWk.n,R.fines.colWk.r].map(q).join(','));
  L.push(['Collected this month',R.fines.colMo.n,R.fines.colMo.r].map(q).join(','));
  L.push(['Collected this AY',R.fines.colAy.n,R.fines.colAy.r].map(q).join(','));
  L.push(['Collected all time',R.fines.colAll.n,R.fines.colAll.r].map(q).join(','));
  L.push(['Outstanding (live)',R.fines.odCount,R.fines.outstanding].map(q).join(','));
  L.push(['Waived this month',R.fines.wvMo.n,R.fines.wvMo.r].map(q).join(','));
  L.push(['Waived all time',R.fines.wvAll.n,R.fines.wvAll.r].map(q).join(','));
  L.push('');
  L.push(['WAIVERS','student','urn','book','fine due','paid','waived','reason','date','by'].map(q).join(','));
  R.fines.wvRows.forEach((r,i)=>L.push([i+1,r.name,r.urn,r.book,r.due,r.paid,r.waived,r.reason,r.date,r.by].map(q).join(',')));
  L.push('');
  L.push(['FINE COLLECTIONS','student','urn','book','rupees','date','collected by'].map(q).join(','));
  R.fines.rows.forEach((r,i)=>L.push([i+1,r.name,r.urn,r.book,r.fine,r.date,r.by].map(q).join(',')));
  L.push('');
  L.push(['CIRCULATION','week','month','AY','all'].map(q).join(','));
  L.push(['Issued',R.circ.issued.wk,R.circ.issued.mo,R.circ.issued.ay,R.circ.issued.all].map(q).join(','));
  L.push(['Returned',R.circ.returned.wk,R.circ.returned.mo,R.circ.returned.ay,''].map(q).join(','));
  L.push(['Out now',R.circ.outNow,'','',''].map(q).join(','));
  L.push(['Staff loans out',R.circ.staffOut,'','',''].map(q).join(','));
  L.push(['Queue now',R.circ.queue,'','',''].map(q).join(','));
  L.push('');
  L.push(['LOST & DAMAGED','count','replacement rupees'].map(q).join(','));
  L.push(['This month',R.lost.mo.n,R.lost.mo.r].map(q).join(','));
  L.push(['This AY',R.lost.ay.n,R.lost.ay.r].map(q).join(','));
  L.push(['All time',R.lost.all.n,R.lost.all.r].map(q).join(','));
  L.push('');
  L.push(['LOST DETAIL','student','urn','book','accession','outcome','replacement','note','date','by'].map(q).join(','));
  R.lost.rows.forEach((r,i)=>L.push([i+1,r.name,r.urn,r.book,r.acc,r.outcome,r.cost,r.note,r.date,r.by].map(q).join(',')));
  L.push('');
  L.push(['ISSUES BY COURSE','week','month','AY','all'].map(q).join(','));
  R.byCourse.forEach(([c,v])=>L.push([c,v.wk,v.mo,v.ay,v.all].map(q).join(',')));
  L.push('');
  L.push(['TOP TITLES AY '+R.ay,'issues'].map(q).join(','));
  R.top.forEach(([n,c])=>L.push([n,c].map(q).join(',')));
  const blob=new Blob(['\ufeff'+L.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='library_report_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(a.href);
}
function printReport(){

    ${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table>`;
  w.document.write(`<html><head><title>Library Report</title></head>

  <h2 style="margin:0">DAVAN &amp; NUTANA — LIBRARY REPORT</h2>

    ['This week',R.fines.colWk.n,R.fines.colWk.r],
    ['This month',R.fines.colMo.n,R.fines.colMo.r],
    ['This AY',R.fines.colAy.n,R.fines.colAy.r],
    ['All time',R.fines.colAll.n,R.fines.colAll.r],
    ['Outstanding (live)',R.fines.odCount,R.fines.outstanding]])}
  ${R.fines.rows.length?`<h3>Fine collections</h3>`+tbl(['#','Student','URN','Book','₹','Date','By'],
    R.fines.rows.map((r,i)=>[i+1,esc(r.name),esc(r.urn),esc(r.book),r.fine,esc(r.date),esc(r.by)])):''}
  <h3>Circulation</h3>
  ${tbl(['','Week','Month','AY','All'],[
    ['Issued',R.circ.issued.wk,R.circ.issued.mo,R.circ.issued.ay,R.circ.issued.all],
    ['Returned',R.circ.returned.wk,R.circ.returned.mo,R.circ.returned.ay,''],
    ['Out now',R.circ.outNow,'','',''],['Staff loans out',R.circ.staffOut,'','',''],['Queue now',R.circ.queue,'','','']])}
  ${R.lost.all.n?`<h3>Lost &amp; damaged (replacement charges)</h3>`+tbl(['#','Student','Book','Accession','Outcome','₹','Date'],
    R.lost.rows.map((r,i)=>[i+1,esc(r.name),esc(r.book),esc(r.acc),esc(r.outcome),r.cost,esc(r.date)])):''}
  <h3>Issues by course</h3>
  ${tbl(['Course','Week','Month','AY','All'],R.byCourse.map(([c,v])=>[esc(c),v.wk,v.mo,v.ay,v.all]))}

async function boot(){
