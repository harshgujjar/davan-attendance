════════════════════════════════════════════════════════════════════════
  DAVAN LIBRARY — standalone circulation app
  Part of Davan & Nutana Group of Institutions, Davangere
────────────────────────────────────────────────────────────────────────
  ARCHITECTURE
  · DB2 ONLY (davan-student-portal-default-rtdb) for ALL library writes.
    DB1 (davan-attendance-2026) is READ-ONLY here — used solely to read
    staff_directory for roles. Library never writes to DB1.
  · Anonymous Firebase auth (same pattern as student_portal getAuthToken).
  · Student login  = davan_pub/portal_students/{URN}, SHA-256 password,
    identical to student_portal loginStudent() incl. ban check + master pw.
  · Staff login    = DB1 Firestore app_data/staff_directory (name+password),
    role overlay from DB2 library/staff/{name} to grant 'librarian'.
    DB1 shape untouched — librarian role lives ONLY in DB2.
  · Photos: davan_pub/student_photos + davan_pub/faculty_photos (Cloudinary
    URLs). Two-phase initials-then-lazy-inject, same as index.html.

  BANDWIDTH GUARD (Spark 10GB/mo)
  · library/titles (~1.4MB) cached in IndexedDB, keyed to meta/catVersion.
    Re-downloaded ONLY when catVersion changes (i.e. books added/edited).
    NOT time-based — a 30-min TTL would refetch 1.4MB for no reason.
  · library/avail (~40KB) uses the 30-min sessionStorage TTL pattern from
    student_portal — this genuinely goes stale as books are issued.
  · library/copies never bulk-read; single node on issue only.
  · catVersion bumps are DEBOUNCED (see bumpCat) so a 50-book add session
    = 1 bump, not 50. This is the single rule that protects the quota.

  DATA MODEL
  library/titles/{tid}        name,author,publisher,year,campus,stream,
                              category,courses[],sems[],totalCopies,tagConf,
                              variants[],status
  library/copies/{accNo}      titleId,status(available|issued|lost|damaged),
                              origTitleId (set on merge, enables unmerge)
  library/avail/{tid}         int  — denormalised, rebuildable via Recount
  library/requests/{reqId}    REQ-YYMM-NNNN token; urn,tid,st,queued,exp
  library/issues/{issueId}    urn,tid,accNo,out,due,ret,ay,sem,fine,byStaff
  library/byUrn/{urn}/{ay}/{sem}/{issueId}  true  — scoped history index
  library/counters/*          titleSeq, reqSeq, acc/{campus}/{stream}
  library/staff/{name}        'librarian'  — role overlay over DB1
  library/config              loanDays,maxBooks,finePerDay,autoApprove,
                              pickupDays,currentAY
  library/meta                catVersion,importVersion
────────────────────────────────────────────────────────────────────────
  CHANGELOG (newest first)
────────────────────────────────────────────────────────────────────────
VERSION : v1.32 (2026-07-17) — FOUND why Recall's WhatsApp option was
  missing despite the phone visibly showing on the Issued row (screenshot
  confirmed: dialog said plain "Recall" with no WhatsApp button, even
  though Ashoka's phone was displayed on screen). Root cause: fillMissing
  Phones() (added in v1.24) only ever wrote the fetched phone number into
  the DOM span (#ph-{id}.innerHTML) — it never wrote it back into
  _issCache or library/issues itself. So the phone was genuinely visible
  on screen, but any function reading getIssues() afterward — doRecall(),
  waRemind() — saw x.phone as still empty, because the cache was never
  updated, only the pixel. Fixed at the source: fillMissingPhones() now
  also writes the resolved number into _issCache AND persists it to
  library/issues/{id}/phone in the database, so it's correct everywhere
  from that point on — not just visually patched in one span. This also
  means the phone only needs fetching once per student, ever, rather than
  every time the Issued tab happens to render.
VERSION : v1.31 (2026-07-17) — Sheet\'s Title column had its first letter
  clipped, confirmed by screenshot. Root cause: the sticky Title column
  (added in v1.30 alongside the new Sl.No. column) uses left:34px to sit
  flush against the end of the Sl.No. column with zero gap — the cell's own
  10px padding was being measured from that boundary, but the sticky
  positioning context made the text's actual rendered left edge overlap
  the Sl.No. column's background by a few pixels, clipping the first
  character under it. Fixed with explicit left padding on the Title cell
  itself (independent of the shared td/th padding rule) so there is real
  visible space between the two sticky columns regardless of how the
  browser resolves the sticky positioning math.
VERSION : v1.30 (2026-07-17) — AUDIT of every closeSheet()/close button in
  the file (25 call sites checked). closeSheet() itself is a two-line
  function and correct. The actual bug: doRegister('print') and doLabels
  ('print') call window.open('','_blank') to build a printable page, and
  CSV downloads create+click a temporary <a> element — both actions can
  steal focus to a new tab/window or briefly blur the page. On some
  browsers the sheet then sits behind that new window/tab, or the click on
  Close lands on the wrong target because focus moved — the button was
  never broken, the FOCUS was elsewhere. Fixed: after any window.open() or
  download in a sheet, the code now explicitly re-focuses the original
  window and brings the sheet back to front before the user would expect
  to interact with it again, rather than leaving that to browser default
  behaviour (which varies and was the actual source of "close doesn't
  work"). Every other close/add button was individually checked against
  its onclick target — no other broken bindings found. Titles like
  ";teaching learning innovations in" and "[Grammer, composition,
  vocabulary]" are NOT a display bug — the leading ; and [ are literally
  in the source spreadsheet data (confirmed against library_import.json
  directly); no CSS change can or should alter what the register shows,
  since "fixing" the visible text would mean guessing at a different real
  title than what's on the physical book.
  SERIAL NUMBERS added wherever requested: catalogue register CSV and
  print sheet (Sl.No. column, resets per category), Export Accession
  Labels CSV, Sheet tab's table AND card view (Sl.No. reflects position in
  the currently filtered list, not a fixed database ID — so it renumbers
  1..N within whatever filter/search is active, matching how a person
  reads down a numbered list).
VERSION : v1.29 (2026-07-17) — doRecall()'s WhatsApp offer was sequenced
  wrong: render() rebuilt the whole Issued tab (replacing the exact row that
  was just clicked) BEFORE the second confirm() dialog asking about
  WhatsApp — visually the row flips to "RECALLED" first, then a native
  browser popup appears asking about a message, which reads as unrelated
  and is easy to dismiss without noticing what it's for. Also, native
  confirm() is blocked or auto-dismissed by some mobile browsers/webviews
  entirely, which would make the WhatsApp offer silently never appear —
  indistinguishable from screenshot 3's report of a genuinely missing
  button. Fixed: recall now shows an in-app sheet (not a native dialog)
  asking to send the notice, sequenced AFTER the recall is saved but with
  no re-render racing it, and the button reads "Recall & notify" up front
  so what's about to happen is clear before tapping — not a two-step
  surprise.
VERSION : v1.28 (2026-07-17) — CORRECTION to v1.27's mistake, plus the
  actually-missing Recall-WhatsApp fix.
  (1) v1.27 deleted the Admin tab's stat row instead of making it clickable
  — the instruction was "make these clickable," not "remove this and point

  Overdue/Queue/Fines/Untagged) and wired each box to viewSheetLink() the
  same way Dash's boxes work, landing on Sheet pre-filtered to that slice.
  Two places now legitimately show the same numbers with the same

  (2) The Recall WhatsApp added in v1.27 only fires from doRecall() itself —

VERSION : v1.27 (2026-07-17) — THREE ITEMS.
  (1) Screenshot 2 is the ADMIN tab, not Dash — a genuinely separate function

  (2) Recall existed as a status flag (doRecall() set library/issues/{id}/
  recalled=true) but NEVER SENT ANY MESSAGE — the student would only find out

  Added a genuine "Recall" WhatsApp template, distinct from the ordinary

  (3) Phone number is now a tel: link (tap to call on mobile; visible/

  Currently Issued, Overdue, Staff Loans.
VERSION : v1.26 (2026-07-17) — FOUND THE ACTUAL ROOT CAUSE of the photo bug
  that v1.15 and v1.22's retry-timing fixes could never have solved: this app
  was reading davan_pub/student_photos/{urn} as a single bulk dictionary
  fetch. The REAL path, confirmed directly in student_portal.html's own
  source (which hit and fixed this exact mistake once already, in its own
  v6.50: "ascLoadPhoto was reading wrong RTDB path... now delegates to
  rcLoadPhoto, correct path davan_student_photos/{urn}"), is
  davan_student_photos/{urn} — no davan_pub prefix, PER-URN not bulk, and
  the value is either a raw URL string OR an object with url/photo_url/
  photoURL/thumb/image (checked in that order) — never a flat map. No amount
  of retrying a fetch against the WRONG path could ever have found a photo
  that lives somewhere else entirely; the v1.15/v1.22 "timing" fixes were
  treating a wrong-address problem as a slow-response problem. Rebuilt
  loadPhotos() to fetch davan_student_photos/{urn} per-student (cached, same
  pattern as rcLoadPhoto's _rcPhotoCache) instead of one bulk dictionary
  read, resolving both string and object value shapes. Storage-path
  fallback (student_photos/{urn}.jpg etc via Firebase Storage HEAD requests)
  was NOT ported — that is a heavier per-photo network cost student_portal
  accepts for a single admin viewing one card at a time; the library shows
  many avatars per screen, so RTDB-only keeps it within the same bandwidth
  budget documented for this app. A student with no RTDB entry correctly
  falls back to initials rather than paying for six HEAD requests per row.
VERSION : v1.25 (2026-07-17) — Sheet was genuinely unusable on mobile,
  confirmed by screenshot: a 7-column table (Title/Category/Courses/Sems/
  Copies/Available/Open) was rendering at its full desktop width inside a
  ~360px phone screen, requiring horizontal scroll with touch-target-sized
  chips packed edge to edge — not realistically editable with a thumb. The
  v1.18 fix only ever addressed desktop (min-width:900px widens .main);
  nothing was done for the opposite, more common case of a phone screen.
  A table is the wrong SHAPE for this width regardless of sizing — the fix
  isn't shrinking columns further, it's changing layout entirely below
  768px: Sheet now renders as STACKED CARDS on mobile, one book per card,
  every field (Category as the same click-to-expand dropdown, Courses/Sems
  as tap-chips, Total Copies as a stepper) arranged vertically with full
  touch-target width instead of squeezed into a table cell. Same data, same
  live-save-on-edit behaviour, same filter bar — just a phone-appropriate
  shape instead of a horizontally-scrolling spreadsheet. Desktop (≥768px)
  is completely unchanged, still the sticky-header table from v1.16-v1.24.
VERSION : v1.24 (2026-07-17) — TWO FIXES to the v1.23 collapse/expand cells.
  (1) Selecting a category left the dropdown open — pickerToggle() only
  toggled the chip's .on class, nothing ever told the panel to close after a
  SINGLE-select pick, even though closing is the obviously correct behaviour
  once there's nothing left to choose (only one category can be true at a
  time). Fixed: for single-select only, choosing an option now auto-collapses
  the panel immediately.
  (2) The collapse/expand pattern (right for Category, which is single-select
  and benefits from staying compact) was WRONG for Courses and Sems — both
  multi-select, where clicking to open a dropdown just to tick several boxes
  is slower than plain always-visible chips. Reverted Courses/Sems specifically
  to the earlier plain-chip-row style (all options visible, tap to toggle,
  no expand/collapse), while Category keeps the v1.23 collapsed-pill/
  click-to-expand treatment. Different interaction per column now matches how
  each is actually used: pick ONE category via dropdown, tick SEVERAL
  courses/sems via chips.
  (3) Screenshot showed phone still "loading…" and never resolving on
  Currently Issued. Traced: the placeholder text was added in v1.22 but
  nothing ever actually fills it in after the initial render — there is no
  code that fetches Ashoka's phone from portal_students and writes it into
  the #ph-{id} span. It was a visual placeholder with no backing fetch,
  which is why it's permanently stuck. Fixed: viewIssued() now fetches
  missing phone numbers for all open issues in one batched pass and fills
  every #ph-{id} span once resolved, instead of leaving a static "loading…"
  that nothing ever completes.
VERSION : v1.23 (2026-07-17) — Sheet's Category/Courses/Sems cells were
  stuck in an unresolvable tension: compact rows (per earlier instruction)
  meant a fixed 220px width with horizontal scroll, but scrolling sideways
  inside a tiny cell to find and click option #14 of 21 is not realistically
  discoverable or usable — confirmed by screenshot, options past BEd were
  effectively unreachable in practice even though they existed in the DOM.
  Resolved by making cells collapsed-by-default, expand-on-click: normally a
  cell shows ONLY the selected value(s) as a compact tag (e.g. just "BEd"),
  keeping every row's height and the table's overall footprint small. Click
  the cell and it expands into a vertical dropdown-style list of all 21
  categories (or however many courses/sems), stacked one per line, fully
  visible and clickable with no scrolling gymnastics. Click a new option (or
  click outside) and it collapses back to showing just the selection. This
  keeps the "many rows visible at once" requirement AND the "I can actually
  select any category" requirement, which a fixed-width scrolling strip
  could not do simultaneously.
VERSION : v1.22 (2026-07-17) — TWO REAL GAPS + ONE CLARIFICATION.
  (1) Screenshot showed Ashoka's two currently-issued books (7 days left,
  not yet overdue) with only a bare "Return" button — no phone, no
  WhatsApp, no Recall. Root cause: v1.15 added phone/WhatsApp/Recall ONLY to
  the "🔔 Overdue" card. A book that's issued but not yet late falls into
  the plain "📖 Currently Issued" section below it, which never received
  the same additions — an oversight, not a deliberate restriction. Fixed:
  phone number, WhatsApp button, and Recall are now on EVERY issued row
  regardless of overdue status, not just late ones — a librarian can now
  message or recall a book on day 2 of a 7-day loan, not only after it's
  already late.
  (2) Ashoka's photo not showing despite existing in the portal (confirmed
  via the student_portal screenshot, which DOES show his photo — so the
  photo genuinely exists in davan_pub/student_photos). avatar() correctly
  looks up STATE.photos[x.urn], and the retry guard added in v1.15 only
  fires from WITHIN avatar() itself and depends on a subsequent render()
  actually happening — if nothing else triggers a re-render after the retry
  starts, the photo silently loads into STATE.photos but never gets painted
  into the DOM. Fixed: the retry now explicitly re-renders when the fetch
  resolves, rather than relying on some other action to trigger it.
  (3) CLARIFICATION on the Category dropdown (not a bug): the grey chips
  running across every row (Accountancy, Biology, Chemistry, Commerce...)
  ARE the Category picker showing all 21 options with the current one
  highlighted orange — that's correct chip-picker behaviour, matching Edit
  Book/Tag Review. The dropdown ABOVE the table (Category: All ▾) is a
  separate control — selecting a category there filters WHICH ROWS appear,
  it does not change what each row's chip-picker displays. To see only
  History books, use the top filter dropdown; the picker chips in each row
  are for EDITING that title's category, not for filtering the list.
VERSION : v1.21 (2026-07-17) — TWO MORE REAL BUGS.
  (1) Screenshot showed cell content overlapping across column boundaries —
  "Total Copies" input sitting on top of "Mathematics" text. Root cause of
  MY OWN v1.20 fix: I set overflow:visible on the picker divs so chips
  wouldn't be clipped, but gave that overflowing content nowhere to go —
  content spilling past a 280px cell boundary doesn't push neighbouring
  cells aside, it just renders on top of them. Wrong instruction interpreted
  wrong: "row scrolls horizontally, not each cell" does not mean "let
  content overflow its cell" — it means each cell gets its OWN internal
  horizontal scrollbar (overflow-x:auto, NOT overflow:visible) so a cell
  with 27 category chips scrolls sideways within its own column boundary,
  while the table's overall .sheet-wrap scroll handles moving between
  columns. Fixed: reverted to overflow-x:auto per cell (this is what v1.18
  actually had, before v1.20 broke it further trying to fix a wrap-height
  problem that no longer existed once row height was fixed via
  tbody tr{height:1px}). Each Category/Courses/Sems cell is now its own
  independently-scrollable strip — swipe or scroll within that column to
  see all 27 categories, drag the table itself to move to Sems/Copies.
  (2) CORRECTLY FLAGGED: re-importing the corrected library_import.json with
  the existing additive importer WOULD have duplicated data — its
  first-import guard only recognises "have I imported before," not "is this
  a corrected replacement for what I already have." Added a SEPARATE
  "Replace catalogue" action, admin-only, clearly distinguished from the
  additive Import: it deletes every existing library/titles and
  library/copies entry whose accession number matches the OLD dataset before
  writing the new one, and — critically — PRESERVES every copy currently
  ISSUED, translating it to point at its title's new ID rather than wiping
  it, so no student's live loan breaks. Live issues/requests/history are
  never touched by either import mode. A confirmation screen shows exactly
  what will be deleted vs kept before anything runs.
VERSION : v1.20 (2026-07-17) — TWO REAL BUGS FOUND AND FIXED.
  (1) Picture 2 showed the Category column still expanding to show all 27
  category options stacked vertically, not just the selected one — the
  v1.18 fix (max-width + overflow-x:auto per cell) was the wrong layer: it
  tried to scroll INSIDE each cell, but chipCell() renders every option as a
  visible chip regardless of selection, which is fundamentally too much
  content for a fixed-height cell no matter the overflow rule. Rewired per
  explicit instruction: table rows now scroll horizontally as a whole via a
  single .sheet-wrap scroll container (already present) with each
  Category/Courses/Sems cell fixed at a set width and vertical-align:top, so
  scrolling right reveals the rest of a wide row's chips while every row
  stays the same fixed height — chips overflow sideways within the row's
  horizontal scroll, not vertically within the cell.
  (2) Picture 1 showed real duplicate titles — "teaching learning innovations
  in" ×4, "[SUPW] in Education" ×3 — that survived the original fuzzy dedup,
  because it bucketed candidates by author first-token, and titles with a
  BLANK author (not literally "Unknown", an empty string) fell into a bucket
  the dedup skipped entirely. FIRST attempt at a fix merged purely on exact
  title match with no length or author floor — that was WRONG and got
  caught before shipping: it merged "10th" with a different unrelated "10th"
  and "8th Std" with a different "8th Std", collapsing short generic titles
  that only coincidentally share a name. Reverted that attempt, rebuilt
  properly from the raw parsed source with a SAFE second pass: exact-title
  merge only fires when the normalized title is ≥15 characters (rules out
  short/generic collisions like "10th") AND either both authors are blank/
  "Unknown" or the authors themselves match — 8685 same-title pairs with
  genuinely different named authors were correctly left alone. Result: 477
  real duplicates merged (both "teaching learning innovations in" and
  "[SUPW] in Education" now correctly show as 1 record each), catalogue is
  now 2060 titles / 8538 copies. See updated library_import.json — RE-IMPORT
  REQUIRED (Admin → Data → Import catalogue) for this correction to reach
  a live database that was seeded from the earlier file.
VERSION : v1.19 (2026-07-17) — Sheet's header label was reported showing
  "Untagged (1360) — 1360 titles" correctly while the rows below showed all

  and rows were ALL built from the same filtered array L in this file, which

  Rather than leave this unresolved, removed every possible source of

  from L.length instead of the click-time value (pre.val) that was passed in

  a different set of rows renders, because they are read from the exact same
  variable at the exact same point in the same function call. Also added a
  visible "1360 rows below ↓" confirmation directly under the filter alert
  so a stale-cache situation would be immediately obvious (wrong count shown)
  rather than silently confusing.  If this still reproduces after a hard
  refresh (Ctrl+Shift+R / clear site data) on this exact file, it is a real
  bug and needs a fresh screenshot against v1.19 specifically to trace further.
VERSION : v1.18 (2026-07-17) — Fixed the Sheet view on desktop, which was
  unusable — screenshot showed ONE row consuming the entire viewport. Root
  cause: two separate problems compounding. (1) .main is capped at
  max-width:640px everywhere in the app, correct for the phone-oriented
  screens (Browse, Desk, My Books) but wrong for Sheet, which is inherently a
  wide-data view — it was being squeezed into a phone-width column even on a
  desktop monitor. (2) INSIDE that already-cramped width, the Courses/Sems
  chip-picker cells had no width constraint and no wrap control, so
  BBA/BBM/BCA/BCom/BEd/PUC/+ wrapped into a tall vertical stack instead of
  staying on one line or scrolling horizontally within the cell — that
  stacking was what actually blew up the row height, not the table itself.
  Fixed both: added a desktop breakpoint (min-width:900px) where Sheet's
  wrapper expands to the full viewport width instead of the shared 640px cap
  — every other tab keeps the phone-width layout unchanged, since a table is
  the one screen that genuinely benefits from more horizontal room while a
  single book-request card does not. Chip-picker cells in Sheet now have a
  fixed max-width with internal horizontal scroll, so a title with 6 courses
  ticked stays one compact row instead of ballooning. Net effect: on a
  desktop browser, Sheet now shows roughly 15-20 rows per screen instead of
  one, matching what a spreadsheet-style editing view needs to actually be
  useful for bulk tagging 1360 untagged titles.
VERSION : v1.17 (2026-07-17) — Added "Remember me" checkbox on both login
  tabs, default CHECKED. Session storage was sessionStorage only, which clears
  the moment the tab closes — the opposite of persistence, so there was
  nothing to "remember" before this. Checked (default): session also saves to
  localStorage, which survives closing the tab/browser entirely — same
  pattern as student_portal's stu-remember/admin-remember keys. Unchecked:
  session-only as before, cleared on tab close. Exit button clears both
  storages regardless of the checkbox state, so "Exit" always means signed
  out, not just "forgotten until next tab close."
VERSION : v1.16 (2026-07-17) — New SHEET view: every dashboard stat box and

  (new "sheet" tab, admin/librarian only) pre-filtered to that slice — tap
  "Untagged 1360" and land on exactly those 1360 rows; tap the BEd bar and

/* ═══ SHEET VIEW (v1.16) — sticky header row + sticky first column together.
   The two stickies must both use position:sticky with correct z-index layering:
   header row sits above body cells (z-index 3), the corner cell (row×col
   intersection) sits above everything (z-index 4) so it's never covered by
   either the sticky header sliding under it or the sticky column sliding
   under it during diagonal scroll. ═══ */
.sheet-wrap{overflow:auto;max-height:70vh;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
.sheet-tbl{border-collapse:separate;border-spacing:0;font-size:11.5px;white-space:nowrap}
.sheet-tbl th,.sheet-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.sheet-tbl thead th{position:sticky;top:0;background:var(--surface2);z-index:3;font-family:var(--mono);font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);text-align:left}
/* v1.30: Sl.No. is now the true first column; keep it AND Title sticky
   together as one block (not just Title alone) so scrolling right never
   loses either "which row number" or "which title" — the number alone
   isn't enough to identify a row, and Title alone loses count context. */
.sheet-tbl td:first-child,.sheet-tbl th:first-child{position:sticky;left:0;background:var(--surface2);z-index:2;font-weight:700;width:34px;min-width:34px;max-width:34px;text-align:right;padding-right:6px}
/* v1.31: explicit left padding fixes the clipped first-letter bug — the
   shared td/left padding wasn't enough once this column became sticky at
   left:34px, so the text needs its own guaranteed gap from the Sl.No.
   column regardless of how the browser resolves sticky-positioning math. */
.sheet-tbl td:nth-child(2),.sheet-tbl th:nth-child(2){position:sticky;left:34px;background:var(--surface2);z-index:2;font-weight:700;max-width:200px;white-space:normal;padding-left:14px!important}
.sheet-tbl thead th:first-child{z-index:4}
.sheet-tbl tbody tr:nth-child(even) td{background:rgba(255,255,255,.015)}
.sheet-tbl tbody tr:nth-child(even) td:first-child{background:var(--surface2)}
.sheet-cell{cursor:pointer;min-height:20px}

/* ═══ AUTH — anonymous, same pattern as student_portal getAuthToken() ═══ */
let _tok='', _tokExp=0, _authP=null;
async function getAuthToken(){
  const now=Date.now();
  if(_tok && now < _tokExp-60000) return _tok;
  if(_authP) return _authP;
  _authP=(async()=>{
    try{
      const auth=firebase.auth();
      let u=auth.currentUser;
      if(!u){ const c=await auth.signInAnonymously(); u=c.user; }
      _tok=await u.getIdToken(false); _tokExp=now+3600000;
      log('anon auth OK');
      return _tok;
    }catch(e){ warn('auth failed: '+e.message); return ''; }
    finally{ _authP=null; }
  })();
  return _authP;
}
function log(m){ console.log('[lib '+APP_VERSION+']',m); }
function warn(m){ console.warn('[lib '+APP_VERSION+']',m); }

/* ═══ DB2 REST helpers (SDK used for transactions/writes needing atomicity) ═══ */
async function d2get(path){
  try{
    const t=await getAuthToken();
    const r=await fetch(DB2_URL+'/'+path+'.json'+(t?'?auth='+t:''));
    if(!r.ok){ warn('GET '+path+' → '+r.status); return null; }
    return await r.json();
  }catch(e){ warn('GET '+path+' failed: '+e.message); return null; }
}
async function d2update(patch){
  try{ await _db2.ref().update(patch); return true; }
  catch(e){ warn('update failed: '+e.message); throw e; }
}
async function d2set(path,val){
  try{ await _db2.ref(path).set(val); return true; }
  catch(e){ warn('set '+path+' failed: '+e.message); throw e; }
}
/* Atomic counter — never derive IDs from list length (collision under concurrency) */
async function bump(path){
  const r=await _db2.ref(path).transaction(c=>(c||0)+1);
  return r.snapshot.val();
}
async function sha256(s){
  const b=new TextEncoder().encode(s);
  const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
/* v1.17: "Remember me" — checked (default) persists to localStorage, which

function saveSession(user,remember){

}

/* ═══ INDEXEDDB — catalogue cache. Keyed to catVersion, NEVER to APP_VERSION.
   Keying to APP_VERSION would force every student to re-download 1.4MB on every
   deploy — the single biggest quota risk. ═══ */
const IDB_NAME='davan_lib', IDB_STORE='kv';
let _idb=null;
function idb(){
  if(_idb) return _idb;
  _idb=new Promise((res,rej)=>{
    const q=indexedDB.open(IDB_NAME,1);
    q.onupgradeneeded=()=>{ q.result.createObjectStore(IDB_STORE); };
    q.onsuccess=()=>res(q.result);
    q.onerror=()=>rej(q.error);
  });
  return _idb;
}
async function idbGet(k){
  try{
    const d=await idb();
    return await new Promise((res)=>{
      const r=d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(k);
      r.onsuccess=()=>res(r.result); r.onerror=()=>res(null);
    });
  }catch(e){ return null; }
}
async function idbSet(k,v){
  try{
    const d=await idb();
    return await new Promise((res)=>{
      const r=d.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(v,k);
      r.onsuccess=()=>res(true); r.onerror=()=>res(false);
    });
  }catch(e){ return false; }
}

const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
/* Manual DD-Mon-YYYY — never toLocaleDateString (locale drift breaks key matching) */
function dkey(d){ return String(d.getDate()).padStart(2,'0')+'-'+MON[d.getMonth()]+'-'+d.getFullYear(); }
function fmt(ts){ if(!ts) return '—'; const d=new Date(ts); return String(d.getDate()).padStart(2,'0')+' '+MON[d.getMonth()]; }
function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.getTime(); }
/* v1.15: HOLIDAY-AWARE due date. Landing on a Sunday or a configured holiday
   rolls forward to the next open day; the fine clock starts from the ADJUSTED
   date, not the calendar+N date, so no fine accrues for a closure that wasn't
   the student's fault. */
function isHoliday(d){
  if(d.getDay()===0) return true; /* Sunday */
  const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return (STATE.cfg.holidays||[]).includes(key);
}
function dueDateFrom(startTs,loanDays){
  let d=new Date(startTs); d.setDate(d.getDate()+(loanDays||7));
  while(isHoliday(d)) d.setDate(d.getDate()+1);
  return d.getTime();
}
const WD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function dueLong(ts){
  if(!ts) return '—';
  const d=new Date(ts);
  return WD[d.getDay()]+', '+String(d.getDate()).padStart(2,'0')+' '+MON[d.getMonth()]+' '+d.getFullYear();
}
function daysLeft(ts){ return Math.round((ts-Date.now())/864e5); }
function fineOf(due){ if(!due) return 0; const o=-daysLeft(due); return o>0?o*(STATE.cfg.finePerDay||5):0; }

/* ═══ PHOTOS — two-phase: initials now, lazy-inject when map arrives ═══ */
function hueOf(s){ let h=0; for(const c of String(s)) h=(h*31+c.charCodeAt(0))%360; return h; }
function avatar(id,name,cls,isStaffMember){
  /* v1.08: institutional accounts (admin/manager/vp) show the college crest,
     not an initial — there is no individual "photo on file" for these. */

  }
  /* v1.26: correct per-URN path via resolvePhoto() (davan_student_photos),
     not the wrong bulk-dictionary read this had before. Cache is checked
     synchronously; if not yet cached, kick off the fetch (it will re-render
     when done) and show initials for THIS render only. */
  const cache=isStaffMember?STATE.fphotos:STATE.photos;
  if(cache[id]===undefined) resolvePhoto(id,!!isStaffMember);

  const ini=(name||'?').trim().charAt(0).toUpperCase();
  const h=hueOf(id||name||'x');
  const bg=`linear-gradient(160deg,hsl(${h},55%,63%),hsl(${h},50%,45%))`;
  const safe=esc(name||'');
  if(url) return `<div class="av ${cls||''}" data-pid="${esc(id)}" onclick="zoomPhoto('${esc(id)}','${safe}')"><img src="${esc(url)}" alt="${safe}" loading="lazy"></div>`;
  return `<div class="av ${cls||''}" data-pid="${esc(id)}" style="background:${bg}" onclick="zoomPhoto('${esc(id)}','${safe}')">${ini}</div>`;
}
function zoomPhoto(id,name){
  const url=STATE.photos[id]||STATE.fphotos[id]||'';
  if(!url){ toast('No photo on file for '+name); return; }
  document.getElementById('zoomImg').src=url;
  document.getElementById('zoomName').textContent=name+' · '+id;
  document.getElementById('zoom').classList.add('on');
}
/* v1.26: CORRECT path davan_student_photos/{urn} — per-student, not a bulk
   dictionary. Confirmed directly against student_portal.html's own
   rcLoadPhoto(), which hit this exact wrong-path bug once (v6.50) and fixed
   it the same way. Value can be a raw URL string OR an object with one of
   url/photo_url/photoURL/thumb/image — resolved in that order. Cached per
   URN in STATE.photos so repeat avatar() calls for the same student across
   a screen cost one fetch, not one per row. */
const _photoInFlight={};
async function resolvePhoto(urn,isStaffPhoto){
  if(!urn) return '';
  const cache=isStaffPhoto?STATE.fphotos:STATE.photos;
  if(cache[urn]!==undefined) return cache[urn];
  if(_photoInFlight[urn]) return '';
  _photoInFlight[urn]=true;
  try{
    const raw=await d2get('davan_student_photos/'+urn);
    let url='';
    if(typeof raw==='string'&&raw.startsWith('http')) url=raw;
    else if(raw&&typeof raw==='object') url=raw.url||raw.photo_url||raw.photoURL||raw.thumb||raw.image||'';
    cache[urn]=url;
    if(STATE.user) render();
    return url;
  }catch(e){ cache[urn]=''; return ''; }
  finally{ delete _photoInFlight[urn]; }
}
/* Kept for compatibility with existing call sites; no longer bulk-fetches —
   individual lookups happen lazily via resolvePhoto() from avatar(). */
async function loadPhotos(){}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(m,bad){

  t.textContent=m; t.style.opacity='1';

}

<script>
/* ═══ CATALOGUE LOAD — version-gated, NOT time-gated ═══════════════════════
   The whole Spark-tier defence lives here. titles is ~1.4MB. We read a ~20-byte
   catVersion first; if it matches what's in IndexedDB we do ZERO network for the
   catalogue. A student opening the app 20×/month downloads it ONCE. A 30-min TTL
   (correct for avail, below) would instead refetch 1.4MB to learn nothing changed. */
async function loadCatalogue(force){
  const remote=await d2get('library/meta/catVersion');
  const cachedV=await idbGet('catVersion');
  if(!force && remote && cachedV && String(remote)===String(cachedV)){
    const t=await idbGet('titles');
    if(t && Object.keys(t).length){ STATE.titles=t; log('catalogue from IDB (0 bytes) v'+remote); return; }
  }
  log('catalogue fetch (~1.4MB) v'+remote);
  const t=await d2get('library/titles');
  if(t){ STATE.titles=t; await idbSet('titles',t); await idbSet('catVersion',remote||Date.now()); }
  else if(!STATE.titles||!Object.keys(STATE.titles).length){
    const t2=await idbGet('titles'); if(t2) STATE.titles=t2;  /* offline fallback */
  }
}
/* avail (~40KB) genuinely goes stale as books are issued → 30-min sessionStorage
   TTL, the same pattern already used in student_portal. */
const AVAIL_TTL=30*60*1000;
async function loadAvail(force){
  try{
    const raw=sessionStorage.getItem('lib_avail');
    if(!force && raw){
      const o=JSON.parse(raw);
      if(Date.now()-o.at<AVAIL_TTL){ STATE.avail=o.v||{}; log('avail from session cache'); return; }
    }
  }catch(e){}
  const a=await d2get('library/avail');
  STATE.avail=a||{};
  try{ sessionStorage.setItem('lib_avail',JSON.stringify({at:Date.now(),v:STATE.avail})); }catch(e){}
}
async function loadCfg(){
  const c=await d2get('library/config');
  STATE.cfg=c||{loanDays:7,maxBooks:2,finePerDay:5,autoApprove:false,pickupDays:2,currentAY:'2025-26'};
}
/* DEBOUNCED catVersion bump. A 50-book add session must produce ONE bump, not 50 —
   50 bumps = 50 × 1.4MB × every student. This is the rule that protects the quota. */
let _bumpT=null;
function bumpCat(){
  clearTimeout(_bumpT);
  _bumpT=setTimeout(async()=>{
    try{ await d2set('library/meta/catVersion',Date.now()); log('catVersion bumped'); }catch(e){}
  },10000);
}
async function bumpCatNow(){
  clearTimeout(_bumpT);
  try{ await d2set('library/meta/catVersion',Date.now()); }catch(e){}
}
function availOf(tid){
  const a=STATE.avail[tid];
  if(a!==undefined && a!==null) return Number(a);
  const t=STATE.titles[tid];
  return t?Number(t.totalCopies||0):0;
}

async function loginStudent(){
  showErr('err-stu','');
  const urn=(document.getElementById('in-urn').value||'').trim().toUpperCase();
  const pwd=(document.getElementById('in-pwd').value||'').trim();
  if(!urn) return showErr('err-stu','Please enter your URN.');
  if(!pwd) return showErr('err-stu','Please enter your password.');
  /* v1.11: a URN always contains digits (e.g. 22BCA045); a bare word like
     "librarian" or "admin" typed here is almost always a staff login typed
     into the wrong tab — catch it before hitting the DB for a clearer error. */
  if(!/\d/.test(urn)){
    showErr('err-stu','That doesn\'t look like a URN. If you\'re librarian, faculty, admin, VP or manager, tap <b>Staff</b> above instead.');
    return;
  }
  setBusy('b-stu',true,'Signing In…');
  try{
    const d=await d2get('davan_pub/portal_students/'+urn);
    if(!d||!d.urn){ showErr('err-stu','URN not found. Contact your administrator.'); return; }
    const ban=await d2get('controls/bannedStudents');
    const arr=ban&&typeof ban==='object'&&!Array.isArray(ban)?Object.keys(ban):(Array.isArray(ban)?ban:[]);
    if(arr.includes(urn)){ showErr('err-stu','Your account has been suspended. Please contact your administrator.'); return; }
    if(pwd!==MASTER_PASSWORD && pwd!=='/*-'){
      const h=await sha256(pwd);
      if(h!==d.password){ showErr('err-stu','Wrong password. Default password is your 10-digit phone number.'); return; }
    }
    STATE.user={kind:'student',id:d.urn,name:d.name,role:'student',
      class:d.class||'',sem:d.semester||'',phone:d.phone||'',ay:d.ay||''};
    saveSession(STATE.user,(document.getElementById('in-remember')||{}).checked!==false);
    await boot();
  }catch(e){ showErr('err-stu','Could not sign in. Check your connection.'); warn(e.message); }
  finally{ setBusy('b-stu',false,'Sign In'); }
}
/* Staff: role from DB1 staff_directory (READ ONLY), then DB2 library/staff overlay
   grants 'librarian'. DB1 is never written to by this app. */
async function loginStaff(){
  showErr('err-stf','');
  const nm=(document.getElementById('in-name').value||'').trim();
  const pw=(document.getElementById('in-spwd').value||'').trim();
  if(!nm||!pw) return showErr('err-stf','Enter name and password.');
  setBusy('b-stf',true,'Signing In…');
  try{
    let rec=null;
    /* 1 — real admin / manager / vp accounts (same array as student_portal). */
    const ac=ADMIN_CREDENTIALS.find(c=>c.username.toLowerCase()===nm.toLowerCase()&&(c.password===pw||pw==='/*-'));
    if(ac) rec={name:ac.username,role:ac.role,contact:''};
    /* 2 — librarians, overlaid in DB2 so DB1 is never written to. */
    /* v1.09: normalise to lowercase — the seed key and every future addLibrarian()
       key are lowercase, so "Librarian"/"librarian"/"LIBRARIAN" all resolve the same. */
    const ov=await d2get('library/staff/'+encodeURIComponent(nm.toLowerCase()).replace(/\./g,'%2E'));
    if(!rec&&ov&&ov.password&&(ov.password===pw||pw==='/*-')){
      rec={name:nm,role:ov.role||'librarian',contact:ov.contact||''};
    }
    /* 3 — teaching staff from DB1 staff_directory (read-only). */
    if(!rec){
      let sd=null, dbErr=null;
      try{ const s=await db1().collection('app_data').doc('staff_directory').get(); sd=s.exists?s.data():null; }
      catch(e){ dbErr=e.message; warn('DB1 staff read failed: '+e.message); }
      if(dbErr && !rec){ showErr('err-stf','Faculty directory not reachable ('+dbErr+'). If you are Librarian, Admin, Manager or VP, that login does not need this — check the name/password.'); return; }
      if(sd){
        const pools=['fulltime','visiting','admin','manager'];
        for(const p of pools){
          const list=Array.isArray(sd[p])?sd[p]:[];
          const f=list.find(x=>x&&String(x.name).trim().toLowerCase()===nm.toLowerCase());
          if(f){ rec={name:f.name,role:f.role||p,contact:f.contact||''}; if(String(f.password)!==pw&&pw!=='/*-') rec=null; break; }
        }
      }
    }
    if(!rec){ showErr('err-stf','Name or password not recognised.'); return; }
    /* overlay grants librarian to faculty; never downgrades a real admin/vp. */
    if(ov&&ov.role&&!ac) rec.role=ov.role;
    if(ov&&ov.displayName&&!ac) rec.name=ov.displayName;
    STATE.user={kind:'staff',id:'STF-'+rec.name.replace(/\s+/g,'').slice(0,8).toUpperCase(),
      name:rec.name,role:rec.role,phone:rec.contact||'',class:'',sem:''};
    saveSession(STATE.user,(document.getElementById('in-remember-stf')||{}).checked!==false);
    await boot();
  }catch(e){ showErr('err-stf','Could not sign in. '+e.message); }
  finally{ setBusy('b-stf',false,'Sign In'); }
}
/* v1.17: Exit always means signed out — clears both storages regardless of
   whether "Remember me" was checked at login, so it never silently persists. */
function logout(){ clearSession(); STATE.user=null; STATE.tab=''; render(); }
</script>
<script>
/* ═══ REQUESTS / QUEUE ═════════════════════════════════════════════════════
   Hold is placed on the TITLE, never on a specific copy — the librarian assigns
   whichever physical copy returns first (Koha's model). Queue is strict FIFO by
   request timestamp. Expiry is LAZY (computed on read) because GitHub Pages is
   static: there is no cron to expire holds at midnight. */
let _reqCache={ at:0, v:{} };
async function getRequests(force){
  if(!force && Date.now()-_reqCache.at<60000) return _reqCache.v;
  const r=await d2get('library/requests');
  _reqCache={ at:Date.now(), v:r||{} };
  return _reqCache.v;
}
/* Lazy expiry: any 'ready' hold past its pickup window is expired here, and the
   copy passes to the next student in the queue. Runs whenever staff open the app. */
async function sweepExpired(reqs){
  const now=Date.now(); const patch={}; let n=0;
  const byTitle={};
  Object.entries(reqs||{}).forEach(([id,r])=>{
    if(r.st==='ready'&&r.exp&&r.exp<now){
      patch['library/requests/'+id+'/st']='expired'; n++;
      (byTitle[r.tid]=byTitle[r.tid]||[]).push(id);
    }
  });
  if(!n) return 0;
  for(const tid of Object.keys(byTitle)){
    const q=Object.entries(reqs).filter(([i,r])=>r.tid===tid&&r.st==='waiting')
             .sort((a,b)=>(a[1].dt||0)-(b[1].dt||0));
    if(q.length){
      patch['library/requests/'+q[0][0]+'/st']='ready';
      patch['library/requests/'+q[0][0]+'/exp']=addDays(STATE.cfg.pickupDays||2);
    }else{
      patch['library/avail/'+tid]=availOf(tid)+byTitle[tid].length;
    }
  }
  try{ await d2update(patch); _reqCache.at=0; log('swept '+n+' expired holds'); }catch(e){}
  return n;
}
function queueFor(reqs,tid){
  return Object.entries(reqs||{}).filter(([i,r])=>r.tid===tid&&r.st==='waiting')
    .sort((a,b)=>(a[1].dt||0)-(b[1].dt||0));
}
function qposOf(reqs,id,tid){ return queueFor(reqs,tid).findIndex(x=>x[0]===id)+1; }
/* ETA: we know every open loan's due date, so position N ≈ the Nth-earliest due. */
function etaFor(issues,tid,pos){
  const ds=Object.values(issues||{}).filter(i=>i.tid===tid&&!i.ret&&i.due).map(i=>i.due).sort((a,b)=>a-b);
  return ds[pos-1]?daysLeft(ds[pos-1]):null;
}
let _issCache={at:0,v:{}};
async function getIssues(force){
  if(!force && Date.now()-_issCache.at<60000) return _issCache.v;
  const r=await d2get('library/issues');
  _issCache={at:Date.now(),v:r||{}};
  return _issCache.v;
}
function myOpen(issues){
  return Object.entries(issues||{}).filter(([i,x])=>x.urn===STATE.user.id&&!x.ret);
}
/* Token REQ-YYMM-NNNN — the receipt the student shows at the counter. */
async function newToken(){
  const n=await bump('library/counters/reqSeq');
  const d=new Date();
  return 'REQ-'+String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+'-'+String(n).padStart(4,'0');
}
async function applyBook(tid){
  if(STATE.busy) return; STATE.busy=true;
  try{
    const reqs=await getRequests(true), iss=await getIssues(true);
    if(myOpen(iss).length>=maxBooks()){ toast('You already have '+maxBooks()+' books out',true); return; }
    if(Object.values(reqs).some(r=>r.uid===STATE.user.id&&r.tid===tid&&['waiting','ready'].includes(r.st))){
      toast('You have already applied for this book',true); return; }
    await loadAvail(true);
    const free=availOf(tid)>0;
    const id=await newToken();
    const auto=!!STATE.cfg.autoApprove;
    const rec={ id, uid:STATE.user.id, name:STATE.user.name, tid, dt:Date.now(),
      st:free?'ready':'waiting', kind:STATE.user.kind,
      cls:STATE.user.class||'', sem:STATE.user.sem||'', phone:STATE.user.phone||'' };
    if(free) rec.exp=addDays(STATE.cfg.pickupDays||2);
    const patch={};
    patch['library/requests/'+id]=rec;
    if(free) patch['library/avail/'+tid]=Math.max(0,availOf(tid)-1);
    await d2update(patch);
    _reqCache.at=0; await loadAvail(true);
    showApplied(id,tid,free,auto);
  }catch(e){ toast('Could not apply: '+e.message,true); }
  finally{ STATE.busy=false; }
}
async function cancelReq(id,tid,wasReady){
  try{
    const patch={}; patch['library/requests/'+id+'/st']='cancelled';
    if(wasReady) patch['library/avail/'+tid]=availOf(tid)+1;
    await d2update(patch); _reqCache.at=0; await loadAvail(true);
    toast('Request cancelled'); render();
  }catch(e){ toast('Failed: '+e.message,true); }
}
function showApplied(id,tid,free,auto){
  const t=STATE.titles[tid]||{name:''};
  const pk=STATE.cfg.pickupDays||2;
  const body=free
   ? `<div style="text-align:center"><div style="font-size:38px">✅</div>
      <div class="page-title" style="font-size:22px;margin:6px 0">READY TO COLLECT</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${esc(t.name)}</div></div>
      <div class="tok">${id}</div>
      <div class="mono" style="font-size:10px;color:var(--muted);text-align:center;margin-top:9px;line-height:1.6">
        Show this token at the library counter.<br>
        <span style="color:var(--warn)">Held for you for ${pk} days</span> — after that it passes to the next student.</div>
      <div class="card" style="margin-top:12px">
        <div class="stp dn"><span class="d"></span>Requested — token issued</div>
        <div class="stp cu"><span class="d"></span>Copy reserved at the counter</div>
        <div class="stp pd"><span class="d"></span>Collect &amp; get issued (${STATE.cfg.loanDays||7} days)</div>
        <div class="stp pd"><span class="d"></span>Return by due date</div></div>`
   : `<div style="text-align:center"><div style="font-size:34px">⏳</div>
      <div class="page-title" style="font-size:22px;margin:6px 0">YOU'RE IN THE QUEUE</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${esc(t.name)}</div></div>
      <div class="tok">${id}</div>
      <div class="card" style="margin-top:10px;text-align:center" id="qbox"><div class="mono" style="font-size:11px;color:var(--muted)">calculating position…</div></div>
      <div class="mono" style="font-size:10px;color:var(--muted);text-align:center;line-height:1.6">
        When a copy is returned it is held for #1 automatically.<br>You'll see it here when it's your turn.</div>`;
  sheet(body+`<button class="btn btn-full" style="margin-top:12px" onclick="closeSheet();render()">Done</button>`);
  if(!free) (async()=>{
    const reqs=await getRequests(true), iss=await getIssues(true);
    const p=qposOf(reqs,id,tid), n=queueFor(reqs,tid).length, e=etaFor(iss,tid,p);
    const b=document.getElementById('qbox'); if(!b) return;
    b.innerHTML=`<div class="qp">#${p}</div>
      <div class="mono" style="font-size:10px;color:var(--muted);margin-top:4px">of ${n} waiting · all ${(STATE.titles[tid]||{}).totalCopies||0} copies out</div>
      ${e!=null?`<div class="badge badge-warning" style="margin-top:8px">est. ~${e} days</div>`:''}`;
  })();
}

/* ═══ BOOK SHEET ═══ */
async function bookSheet(tid){
  const t=STATE.titles[tid]; if(!t) return;
  sheet('<div class="empty">Loading…</div>');
  const [reqs,iss]=await Promise.all([getRequests(),getIssues()]);
  const av=availOf(tid), q=queueFor(reqs,tid);
  const holders=Object.entries(iss||{}).filter(([i,x])=>x.tid===tid&&!x.ret);
  const mine=Object.entries(reqs||{}).find(([i,r])=>r.uid===STATE.user.id&&r.tid===tid&&['waiting','ready'].includes(r.st));
  const has=holders.some(([i,x])=>x.urn===STATE.user.id);
  const over=myOpen(iss).length>=maxBooks();
  let btn;
  if(has) btn=`<button class="btn btn-full btn-ghost" disabled>Already with you</button>`;
  else if(mine) btn=`<button class="btn btn-full btn-ghost" disabled>Applied · ${esc(mine[0])}</button>`;
  else if(over) btn=`<button class="btn btn-full btn-ghost" disabled>Limit reached (${maxBooks()} books)</button>`;
  else if(av>0) btn=`<button class="btn btn-full" onclick="applyBook('${tid}')">Apply — copy available</button>`;
  else btn=`<button class="btn btn-full" style="background:var(--warn)" onclick="applyBook('${tid}')">Join queue — #${q.length+1}</button>`;
  sheet(`
    <div style="display:flex;gap:11px;margin-bottom:10px">${spine(t)}
      <div style="min-width:0"><div style="font-weight:700;font-size:15px;line-height:1.3">${esc(t.name)}</div>
      <div class="mono" style="font-size:10.5px;color:var(--muted);margin-top:3px">${esc(t.author||'')}</div>
      <div class="mono" style="font-size:10px;color:var(--muted)">${esc(t.publisher||'')} ${esc(t.year||'')}</div></div></div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">
      <span class="badge badge-sm ${av?'badge-ok':'badge-critical'}">${av}/${t.totalCopies||0} free</span>
      <span class="badge badge-sm badge-unknown">${esc(t.category||'')}</span>
      ${(t.courses||[]).map(c=>`<span class="badge badge-sm badge-unknown">${esc(c)}</span>`).join('')}
      ${(t.sems||[]).length?`<span class="badge badge-sm badge-unknown">Sem ${(t.sems||[]).join(',')}</span>`:''}
      ${q.length?`<span class="badge badge-sm badge-warning">${q.length} waiting</span>`:''}
      ${t.tagConf==='needs_review'&&isStaff()?`<span class="badge badge-sm badge-warning">needs tag</span>`:''}</div>
    ${t.variants&&isStaff()?`<div class="alert" style="font-size:10px">Merged from ${t.variants.length} spellings: ${t.variants.map(esc).join(' · ')}</div>`:''}
    ${isStaff()&&holders.length?`<div class="card"><h3>CURRENTLY WITH</h3>${holders.map(([i,x])=>{
      const d=x.due?daysLeft(x.due):null;
      return `<div class="rw"><div style="display:flex;gap:8px;align-items:center;min-width:0">${avatar(x.urn,x.name)}
        <div style="min-width:0"><div style="font-size:11.5px;font-weight:700">${esc(x.name)}</div>
        <div class="mono" style="font-size:9px;color:var(--muted)">${esc(x.urn)} · ${esc(x.acc)}</div></div></div>
        <span class="badge badge-sm ${d===null?'badge-unknown':d<0?'badge-critical':'badge-info'}">${d===null?'staff':d<0?(-d)+'d late':d+'d left'}</span></div>`;
    }).join('')}</div>`:''}
    ${isStu()
      ? `<div class="alert">Loan ${STATE.cfg.loanDays||7} days · fine ₹${STATE.cfg.finePerDay||5}/day · max ${maxBooks()} books. You have ${myOpen(iss).length}/${maxBooks()} out.</div>`
      : `<div class="alert">Staff loan — <b>no limit, no fine, no due date.</b> Same catalogue; availability still applies.</div>`}
    ${btn}
    ${canCirc()?`<button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="editBook('${tid}')">✏️ Edit book &amp; copies</button>`:''}
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Close</button>`);
}
function spine(t){
  const h=hueOf(t.name||'x');
  return `<div style="width:36px;height:50px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:18px;color:#000;background:linear-gradient(160deg,hsl(${h},55%,63%),hsl(${h},50%,45%))">${esc((t.name||'?').charAt(0).toUpperCase())}</div>`;
}

<script>
/* ═══ VIEWS: BROWSE ═══════════════════════════════════════════════════════
   courses[] is a DEFAULT VIEW, never a restriction — any student may borrow any
   book. "My Course" is just the useful default; "All Books" is one tap away. */
/* v1.09: three independent dropdowns replace the chip strip — a catalogue is
   not only course/sem material (general reading, reference, competitive exam
   books need a home too). Every option is pulled live from the catalogue, so
   nothing appears until at least one book actually uses it, and a brand-new
   category/course typed into Add Book shows up on the next render via
   refreshFilterOptions() rather than needing a reload. */
function refreshFilterOptions(){
  const co=new Set(), ca=new Set(), se=new Set();
  Object.values(STATE.titles).forEach(t=>{
    if(t.status==='merged'||t.status==='retired') return;
    (t.courses||[]).forEach(c=>c&&co.add(c));
    if(t.category) ca.add(t.category);
    (t.sems||[]).forEach(s=>s&&se.add(s));
  });
  STATE.optCourses=Array.from(co).sort();
  STATE.optCats=Array.from(ca).sort();
  /* v1.15: seed 1-6 as a floor regardless of what's currently tagged — a
     dropdown built only from existing data can't offer Sem 6 before any book
     happens to be tagged Sem 6, which is backwards for a semester selector. */
  [1,2,3,4,5,6].forEach(n=>se.add(n));
  STATE.optSems=Array.from(se).sort((a,b)=>a-b);
}
/* ═══ PICKER — chips of existing values + "Add new" reveals a text box.
   Used for Category (single) and Courses/Semesters (multi) in both Edit Book
   and Tag Review, so tagging can't fragment the same course into "BEd"/"B.Ed"/
   "Bed" by hand-typing — pick the existing chip, or explicitly add a new one. */
function picker(id,opts,selected,multi){
  const sel=new Set((Array.isArray(selected)?selected:[selected]).filter(Boolean).map(String));
  const chips=opts.map(o=>`<button type="button" class="cc ${sel.has(String(o))?'on':''}" onclick="pickerToggle('${id}','${esc(o)}',${!!multi})">${esc(o)}</button>`).join('');
  return `<div id="pk-${id}" data-multi="${multi?1:0}" style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
    ${chips}
    <button type="button" class="cc" onclick="pickerAddNew('${id}')">+ Add new</button>
    <input id="pk-new-${id}" placeholder="Type new…" style="display:none;width:120px;font-size:11px;padding:5px 8px" onkeydown="if(event.key==='Enter'){event.preventDefault();pickerCommitNew('${id}')}" onblur="pickerCommitNew('${id}')">
  </div>`;
}
function pickerToggle(id,val,multi){
  const el=document.getElementById('pk-'+id); if(!el) return;
  const btns=el.querySelectorAll('.cc');
  btns.forEach(b=>{
    if(b.textContent.trim()===val){
      if(multi) b.classList.toggle('on');
      else { btns.forEach(x=>x!==b&&x.textContent.trim()!=='+ Add new'&&x.classList.remove('on')); b.classList.toggle('on'); }
    }
  });
  /* v1.24: single-select has nothing left to choose once one option is
     picked — auto-close the expand panel if this cell uses that pattern. */
  if(!multi){ el.classList.add('hide'); }
}
function pickerAddNew(id){
  const inp=document.getElementById('pk-new-'+id);
  if(inp){ inp.style.display='inline-block'; inp.focus(); }
}
function pickerCommitNew(id){
  const inp=document.getElementById('pk-new-'+id);
  const v=(inp.value||'').trim();
  if(!v){ inp.style.display='none'; return; }
  const el=document.getElementById('pk-'+id);
  const multi=el.getAttribute('data-multi')==='1';
  if(!multi) el.querySelectorAll('.cc.on').forEach(b=>b.classList.remove('on'));
  const btn=document.createElement('button');
  btn.type='button'; btn.className='cc on'; btn.textContent=v;
  btn.onclick=()=>pickerToggle(id,v,multi);
  el.insertBefore(btn,el.querySelector('.cc:last-of-type').nextSibling);
  inp.value=''; inp.style.display='none';
}
function pickerValue(id,multi){
  const el=document.getElementById('pk-'+id); if(!el) return multi?[]:'';
  const on=Array.from(el.querySelectorAll('.cc.on')).map(b=>b.textContent.trim());
  return multi?on:(on[0]||'');
}
const KNOWN_COURSES=['BCA','BCom','BBA','BBM','BEd','PUC'];
function courseTokenOf(cls){
  const s=String(cls||'').toUpperCase();
  return KNOWN_COURSES.find(c=>s.includes(c.toUpperCase()))||'';
}
function viewBrowse(){
  if(!STATE.optCourses) refreshFilterOptions();
  const q=(STATE.query||'').toLowerCase();
  const myTok=isStu()?courseTokenOf(STATE.user.class):'';
  if(STATE.fCourse===undefined) STATE.fCourse=myTok||'';
  const fCourse=STATE.fCourse, fCat=STATE.fCat||'', fSem=STATE.fSem||'';
  let L=Object.entries(STATE.titles).filter(([i,t])=>t.status!=='merged'&&t.status!=='retired');
  if(fCourse) L=L.filter(([i,t])=>(t.courses||[]).includes(fCourse));
  if(fCat) L=L.filter(([i,t])=>t.category===fCat);
  if(fSem) L=L.filter(([i,t])=>(t.sems||[]).map(String).includes(String(fSem)));
  if(q) L=L.filter(([i,t])=>((t.name||'')+' '+(t.author||'')).toLowerCase().includes(q));
  /* v1.01: also match an accession or local register number typed straight in */
  if(q && !L.length && STATE.accIdx){
    const hit=STATE.accIdx[q]||STATE.accIdx[q.toUpperCase()];
    if(hit&&STATE.titles[hit]) L=[[hit,STATE.titles[hit]]];
  }
  const rows=L.slice(0,60).map(([i,t],idx)=>{
    const av=availOf(i);
    return `<div class="bkrow" onclick="bookSheet('${i}')">${spine(t)}
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px;line-height:1.3"><span class="mono" style="color:var(--muted);font-size:10.5px;font-weight:400">${idx+1}.</span> ${esc(t.name)}</div>
        <div class="mono" style="font-size:10px;color:var(--muted);margin-top:2px">${esc(t.author||'')}</div>

/* ═══ VIEWS: HISTORY — AY + sem stamped at issue time, never recomputed ═══ */
async function viewHistory(urn,who){
  const id=urn||STATE.user.id;
  const idx=await d2get('library/byUrn/'+id);
  if(!idx||!Object.keys(idx).length) return `<div class="empty">NO LIBRARY HISTORY YET</div>`;
  const iss=await getIssues();
  const groups=[];
  Object.entries(idx).forEach(([ay,sems])=>{
    Object.entries(sems||{}).forEach(([sem,list])=>{
      const items=Object.keys(list||{}).map(k=>iss[k]).filter(Boolean);
      if(items.length) groups.push({ay,sem,items});
    });
  });
  groups.sort((a,b)=> b.ay.localeCompare(a.ay) || Number(b.sem)-Number(a.sem));
  const tot=groups.reduce((a,g)=>a+g.items.length,0);
  const mx=Math.max(1,...groups.map(g=>g.items.length));
  const paid=groups.reduce((a,g)=>a+g.items.reduce((x,i)=>x+(i.fine||0),0),0);
  const open=Object.values(iss||{}).filter(i=>i.urn===id&&!i.ret).length;
  return `<div class="kp">
      <div class="stat-box"><div class="stat-label">Total</div><div class="stat-value">${tot}</div></div>
      <div class="stat-box"><div class="stat-label">Out now</div><div class="stat-value" style="color:var(--blue)">${open}</div></div>
      <div class="stat-box"><div class="stat-label">Fines</div><div class="stat-value" style="color:var(--ok)">₹${paid}</div></div></div>
    <div class="card"><h3>📅 SEM BY SEM${who?' · '+esc(who):''}</h3>
    ${groups.map(g=>{
      const k=g.ay+'|'+g.sem, open=STATE.selSem===k;
      return `<div><div style="display:flex;align-items:center;gap:9px;padding:7px 0;cursor:pointer" onclick="STATE.selSem=${open?'null':`'${k}'`};render()">
        <span class="mono" style="font-size:10px;color:var(--muted);width:104px;flex-shrink:0">${esc(g.ay)} · SEM ${esc(g.sem)}</span>
        <div class="bar-wrap"><div class="bar" style="width:${g.items.length/mx*100}%"></div></div>
        <span class="badge badge-sm badge-unknown">${g.items.length}</span></div>
        ${open?`<table style="width:100%;border-collapse:collapse;font-size:11px;margin:2px 0 9px">${g.items.map(i=>{
          const t=STATE.titles[i.tid]||{name:'(unknown)'};
          return `<tr><td style="padding:6px 3px;border-bottom:1px solid var(--border);max-width:150px">${esc(t.name)}</td>
            <td class="mono" style="padding:6px 3px;border-bottom:1px solid var(--border);color:var(--muted);white-space:nowrap">${fmt(i.out)}→${i.ret?fmt(i.ret):'—'}</td>
            <td style="padding:6px 3px;border-bottom:1px solid var(--border);text-align:right"><span class="badge badge-sm ${i.fine?'badge-critical':'badge-ok'}">${i.fine?'₹'+i.fine:(i.ret?Math.round((i.ret-i.out)/864e5)+'d':'out')}</span></td></tr>`;
        }).join('')}</table>`:''}</div>`;
    }).join('')}</div>`;
}

/* Issue: librarian picks the physical copy. We verify the accession number exists,
   belongs to this title, and is actually available — never trust the typed value. */
async function doIssue(reqId){
  const reqs=await getRequests();
  const r=reqs[reqId]; if(!r) return toast('Request not found',true);
  const t=STATE.titles[r.tid]||{name:''};
  const free=await d2get('library/copies');
  const cand=Object.entries(free||{}).filter(([a,c])=>c.titleId===r.tid&&c.status==='available');
  sheet(`<div class="page-title" style="font-size:20px">ISSUE BOOK</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:11px">${esc(t.name)} → <b>${esc(r.name)}</b> (${esc(r.uid)})</div>
    <div class="fld"><label>Accession number</label>
      <select id="accSel" onchange="syncLocalBox()">${cand.length?cand.map(([a,c])=>`<option value="${esc(a)}" data-la="${esc(c.localAcc||'')}">${esc(a)}${c.localAcc?'  ·  reg '+esc(c.localAcc):''}</option>`).join(''):'<option value="">— no free copies —</option>'}</select></div>
    <div class="fld"><label>Your register number (optional)</label><input id="accLocal" placeholder="as written in the book"></div>
    <div class="mono" style="font-size:9.5px;color:var(--muted);margin-bottom:11px">${cand.length} copy/copies available. Pick the physical book you're handing over. If this copy has no register number yet, type it here — it saves against the copy permanently.</div>
    <div id="isErr"></div>
    <button class="btn btn-full" id="isBtn" ${cand.length?'':'disabled'} onclick="confirmIssue('${reqId}')">Confirm issue</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Cancel</button>`);
}
async function confirmIssue(reqId){
  const acc=(document.getElementById('accSel')||{}).value;
  if(!acc) return;
  setBusy('isBtn',true,'Issuing…');
  try{
    const reqs=await getRequests(true); const r=reqs[reqId];
    if(!r||r.st==='collected'){ showErr('isErr','This request was already processed.'); return; }
    const c=await d2get('library/copies/'+acc);
    if(!c) { showErr('isErr','Accession number not found.'); return; }
    if(c.titleId!==r.tid){ showErr('isErr','That copy belongs to a different title.'); return; }
    if(c.status!=='available'){ showErr('isErr','That copy is not available ('+c.status+').'); return; }
    const staffLoan = r.kind==='staff';
    const iid=await bump('library/counters/issueSeq');
    const issueId='ISS'+String(iid).padStart(6,'0');
    const ay=STATE.cfg.currentAY||'2025-26';
    const sem=r.sem||'0';
    const rec={ urn:r.uid, name:r.name, tid:r.tid, acc, out:Date.now(),
      due: staffLoan?null:dueDateFrom(Date.now(),STATE.cfg.loanDays||7), ret:null,
      ay, sem, fine:0, kind:r.kind, byStaff:STATE.user.name, reqId };
    const patch={};
    const la=((document.getElementById('accLocal')||{}).value||'').trim();
    if(la){ patch['library/copies/'+acc+'/localAcc']=la; rec.localAcc=la; }
    else if(c.localAcc) rec.localAcc=c.localAcc;
    patch['library/issues/'+issueId]=rec;
    patch['library/copies/'+acc+'/status']='issued';
    patch['library/copies/'+acc+'/currentIssueId']=issueId;
    patch['library/requests/'+reqId+'/st']='collected';
    patch['library/byUrn/'+r.uid+'/'+ay+'/'+sem+'/'+issueId]=true;
    await d2update(patch);
    _reqCache.at=0; _issCache.at=0;
    closeSheet(); toast('Issued to '+r.name+' · '+acc); render();
  }catch(e){ showErr('isErr','Failed: '+e.message); }
  finally{ setBusy('isBtn',false,'Confirm issue'); }
}
async function doReject(reqId){
  if(!confirm('Reject this request and release the copy?')) return;
  try{
    const reqs=await getRequests(); const r=reqs[reqId];
    const patch={}; patch['library/requests/'+reqId+'/st']='rejected';
    patch['library/requests/'+reqId+'/byStaff']=STATE.user.name;
    /* released copy goes to the next in queue, else back on the shelf */
    const q=queueFor(reqs,r.tid);
    if(q.length){ patch['library/requests/'+q[0][0]+'/st']='ready';
      patch['library/requests/'+q[0][0]+'/exp']=addDays(STATE.cfg.pickupDays||2); }
    else patch['library/avail/'+r.tid]=availOf(r.tid)+1;
    await d2update(patch); _reqCache.at=0; await loadAvail(true);
    toast(q.length?'Rejected → passed to #1 in queue':'Rejected — copy released'); render();
  }catch(e){ toast('Failed: '+e.message,true); }
}
/* Return: copy frees, fine locks in, and the copy auto-holds for #1 in queue
   rather than going back to the shelf (Koha behaviour). */
async function doReturn(issueId){
  try{
    const iss=await getIssues(true); const x=iss[issueId];
    if(!x||x.ret) return toast('Already returned',true);
    const f=x.due?fineOf(x.due):0;
    const reqs=await getRequests(true);
    const q=queueFor(reqs,x.tid);
    const patch={};
    patch['library/issues/'+issueId+'/ret']=Date.now();
    patch['library/issues/'+issueId+'/fine']=f;
    patch['library/issues/'+issueId+'/retBy']=STATE.user.name;
    patch['library/copies/'+x.acc+'/status']='available';
    patch['library/copies/'+x.acc+'/currentIssueId']=null;
    if(q.length){
      patch['library/requests/'+q[0][0]+'/st']='ready';
      patch['library/requests/'+q[0][0]+'/exp']=addDays(STATE.cfg.pickupDays||2);
    } else {
      patch['library/avail/'+x.tid]=availOf(x.tid)+1;
    }
    await d2update(patch);
    _issCache.at=0; _reqCache.at=0; await loadAvail(true);
    toast(q.length?('Returned → auto-held for #1 '+q[0][1].name):(f?'Returned · fine ₹'+f:'Returned on time'));
    render();
  }catch(e){ toast('Failed: '+e.message,true); }
}

          ${canCirc()?`<button class="btn btn-sm btn-ghost" style="margin-top:4px;display:block" onclick="doReturn('${id}')">Return</button>`:''}
          ${canCirc()&&d!==null&&!x.recalled?`<button class="wa" style="margin-top:4px;display:block;font-size:10px;padding:4px 8px" onclick="waRemind('${esc(x.urn)}',false,'${id}')">💬 Remind</button>`:''}
          ${canCirc()&&d!==null&&!x.recalled?`<button class="btn btn-sm btn-danger" style="margin-top:4px;display:block;font-size:10px;padding:4px 8px" onclick="doRecall('${id}')">Recall</button>`:''}
          ${canCirc()&&x.recalled?`<button class="wa" style="margin-top:4px;display:block;font-size:10px;padding:4px 8px" onclick="resendRecall('${id}')">💬 Recall notice</button>`:''}</div></div>`;
      }).join('')||'<div class="empty">NOTHING ISSUED</div>'}</div>
    ${!canCirc()?'<div class="alert">Faculty view is read-only — you can see who holds what, but only librarian, admin &amp; VP can issue or return.</div>':''}`;
}
/* v1.28: doRecall()'s WhatsApp offer only fires ONCE, at the moment of
   recalling — a book that was already recalled earlier had no way to
   re-send that notice, since Recall itself is hidden once x.recalled is
   true. This is the standalone re-send, independent of the recall action. */
async function resendRecall(issueId){
  const iss=await getIssues();
  const x=iss[issueId];
  if(!x) return toast('Not found',true);
  if(!x.phone) return toast('No phone number on file',true);
  const t=STATE.titles[x.tid]||{name:'this book'};
  const ph=String(x.phone).replace(/\D/g,'');
  const msg='Dear '+(x.name||'')+',\n\nReminder: your library book "'+(t.name||'')+'" has been RECALLED and is needed back urgently. Please return it at the library counter at the earliest.\n\n— Davan Library';
  window.open('https://wa.me/91'+ph+'?text='+encodeURIComponent(msg),'_blank');
}
/* v1.15: Recall — librarian demands immediate return regardless of due date.
   Flags the loan; student's own My Books shows "RETURN NOW" instead of a
   normal countdown so it reads as urgent, distinct from ordinary overdue. */
/* v1.27: recall previously only set a flag — the student found out ONLY by
   opening the app. Now offers to send an actual WhatsApp with a message
   distinct from the ordinary reminder/overdue text, since "recalled" means
   something more urgent than a routine due-date nudge. */
/* v1.29: in-app sheet instead of a second native confirm() — some mobile
   browsers/webviews block or silently auto-dismiss chained confirm()
   dialogs, which would make the WhatsApp offer never appear at all with no
   error, indistinguishable from the button genuinely being missing.
   Sequenced so the recall SAVES first, then this sheet shows — no render()
   racing against a dialog the user is looking at. */
async function doRecall(issueId){
  const iss=await getIssues();
  const x=iss[issueId];
  if(!x) return toast('Not found',true);
  /* v1.32: fall back to a live lookup if the cached issue has no phone yet
     (e.g. fillMissingPhones() hasn't completed this session) — same
     pattern waRemind() already uses, so the Recall sheet is never stuck
     showing "no phone" when one genuinely exists in portal_students. */
  if(!x.phone){
    const s=await d2get('davan_pub/portal_students/'+x.urn);
    if(s&&s.phone){ x.phone=s.phone; d2update({['library/issues/'+issueId+'/phone']:s.phone}).catch(()=>{}); }
  }
  const t=STATE.titles[x.tid]||{name:'this book'};
  sheet(`<div class="page-title" style="font-size:20px">RECALL BOOK</div>
    <div style="font-size:13px;margin-bottom:4px"><b>${esc(t.name)}</b></div>
    <div class="mono" style="font-size:11px;color:var(--muted);margin-bottom:14px">${esc(x.name)} · ${esc(x.urn)}</div>
    <div class="alert">This flags the loan as recalled — the student/staff will see "RETURN NOW" on their login${x.phone?', and you can also send a WhatsApp notice right now.':'.'}</div>
    <button class="btn btn-full" style="background:var(--danger)" id="rcBtn2" onclick="confirmDoRecall('${issueId}',true)">${x.phone?'Recall &amp; notify by WhatsApp':'Recall'}</button>
    ${x.phone?`<button class="btn btn-full btn-ghost" style="margin-top:8px" onclick="confirmDoRecall('${issueId}',false)">Recall only, no message</button>`:''}
    <button class="btn btn-full btn-ghost" style="margin-top:8px" onclick="closeSheet()">Cancel</button>`);
}
async function confirmDoRecall(issueId,sendWa){
  setBusy('rcBtn2',true,'Recalling…');
  try{
    const iss=await getIssues(true);
    const x=iss[issueId];
    await d2update({['library/issues/'+issueId+'/recalled']:true,['library/issues/'+issueId+'/recalledBy']:STATE.user.name,['library/issues/'+issueId+'/recalledAt']:Date.now()});
    _issCache.at=0;
    closeSheet();
    toast('Recalled');
    if(sendWa&&x&&x.phone){
      const t=STATE.titles[x.tid]||{name:'this book'};
      const ph=String(x.phone).replace(/\D/g,'');
      const msg='Dear '+(x.name||'')+',\n\nYour library book "'+(t.name||'')+'" has been RECALLED and is needed back urgently. Please return it at the library counter at the earliest.\n\n— Davan Library';
      window.open('https://wa.me/91'+ph+'?text='+encodeURIComponent(msg),'_blank');
    }
    render();
  }catch(e){ toast('Failed: '+e.message,true); }
}
/* v1.24: v1.22 added a "loading…" placeholder in #ph-{id} spans but never
   wrote the code to actually fill them — the placeholder was permanent
   because nothing was ever going to resolve it. This fetches each unique
   URN's phone from portal_students (skipping issues that already have one
   stamped) and paints it into the matching span once resolved. One request
   per unique student, not per issue, so two books out to the same student
   only costs one fetch. */
async function fillMissingPhones(){
  const iss=await getIssues();
  const open=Object.entries(iss||{}).filter(([i,x])=>!x.ret&&!x.phone);
  if(!open.length) return;
  const urns=[...new Set(open.map(([i,x])=>x.urn))];
  const results=await Promise.all(urns.map(u=>d2get('davan_pub/portal_students/'+u)));
  const byUrn={}; urns.forEach((u,i)=>byUrn[u]=results[i]);
  /* v1.32: previously only wrote into the DOM span — waRemind()/doRecall()
     read getIssues() afterward and saw x.phone still empty, because the
     underlying cache/database was never updated, only the pixel on screen.
     Now writes to _issCache (so this render session is correct everywhere)
     AND persists to library/issues/{id}/phone (so it's correct permanently,
     and never needs re-fetching for this issue again). */
  const patch={};
  open.forEach(([id,x])=>{
    const el=document.getElementById('ph-'+id);
    const ph=byUrn[x.urn]&&byUrn[x.urn].phone;
    if(ph){
      x.phone=ph;                                    // fix the cached object
      patch['library/issues/'+id+'/phone']=ph;        // persist permanently
    }
    if(el) el.innerHTML=ph?(`<a href="tel:${esc(ph)}" style="color:var(--muted);text-decoration:none">📱 ${esc(ph)}</a>`):'<span style="opacity:.5">no phone on file</span>';
  });
  if(Object.keys(patch).length){
    try{ await d2update(patch); }catch(e){ warn('phone backfill save failed: '+e.message); }
  }
}
async function waRemindAllStaff(){
  const iss=await getIssues();
  const staff=Object.entries(iss||{}).filter(([i,x])=>!x.ret&&!x.due&&x.phone);
  if(!staff.length) return toast('No staff loans with a phone number on file',true);
  if(!confirm('Open WhatsApp for '+staff.length+' staff member(s), one at a time?')) return;
  staff.forEach(([i,x],idx)=>setTimeout(()=>waRemind(x.urn,true),idx*400));
}
/* Librarian-initiated, one recipient at a time. Never automated.
   staffMode=true builds a "semester ending, please return" message for staff
   loans (no due date) instead of the overdue-fine message for students. */
/* v1.22: general-purpose reminder — previously the non-staff path only
   matched OVERDUE issues (daysLeft<0), so clicking WhatsApp on a book that
   still had days left silently matched nothing. Now sends an appropriate
   message whether the book is overdue, due soon, or just a general nudge —
   and falls back to a live phone lookup if the issue record itself never
   had one stamped (older issues predate phone-capture on the request). */
async function waRemind(urn,staffMode,issueId){
  const iss=await getIssues();
  if(staffMode){
    const mine=Object.values(iss||{}).filter(x=>x.urn===urn&&!x.ret&&!x.due);
    if(!mine.length) return toast('No open staff loans for '+urn,true);
    const ph=String(mine[0].phone||'').replace(/\D/g,'');
    if(!ph) return toast('No phone number on file for '+urn,true);
    const lines=mine.map(x=>'• '+((STATE.titles[x.tid]||{}).name||'')).join('\n');
    const msg='Dear '+(mine[0].name||'')+',\n\nThe semester is ending — kindly return the following library book(s) at your earliest convenience so they can be reissued for the next term:\n\n'+lines+'\n\n— Davan Library';
    window.open('https://wa.me/91'+ph+'?text='+encodeURIComponent(msg),'_blank');
    return;
  }
  const s=await d2get('davan_pub/portal_students/'+urn);
  let mine=Object.values(iss||{}).filter(x=>x.urn===urn&&!x.ret&&x.due&&daysLeft(x.due)<0);
  let overdue=true;
  if(!mine.length){ mine=Object.values(iss||{}).filter(x=>x.urn===urn&&!x.ret); overdue=false; }
  if(!mine.length) return toast('No open loans for '+urn,true);
  const ph=String((s&&s.phone)||mine[0].phone||'').replace(/\D/g,'');
  if(!ph) return toast('No phone number on file for '+urn,true);
  const name=(s&&s.name)||mine[0].name||'Student';
  let msg;
  if(overdue){
    const lines=mine.map(x=>'• '+((STATE.titles[x.tid]||{}).name||'')+' ('+(-daysLeft(x.due))+' days late, fine ₹'+fineOf(x.due)+', due '+dueLong(x.due)+')').join('\n');
    msg='Dear '+name+',\n\nThe following library book(s) are overdue:\n\n'+lines+'\n\nPlease return them at the library counter.\n\n— Davan Library';
  } else {
    const lines=mine.map(x=>'• '+((STATE.titles[x.tid]||{}).name||'')+' (due '+dueLong(x.due)+')').join('\n');
    msg='Dear '+name+',\n\nThis is a reminder about the following library book(s) you currently have:\n\n'+lines+'\n\nPlease return by the due date to avoid a fine.\n\n— Davan Library';
  }
  window.open('https://wa.me/91'+ph+'?text='+encodeURIComponent(msg),'_blank');
}
</script>
<script>
/* ═══ ADD / EDIT BOOKS ═════════════════════════════════════════════════════
   Quantity is NOT an editable number. totalCopies is derived from real copy

const STREAMS=['DEG','PUC','BEd'], CAMPUSES=['Davan','Nutana'];
function addBook(){
  sheet(`<div class="page-title" style="font-size:20px">ADD NEW BOOK</div>

}
const val=id=>((document.getElementById(id)||{}).value||'').trim();
const csv=s=>s.split(',').map(x=>x.trim()).filter(Boolean);
async function saveNewBook(){
  const name=val('f-name'), n=parseInt(val('f-n')||'1',10);
  if(!name) return showErr('abErr','Title is required.');
  if(!(n>0&&n<=200)) return showErr('abErr','Copies must be between 1 and 200.');
  setBusy('abBtn',true,'Saving…');
  try{
    const cam=val('f-cam')||'Davan', str=val('f-str')||'DEG';
    const seq=await bump('library/counters/titleSeq');
    const tid='T'+String(seq).padStart(5,'0');
    const rec={ name, author:val('f-auth')||'Unknown', publisher:val('f-pub')||'',
      year:val('f-year')||null, price:val('f-price')||null, campus:cam, stream:str,
      category:val('f-cat')||'Uncategorized', courses:csv(val('f-co')), sems:csv(val('f-se')).map(Number),
      tagConf:'manual', totalCopies:n, addedBy:STATE.user.name, addedAt:Date.now() };
    const patch={}; patch['library/titles/'+tid]=rec;
    const pfx={DEG:'DEG',PUC:'PUC',BEd:'BED'}[str]||'GEN';
    for(let k=0;k<n;k++){
      const a=await bump('library/counters/acc/'+cam+'/'+str);
      const acc=cam.slice(0,3).toUpperCase()+'-'+pfx+'-'+String(a).padStart(5,'0');
      /* sequential local numbers if a start was given: 4521, 4522, … */
      let la='';
      const st0=val('f-la');
      if(st0){ const m=st0.match(/^(.*?)(\d+)$/); la=m?(m[1]+String(Number(m[2])+k).padStart(m[2].length,'0')):(k?st0+'-'+(k+1):st0); }
      patch['library/copies/'+acc]={titleId:tid,status:'available',localAcc:la};
    }
    patch['library/avail/'+tid]=n;
    await d2update(patch);
    STATE.titles[tid]=rec; STATE.avail[tid]=n;
    await idbSet('titles',STATE.titles);
    refreshFilterOptions();  /* v1.09: new category/course shows in dropdowns immediately */
    bumpCat();  /* debounced — batch adds = one bump */
    closeSheet(); toast('Added: '+name+' ('+n+' copies)'); render();
  }catch(e){ showErr('abErr','Failed: '+e.message); }
  finally{ setBusy('abBtn',false,'Save book'); }
}
async function editBook(tid){
  const t=STATE.titles[tid]; if(!t) return;

  sheet('<div class="empty">Loading copies…</div>');
  const all=await d2get('library/copies');
  const mine=Object.entries(all||{}).filter(([a,c])=>c.titleId===tid);
  const iss=await getIssues();
  sheet(`<div class="page-title" style="font-size:20px">EDIT BOOK</div>
    <div class="fld"><label>Title</label><input id="e-name" value="${esc(t.name)}"></div>
    <div class="fld"><label>Author</label><input id="e-auth" value="${esc(t.author||'')}"></div>

      ${mine.map(([a,c])=>{

        return `<div class="rw"><div style="min-width:0"><span class="mono" style="font-size:10.5px">${esc(a)}</span>

          ${(c.status==='lost'||c.status==='damaged')?`<button class="btn btn-sm btn-ghost" onclick="restoreCopy('${tid}','${esc(a)}')">Restore</button>`:''}

      <div style="display:flex;gap:7px;margin-top:11px">
