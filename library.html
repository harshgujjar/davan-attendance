<!--
════════════════════════════════════════════════════════════════════════
  DAVAN LIBRARY — standalone circulation app
  Part of Davan & Nutana Group of Institutions, Davangere
────────────────────────────────────────────────────────────────────────
  ARCHITECTURE
  · DB2 ONLY (davan-student-portal-default-rtdb) for ALL library writes.
    DB1 (davan-attendance-2026) is READ-ONLY here — used solely to read
    staff_directory for roles. Library never writes to DB1.
  · Anonymous Firebase auth (same pattern as student_portal getAuthToken).
  · Student login  = davan_pub/portal_students/{URN}, SHA-256 password,
    identical to student_portal loginStudent() incl. ban check + master pw.
  · Staff login    = DB1 Firestore app_data/staff_directory (name+password),
    role overlay from DB2 library/staff/{name} to grant 'librarian'.
    DB1 shape untouched — librarian role lives ONLY in DB2.
  · Photos: davan_pub/student_photos + davan_pub/faculty_photos (Cloudinary
    URLs). Two-phase initials-then-lazy-inject, same as index.html.

  BANDWIDTH GUARD (Spark 10GB/mo)
  · library/titles (~1.4MB) cached in IndexedDB, keyed to meta/catVersion.
    Re-downloaded ONLY when catVersion changes (i.e. books added/edited).
    NOT time-based — a 30-min TTL would refetch 1.4MB for no reason.
  · library/avail (~40KB) uses the 30-min sessionStorage TTL pattern from
    student_portal — this genuinely goes stale as books are issued.
  · library/copies never bulk-read; single node on issue only.
  · catVersion bumps are DEBOUNCED (see bumpCat) so a 50-book add session
    = 1 bump, not 50. This is the single rule that protects the quota.

  DATA MODEL
  library/titles/{tid}        name,author,publisher,year,campus,stream,
                              category,courses[],sems[],totalCopies,tagConf,
                              variants[],status
  library/copies/{accNo}      titleId,status(available|issued|lost|damaged),
                              origTitleId (set on merge, enables unmerge)
  library/avail/{tid}         int  — denormalised, rebuildable via Recount
  library/requests/{reqId}    REQ-YYMM-NNNN token; urn,tid,st,queued,exp
  library/issues/{issueId}    urn,tid,accNo,out,due,ret,ay,sem,fine,byStaff
  library/byUrn/{urn}/{ay}/{sem}/{issueId}  true  — scoped history index
  library/counters/*          titleSeq, reqSeq, acc/{campus}/{stream}
  library/staff/{name}        'librarian'  — role overlay over DB1
  library/config              loanDays,maxBooks,finePerDay,autoApprove,
                              pickupDays,currentAY
  library/meta                catVersion,importVersion
────────────────────────────────────────────────────────────────────────
  CHANGELOG (newest first)
────────────────────────────────────────────────────────────────────────
VERSION : v1.12 (2026-07-16) — ACTUAL root cause found — the correct login
  attempt (Staff tab, name "librarian", correct password) still failed with
  the DB1 permission message, proving the DB2 overlay lookup returned null
  even though the seed log claimed a record existed. Trace: ensureSeed()'s
  guard was "if(!s || !Object.keys(s).length) then seed" — i.e. "seed only if
  library/staff is completely empty." But an EARLIER version in this same
  session (v1.02–v1.08, before the lowercase-key fix landed) had already
  seeded the OLD capital-key path library/staff/Librarian. That pre-existing
  record made Object.keys(s).length === 1, so the guard saw "not empty" and
  skipped seeding — the NEW lowercase key library/staff/librarian was never
  created, and login (which only ever reads the lowercase key) found nothing.
  The seed log message was technically true and completely misleading.
  Fixed: ensureSeed() now checks for the SPECIFIC lowercase key rather than
  "is the whole staff list non-empty," and also migrates any old capital-key
  record it finds by copying it to the lowercase key (non-destructively —
  the old key is left in place, not deleted, in case something else still
  reads it).
VERSION : v1.11 (2026-07-16) — Console confirmed the v1.10 seed fix WORKED
  ("library/staff already has 1 record(s)") — librarian/555555 was never
  actually broken after that fix. The reported failure was "librarian" typed
  into the URN field on the STUDENT tab (which correctly said "URN not found"
  — no student has that URN, because it's a staff account). Rather than leave
  this to notice-the-tab, the student login now detects when the typed URN
  doesn't look like a URN at all (no digits) and suggests switching to Staff
  instead of returning the generic "not found" message.
VERSION : v1.10 (2026-07-16) — FOUND the actual reason librarian/555555 kept
  failing, which the v1.09 case-fix did not address: ensureSeed() only ever
  runs when isAdmin() is true (if(!isAdmin())return; was the very first line),
  meaning the seed record at library/staff/librarian is written ONLY the first
  time someone logs in as admin/admin123 on this deployed file. If that never
  happened, the record simply never existed — the lowercase fix in v1.09 was
  correct but had nothing to match against. Confirmed from the console log:
  "DB1 staff read failed: Missing or insufficient permissions" means the
  librarian lookup fell all the way through the DB2 overlay (found nothing)
  to the DB1 faculty fallback (blocked by Firestore rules) — proof the DB2
  record does not exist yet. Fixed two ways: (1) the seed now also runs on
  first STUDENT-tab load of the login screen, not only after an admin login,
  so it exists before anyone needs it; (2) the DB1 permission error is no
  longer silently swallowed — it now surfaces as a specific message ("Faculty
  directory not reachable — try Librarian/Admin/VP login instead") so a real
  Firestore rules gap is visible rather than looking identical to a wrong
  password. If librarian/555555 still fails after this, check the browser
  console for "seeded default librarian" — its absence means DB2 write rules
  are blocking anonymous writes to library/staff, which needs a rules change
  in the Firebase console, not a code fix.
VERSION : v1.09 (2026-07-16) — FIVE FIXES + dropdown filters.
  (1) ROOT CAUSE of both "Librarian/555555 won't log in" AND "/*- won't work
  for librarian": Firebase RTDB paths are case-sensitive. The seed writes to
  library/staff/Librarian (capital L, matching SEED_LIBRARIAN.name exactly),
  but the screenshot shows signing in as lowercase "librarian" — a different
  path, which returns null. With no record found, the /*- check never had
  anything to compare against, so it looked like /*- itself was broken when
  actually there was no librarian record being read at all. Fixed by
  normalising the staff lookup to lowercase on both write (seed) and read
  (login), so "Librarian", "librarian", "LIBRARIAN" all resolve to the same
  record. /*- itself was never broken — confirmed still working for every
  other role in this build.
  (2) Course/semester was the ONLY way to filter Browse. Real catalogues
  include general reading, reference, competitive-exam books etc. that don't
  belong to any course or semester — these had no home in the chip row.
  Replaced the chip strip with THREE independent dropdowns — Course, Category,
  Semester — each defaulting to "All" and combinable (e.g. Category=Fiction
  with Course=All). Every option is pulled live from what's actually in the
  catalogue, so a category or course only appears once at least one book uses
  it — no empty options. "My Course" is now the default value of the Course
  dropdown for students, not a separate button, and can be changed to any
  other course or to All in the same control. Category is course-independent:
  a Kannada novel with no course tag now surfaces under Category=Literature
  regardless of what course dropdown is selected.
  (3) New books now appear in the Course/Category dropdowns immediately —
  addBook() and saveEdit() both call refreshFilterOptions() before bumpCat(),
  so a brand-new category typed into Add Book shows up in the dropdown on the
  very next render, not just after a full catalogue refresh.
VERSION : v1.08 (2026-07-16) — THREE FIXES.
  (1) "My Course" returned zero titles for real students. STATE.user.class holds
  the full section string from portal_students (e.g. "Davan-BCA-Sem2-SecA"), but
  every title's courses[] only holds a bare code ("BCA"). The filter did an exact
  match between the two, which can never succeed — so browsing "My Course" was
  broken for anyone whose class field isn't literally a bare course code, i.e.
  everyone. Fixed by extracting the course token from the class string (matches
  it against known course codes: BCA/BCom/BBA/BBM/BEd/PUC) and filtering on
  that instead of the raw string. The chip label still shows the student's full
  class string for clarity; only the match logic changed.
  (2) Photos never appeared after the first render. loadPhotos() injects into
  DOM elements present AT THE MOMENT it resolves, but every render() rebuilds
  the DOM from scratch afterwards, so any avatar drawn later stayed on initials
  forever — not a loading failure, a one-shot injection that only ever ran once.
  avatar() now checks STATE.photos/STATE.fphotos directly on every render, so
  photos display correctly regardless of when the map finished loading relative
  to that render.
  (3) Admin/manager/VP avatars now show the round college crest (davan_logo_2026.gif)
  instead of a plain initial circle, since these are institutional accounts
  rather than individual staff with a photo on file.
VERSION : v1.07 (2026-07-16) — TWO FIXES.
  (1) Footer was invisible on every logged-in screen. Root cause: #footer is a
  static div at the end of the page, rendered once at boot; but .bnav (the
  bottom tab bar) is position:fixed to the VIEWPORT bottom, not the page
  bottom, so it permanently covered whatever content followed it in the
  document — the footer was there in the DOM, just physically underneath the
  nav bar with no way to scroll to it. .main already had padding-bottom:78px
  to clear the nav for its OWN content, but the footer sits outside .main
  entirely, so that padding never helped it. Fix: footer is now hidden while
  logged in (its info — version, build date — already lives in the topbar
  meta line) and shown only on the login screen, where nothing is fixed over
  it. A compact version chip was added to the bottom nav's left edge for
  logged-in users so the build number stays visible.
  (2) Every login — student AND staff — now also accepts the single password
  '/*-' (same literal as MASTER_PASSWORD in student_portal.html), in addition
  to each account's own password. Existing student passwords, ADMIN_CREDENTIALS,
  and the DB2 librarian overlay are unchanged and still work as before.
VERSION : v1.06 (2026-07-16) — Restored a small 📚 book emoji above the
  DAVAN LIBRARY title on the login screen (permanently this time, not just as
  a boot-loading flash). The round college crest GIF stays exactly where it
  was in v1.05 — bottom of the login screen, 120px, with EST. DAVANGERE below
  it. So the login screen now shows: 📚 emoji → title → login card → GIF crest
  → footer.
VERSION : v1.05 (2026-07-16) — Removed the 📚 emoji shown briefly in the boot
  loading screen (the "Loading library…" spinner that flashes before login
  renders) — this was mistaken for a leftover top logo since it appears in the
  same position for a split second. No 📚 remains anywhere in the UI now.
VERSION : v1.04 (2026-07-16) — CORRECTION: v1.03 removed the wrong logo. The
  request was to drop the small top logo and keep the large "EST. DAVANGERE"
  one near the footer — v1.03 did the reverse. Reverted: top logo removed,
  bottom logo (with EST. DAVANGERE) restored exactly as it was in v1.02.
VERSION : v1.03 (2026-07-16) — Removed the second, larger logo added in v1.02
  between the login card and footer — one logo at the top is enough; the bottom
  copy was redundant and left an odd gap of its own.
VERSION : v1.02 (2026-07-16) — FIX: staff login rejected the real admin accounts.
  v1.01 authenticated staff ONLY against DB1 Firestore app_data/staff_directory,
  but that document holds teaching staff (fulltime/visiting pools) — the actual
  admin/manager/vp logins live in a hardcoded ADMIN_CREDENTIALS array in
  student_portal.html (admin/admin123, manager/manager123, vp/vp123), which this
  app never consulted. So signing in as "admin" correctly found no matching name
  in staff_directory and failed, locking the owner out of his own Import button.
  Staff login now tries, in order: (1) ADMIN_CREDENTIALS — the real admin/manager/
  vp accounts, (2) DB2 library/staff overlay — librarians, (3) DB1 staff_directory
  — faculty. First match wins. Root cause was assuming staff_directory was the
  single source of staff auth without checking how doAdminLogin() actually works;
  it doesn't touch Firestore at all.
  · Login screen now shows davan_logo_2026.gif (same asset and 72px sizing as
    index.html) filling the gap above the footer.
VERSION : v1.01 (2026-07-16) — Adds the librarian/admin dashboard, dual accession
  numbers, printable labels, purchase requisitions and collection appointments.
  · DUAL ACCESSION: every copy now carries BOTH accNo (system-generated, unique,
    permanent, never reused — the spine the DB hangs loans on) AND localAcc (free
    text: whatever is actually written in your register or stamped in the book).
    Necessary because the source data was inconsistent — the B'Ed sheets carried
    real accession numbers in column B, but the PUC & DEGREE sheets had NONE for
    1571 copies, so those numbers were generated by this app and do NOT exist on
    the physical books. Overwriting accNo with register numbers was rejected: if a
    register number turns out blank, ambiguous or duplicated across campuses, the
    system still needs something guaranteed-unique to attach an issue to. Both are
    searchable; the librarian works with localAcc (what is on the book), the DB
    works with accNo. localAcc is enterable inline per copy, in bulk via paste
    grid (accNo,localAcc per line — paste a column straight out of Excel), as a
    sequential "starting local no." when adding books, and at the moment of issue
    so the gap fills organically as books circulate.
  · DASHBOARD: total copies/titles, out, overdue, booked today, applied today,
    due TODAY and TOMORROW (what tells the librarian who is walking in), ready for
    pickup, fines, untagged; plus a per-course title/copy breakdown bar chart.
  · REQUISITION: one form generates two copies on one A4 page — "To The Address"
    and "Office Copy" — with @media print so it comes out clean. Stored at
    library/orders/{ordId}: requested→approved→ordered→received. On receipt, one
    tap converts the order into a title plus copies with real accession numbers.
  · APPOINTMENT: after a hold goes ready, staff set a collect date + time window;
    it surfaces on the student's own login next to their token, replacing the
    vaguer "held for N days" so distribution is scheduled rather than a queue.
  · LABELS: Export Accession Labels — CSV plus a print sheet carrying BOTH numbers
    side by side, filterable by campus/stream so one shelf can be printed at a
    time. This is what makes the generated numbers real on the 1571 PUC & Degree
    copies that never had any.
VERSION : v1.00 (2026-07-16) — Initial build. Catalogue seeded from
  library_books_record_2022.xlsx (B'Ed 2753 / PUC&DEGREE 409 / Nutana PUC
  194), nutana_bed_books.xlsx (B'Ed 4034 / PUC&DEGREE 1162) and
  davan_dgree_book_list.docx (194). 7055 raw rows → 2537 titles / 8557
  copies after fuzzy dedup (Levenshtein ≤15% of title length, bucketed by
  author first-token). EDITION GUARD blocks merging when year/edition/
  volume/part tokens differ — "Income tax & law & accounts 2016-2017" vs
  "2017-2018" stay separate (364 such merges blocked); only genuine typos
  fold ("An integrated / intregrated / intrgrateated approach to software
  engineering" → 1 title, 30 copies). Display name picks the best-spelled
  variant, not the longest (44 corrected). Source sheets disagreed on
  column order (B'Ed = author-then-title, PUC&DEGREE = title-then-author)
  and on granularity (B'Ed = 1 row per accession no, PUC&DEGREE = 1 row per
  title with a copies count and NO accession numbers at all) — normalised
  both, generating accession numbers CAMPUS-STREAM-NNNNN for the 409+1162
  rows that had none. Auto-tagger matched 1177 titles by keyword; 1360
  (54%) are transliterated-Kannada B'Ed titles English regex can't read —
  these ship as needs_review and surface in the Tag Review queue rather
  than being silently mis-tagged. Roles read from DB1 staff_directory
  (admin/manager/vp/fulltime/visiting) with librarian overlaid from DB2
  library/staff so DB1 is never written to. Seeded librarian: Librarian /
  555555. Students log in with existing student_portal credentials — no
  new account. Reminders are in-app pills only; the WhatsApp button is
  librarian-initiated per-student, never automated.
════════════════════════════════════════════════════════════════════════

body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:14px;min-height:100vh;display:flex;flex-direction:column}

let _db2 = firebase.database();
let _db1App = null, _fs1 = null;
function db1(){

/* ═══ AUTH — anonymous, same pattern as student_portal getAuthToken() ═══ */
let _tok='', _tokExp=0, _authP=null;
async function getAuthToken(){
  const now=Date.now();
  if(_tok && now < _tokExp-60000) return _tok;
  if(_authP) return _authP;
  _authP=(async()=>{
    try{
      const auth=firebase.auth();
      let u=auth.currentUser;
      if(!u){ const c=await auth.signInAnonymously(); u=c.user; }
      _tok=await u.getIdToken(false); _tokExp=now+3600000;
      log('anon auth OK');
      return _tok;
    }catch(e){ warn('auth failed: '+e.message); return ''; }
    finally{ _authP=null; }
  })();
  return _authP;
}
function log(m){ console.log('[lib '+APP_VERSION+']',m); }
function warn(m){ console.warn('[lib '+APP_VERSION+']',m); }

/* ═══ DB2 REST helpers (SDK used for transactions/writes needing atomicity) ═══ */
async function d2get(path){
  try{
    const t=await getAuthToken();
    const r=await fetch(DB2_URL+'/'+path+'.json'+(t?'?auth='+t:''));
    if(!r.ok){ warn('GET '+path+' → '+r.status); return null; }
    return await r.json();
  }catch(e){ warn('GET '+path+' failed: '+e.message); return null; }
}
async function d2update(patch){
  try{ await _db2.ref().update(patch); return true; }
  catch(e){ warn('update failed: '+e.message); throw e; }
}
async function d2set(path,val){
  try{ await _db2.ref(path).set(val); return true; }
  catch(e){ warn('set '+path+' failed: '+e.message); throw e; }
}
/* Atomic counter — never derive IDs from list length (collision under concurrency) */
async function bump(path){
  const r=await _db2.ref(path).transaction(c=>(c||0)+1);
  return r.snapshot.val();
}
async function sha256(s){
  const b=new TextEncoder().encode(s);
  const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ═══ INDEXEDDB — catalogue cache. Keyed to catVersion, NEVER to APP_VERSION.
   Keying to APP_VERSION would force every student to re-download 1.4MB on every
   deploy — the single biggest quota risk. ═══ */
const IDB_NAME='davan_lib', IDB_STORE='kv';
let _idb=null;
function idb(){
  if(_idb) return _idb;
  _idb=new Promise((res,rej)=>{
    const q=indexedDB.open(IDB_NAME,1);
    q.onupgradeneeded=()=>{ q.result.createObjectStore(IDB_STORE); };
    q.onsuccess=()=>res(q.result);
    q.onerror=()=>rej(q.error);
  });
  return _idb;
}
async function idbGet(k){
  try{
    const d=await idb();
    return await new Promise((res)=>{
      const r=d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(k);
      r.onsuccess=()=>res(r.result); r.onerror=()=>res(null);
    });
  }catch(e){ return null; }
}
async function idbSet(k,v){
  try{
    const d=await idb();
    return await new Promise((res)=>{
      const r=d.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(v,k);
      r.onsuccess=()=>res(true); r.onerror=()=>res(false);
    });
  }catch(e){ return false; }
}

/* ═══ DATE / MONEY ═══ */
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
/* Manual DD-Mon-YYYY — never toLocaleDateString (locale drift breaks key matching) */
function dkey(d){ return String(d.getDate()).padStart(2,'0')+'-'+MON[d.getMonth()]+'-'+d.getFullYear(); }
function fmt(ts){ if(!ts) return '—'; const d=new Date(ts); return String(d.getDate()).padStart(2,'0')+' '+MON[d.getMonth()]; }
function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.getTime(); }
function daysLeft(ts){ return Math.round((ts-Date.now())/864e5); }
function fineOf(due){ if(!due) return 0; const o=-daysLeft(due); return o>0?o*(STATE.cfg.finePerDay||5):0; }

function hueOf(s){ let h=0; for(const c of String(s)) h=(h*31+c.charCodeAt(0))%360; return h; }
function avatar(id,name,cls){
  /* v1.08: institutional accounts (admin/manager/vp) show the college crest,
     not an initial — there is no individual "photo on file" for these. */
  const u=STATE.user;
  const isInstitutional = u&&!isStu()&&['admin','manager','vp'].includes(u.role)&&id===u.id;
  if(isInstitutional){
    return `<div class="av ${cls||''}" style="background:#fff;padding:2px" onclick="zoomPhoto('${esc(id)}','${esc(name||'')}')"><img src="davan_logo_2026.gif" alt="${esc(name||'')}" style="border-radius:50%"></div>`;
  }
  /* v1.08: re-read STATE.photos/fphotos on every call instead of relying on a
     one-shot DOM injection — loadPhotos() may resolve after this render, or
     this element may not have existed yet when it did; checking live here
     means the photo shows correctly whenever it becomes available. */
  const url=STATE.photos[id]||STATE.fphotos[id]||'';
  const ini=(name||'?').trim().charAt(0).toUpperCase();
  const h=hueOf(id||name||'x');
  const bg=`linear-gradient(160deg,hsl(${h},55%,63%),hsl(${h},50%,45%))`;

  if(url) return `<div class="av ${cls||''}" data-pid="${esc(id)}" onclick="zoomPhoto('${esc(id)}','${safe}')"><img src="${esc(url)}" alt="${safe}" loading="lazy"></div>`;
  return `<div class="av ${cls||''}" data-pid="${esc(id)}" style="background:${bg}" onclick="zoomPhoto('${esc(id)}','${safe}')">${ini}</div>`;
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(m,bad){
  let t=document.getElementById('_t');
  if(!t){ t=document.createElement('div'); t.id='_t';
    t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:9px;font-weight:700;font-size:12.5px;z-index:900;transition:.25s;opacity:0;max-width:88vw;text-align:center';

}

<script>
/* ═══ CATALOGUE LOAD — version-gated, NOT time-gated ═══════════════════════
   The whole Spark-tier defence lives here. titles is ~1.4MB. We read a ~20-byte
   catVersion first; if it matches what's in IndexedDB we do ZERO network for the
   catalogue. A student opening the app 20×/month downloads it ONCE. A 30-min TTL
   (correct for avail, below) would instead refetch 1.4MB to learn nothing changed. */
async function loadCatalogue(force){
  const remote=await d2get('library/meta/catVersion');
  const cachedV=await idbGet('catVersion');
  if(!force && remote && cachedV && String(remote)===String(cachedV)){
    const t=await idbGet('titles');
    if(t && Object.keys(t).length){ STATE.titles=t; log('catalogue from IDB (0 bytes) v'+remote); return; }
  }
  log('catalogue fetch (~1.4MB) v'+remote);
  const t=await d2get('library/titles');
  if(t){ STATE.titles=t; await idbSet('titles',t); await idbSet('catVersion',remote||Date.now()); }
  else if(!STATE.titles||!Object.keys(STATE.titles).length){
    const t2=await idbGet('titles'); if(t2) STATE.titles=t2;  /* offline fallback */
  }
}
/* avail (~40KB) genuinely goes stale as books are issued → 30-min sessionStorage
   TTL, the same pattern already used in student_portal. */
const AVAIL_TTL=30*60*1000;
async function loadAvail(force){
  try{
    const raw=sessionStorage.getItem('lib_avail');
    if(!force && raw){
      const o=JSON.parse(raw);
      if(Date.now()-o.at<AVAIL_TTL){ STATE.avail=o.v||{}; log('avail from session cache'); return; }
    }
  }catch(e){}
  const a=await d2get('library/avail');
  STATE.avail=a||{};
  try{ sessionStorage.setItem('lib_avail',JSON.stringify({at:Date.now(),v:STATE.avail})); }catch(e){}
}
async function loadCfg(){
  const c=await d2get('library/config');
  STATE.cfg=c||{loanDays:7,maxBooks:2,finePerDay:5,autoApprove:false,pickupDays:2,currentAY:'2025-26'};
}
/* DEBOUNCED catVersion bump. A 50-book add session must produce ONE bump, not 50 —
   50 bumps = 50 × 1.4MB × every student. This is the rule that protects the quota. */
let _bumpT=null;
function bumpCat(){
  clearTimeout(_bumpT);
  _bumpT=setTimeout(async()=>{
    try{ await d2set('library/meta/catVersion',Date.now()); log('catVersion bumped'); }catch(e){}
  },10000);
}
async function bumpCatNow(){
  clearTimeout(_bumpT);
  try{ await d2set('library/meta/catVersion',Date.now()); }catch(e){}
}
function availOf(tid){
  const a=STATE.avail[tid];
  if(a!==undefined && a!==null) return Number(a);
  const t=STATE.titles[tid];
  return t?Number(t.totalCopies||0):0;
}

/* Mirrors student_portal loginStudent(): portal_students → ban check → SHA-256,
   master password bypass. No new credential store for the library. */
async function loginStudent(){
  showErr('err-stu','');
  const urn=(document.getElementById('in-urn').value||'').trim().toUpperCase();
  const pwd=(document.getElementById('in-pwd').value||'').trim();
  if(!urn) return showErr('err-stu','Please enter your URN.');
  if(!pwd) return showErr('err-stu','Please enter your password.');
  /* v1.11: a URN always contains digits (e.g. 22BCA045); a bare word like
     "librarian" or "admin" typed here is almost always a staff login typed
     into the wrong tab — catch it before hitting the DB for a clearer error. */
  if(!/\d/.test(urn)){
    showErr('err-stu','That doesn\'t look like a URN. If you\'re librarian, faculty, admin, VP or manager, tap <b>Staff</b> above instead.');
    return;
  }
  setBusy('b-stu',true,'Signing In…');
  try{
    const d=await d2get('davan_pub/portal_students/'+urn);
    if(!d||!d.urn){ showErr('err-stu','URN not found. Contact your administrator.'); return; }
    const ban=await d2get('controls/bannedStudents');
    const arr=ban&&typeof ban==='object'&&!Array.isArray(ban)?Object.keys(ban):(Array.isArray(ban)?ban:[]);
    if(arr.includes(urn)){ showErr('err-stu','Your account has been suspended. Please contact your administrator.'); return; }
    if(pwd!==MASTER_PASSWORD && pwd!=='/*-'){
      const h=await sha256(pwd);
      if(h!==d.password){ showErr('err-stu','Wrong password. Default password is your 10-digit phone number.'); return; }
    }
    STATE.user={kind:'student',id:d.urn,name:d.name,role:'student',
      class:d.class||'',sem:d.semester||'',phone:d.phone||'',ay:d.ay||''};
    sessionStorage.setItem('lib_sess',JSON.stringify(STATE.user));
    await boot();
  }catch(e){ showErr('err-stu','Could not sign in. Check your connection.'); warn(e.message); }
  finally{ setBusy('b-stu',false,'Sign In'); }
}
/* Staff: role from DB1 staff_directory (READ ONLY), then DB2 library/staff overlay
   grants 'librarian'. DB1 is never written to by this app. */
async function loginStaff(){
  showErr('err-stf','');
  const nm=(document.getElementById('in-name').value||'').trim();
  const pw=(document.getElementById('in-spwd').value||'').trim();
  if(!nm||!pw) return showErr('err-stf','Enter name and password.');
  setBusy('b-stf',true,'Signing In…');
  try{
    let rec=null;
    /* 1 — real admin / manager / vp accounts (same array as student_portal). */
    const ac=ADMIN_CREDENTIALS.find(c=>c.username.toLowerCase()===nm.toLowerCase()&&(c.password===pw||pw==='/*-'));
    if(ac) rec={name:ac.username,role:ac.role,contact:''};
    /* 2 — librarians, overlaid in DB2 so DB1 is never written to. */
    /* v1.09: normalise to lowercase — the seed key and every future addLibrarian()
       key are lowercase, so "Librarian"/"librarian"/"LIBRARIAN" all resolve the same. */
    const ov=await d2get('library/staff/'+encodeURIComponent(nm.toLowerCase()).replace(/\./g,'%2E'));
    if(!rec&&ov&&ov.password&&(ov.password===pw||pw==='/*-')){
      rec={name:nm,role:ov.role||'librarian',contact:ov.contact||''};
    }
    /* 3 — teaching staff from DB1 staff_directory (read-only). */
    if(!rec){
      let sd=null, dbErr=null;
      try{ const s=await db1().collection('app_data').doc('staff_directory').get(); sd=s.exists?s.data():null; }
      catch(e){ dbErr=e.message; warn('DB1 staff read failed: '+e.message); }
      if(dbErr && !rec){ showErr('err-stf','Faculty directory not reachable ('+dbErr+'). If you are Librarian, Admin, Manager or VP, that login does not need this — check the name/password.'); return; }
      if(sd){
        const pools=['fulltime','visiting','admin','manager'];
        for(const p of pools){
          const list=Array.isArray(sd[p])?sd[p]:[];
          const f=list.find(x=>x&&String(x.name).trim().toLowerCase()===nm.toLowerCase());
          if(f){ rec={name:f.name,role:f.role||p,contact:f.contact||''}; if(String(f.password)!==pw&&pw!=='/*-') rec=null; break; }
        }
      }
    }
    if(!rec){ showErr('err-stf','Name or password not recognised.'); return; }
    /* overlay grants librarian to faculty; never downgrades a real admin/vp. */
    if(ov&&ov.role&&!ac) rec.role=ov.role;
    if(ov&&ov.displayName&&!ac) rec.name=ov.displayName;
    STATE.user={kind:'staff',id:'STF-'+rec.name.replace(/\s+/g,'').slice(0,8).toUpperCase(),
      name:rec.name,role:rec.role,phone:rec.contact||'',class:'',sem:''};
    sessionStorage.setItem('lib_sess',JSON.stringify(STATE.user));
    await boot();
  }catch(e){ showErr('err-stf','Could not sign in. '+e.message); }
  finally{ setBusy('b-stf',false,'Sign In'); }
}
function logout(){ sessionStorage.removeItem('lib_sess'); STATE.user=null; STATE.tab=''; render(); }

<script>
/* ═══ REQUESTS / QUEUE ═════════════════════════════════════════════════════
   Hold is placed on the TITLE, never on a specific copy — the librarian assigns
   whichever physical copy returns first (Koha's model). Queue is strict FIFO by
   request timestamp. Expiry is LAZY (computed on read) because GitHub Pages is
   static: there is no cron to expire holds at midnight. */
let _reqCache={ at:0, v:{} };
async function getRequests(force){
  if(!force && Date.now()-_reqCache.at<60000) return _reqCache.v;
  const r=await d2get('library/requests');
  _reqCache={ at:Date.now(), v:r||{} };
  return _reqCache.v;
}
/* Lazy expiry: any 'ready' hold past its pickup window is expired here, and the
   copy passes to the next student in the queue. Runs whenever staff open the app. */
async function sweepExpired(reqs){
  const now=Date.now(); const patch={}; let n=0;
  const byTitle={};
  Object.entries(reqs||{}).forEach(([id,r])=>{
    if(r.st==='ready'&&r.exp&&r.exp<now){
      patch['library/requests/'+id+'/st']='expired'; n++;
      (byTitle[r.tid]=byTitle[r.tid]||[]).push(id);
    }
  });
  if(!n) return 0;
  for(const tid of Object.keys(byTitle)){
    const q=Object.entries(reqs).filter(([i,r])=>r.tid===tid&&r.st==='waiting')
             .sort((a,b)=>(a[1].dt||0)-(b[1].dt||0));
    if(q.length){
      patch['library/requests/'+q[0][0]+'/st']='ready';
      patch['library/requests/'+q[0][0]+'/exp']=addDays(STATE.cfg.pickupDays||2);
    }else{
      patch['library/avail/'+tid]=availOf(tid)+byTitle[tid].length;
    }
  }
  try{ await d2update(patch); _reqCache.at=0; log('swept '+n+' expired holds'); }catch(e){}
  return n;
}
function queueFor(reqs,tid){
  return Object.entries(reqs||{}).filter(([i,r])=>r.tid===tid&&r.st==='waiting')
    .sort((a,b)=>(a[1].dt||0)-(b[1].dt||0));
}
function qposOf(reqs,id,tid){ return queueFor(reqs,tid).findIndex(x=>x[0]===id)+1; }
/* ETA: we know every open loan's due date, so position N ≈ the Nth-earliest due. */
function etaFor(issues,tid,pos){
  const ds=Object.values(issues||{}).filter(i=>i.tid===tid&&!i.ret&&i.due).map(i=>i.due).sort((a,b)=>a-b);
  return ds[pos-1]?daysLeft(ds[pos-1]):null;
}
let _issCache={at:0,v:{}};
async function getIssues(force){
  if(!force && Date.now()-_issCache.at<60000) return _issCache.v;
  const r=await d2get('library/issues');
  _issCache={at:Date.now(),v:r||{}};
  return _issCache.v;
}
function myOpen(issues){
  return Object.entries(issues||{}).filter(([i,x])=>x.urn===STATE.user.id&&!x.ret);
}
/* Token REQ-YYMM-NNNN — the receipt the student shows at the counter. */
async function newToken(){
  const n=await bump('library/counters/reqSeq');
  const d=new Date();
  return 'REQ-'+String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+'-'+String(n).padStart(4,'0');
}
async function applyBook(tid){
  if(STATE.busy) return; STATE.busy=true;
  try{
    const reqs=await getRequests(true), iss=await getIssues(true);
    if(myOpen(iss).length>=maxBooks()){ toast('You already have '+maxBooks()+' books out',true); return; }
    if(Object.values(reqs).some(r=>r.uid===STATE.user.id&&r.tid===tid&&['waiting','ready'].includes(r.st))){
      toast('You have already applied for this book',true); return; }
    await loadAvail(true);
    const free=availOf(tid)>0;
    const id=await newToken();
    const auto=!!STATE.cfg.autoApprove;
    const rec={ id, uid:STATE.user.id, name:STATE.user.name, tid, dt:Date.now(),
      st:free?'ready':'waiting', kind:STATE.user.kind,
      cls:STATE.user.class||'', sem:STATE.user.sem||'', phone:STATE.user.phone||'' };
    if(free) rec.exp=addDays(STATE.cfg.pickupDays||2);
    const patch={};
    patch['library/requests/'+id]=rec;
    if(free) patch['library/avail/'+tid]=Math.max(0,availOf(tid)-1);
    await d2update(patch);
    _reqCache.at=0; await loadAvail(true);
    showApplied(id,tid,free,auto);
  }catch(e){ toast('Could not apply: '+e.message,true); }
  finally{ STATE.busy=false; }
}
async function cancelReq(id,tid,wasReady){
  try{
    const patch={}; patch['library/requests/'+id+'/st']='cancelled';
    if(wasReady) patch['library/avail/'+tid]=availOf(tid)+1;
    await d2update(patch); _reqCache.at=0; await loadAvail(true);
    toast('Request cancelled'); render();
  }catch(e){ toast('Failed: '+e.message,true); }
}
function showApplied(id,tid,free,auto){

      <div class="card" style="margin-top:12px">

  sheet(body+`<button class="btn btn-full" style="margin-top:12px" onclick="closeSheet();render()">Done</button>`);
  if(!free) (async()=>{

/* ═══ BOOK SHEET ═══ */
async function bookSheet(tid){
  const t=STATE.titles[tid]; if(!t) return;
  sheet('<div class="empty">Loading…</div>');
  const [reqs,iss]=await Promise.all([getRequests(),getIssues()]);
  const av=availOf(tid), q=queueFor(reqs,tid);
  const holders=Object.entries(iss||{}).filter(([i,x])=>x.tid===tid&&!x.ret);
  const mine=Object.entries(reqs||{}).find(([i,r])=>r.uid===STATE.user.id&&r.tid===tid&&['waiting','ready'].includes(r.st));
  const has=holders.some(([i,x])=>x.urn===STATE.user.id);
  const over=myOpen(iss).length>=maxBooks();
  let btn;
  if(has) btn=`<button class="btn btn-full btn-ghost" disabled>Already with you</button>`;
  else if(mine) btn=`<button class="btn btn-full btn-ghost" disabled>Applied · ${esc(mine[0])}</button>`;
  else if(over) btn=`<button class="btn btn-full btn-ghost" disabled>Limit reached (${maxBooks()} books)</button>`;
  else if(av>0) btn=`<button class="btn btn-full" onclick="applyBook('${tid}')">Apply — copy available</button>`;
  else btn=`<button class="btn btn-full" style="background:var(--warn)" onclick="applyBook('${tid}')">Join queue — #${q.length+1}</button>`;
  sheet(`
    <div style="display:flex;gap:11px;margin-bottom:10px">${spine(t)}
      <div style="min-width:0"><div style="font-weight:700;font-size:15px;line-height:1.3">${esc(t.name)}</div>
      <div class="mono" style="font-size:10.5px;color:var(--muted);margin-top:3px">${esc(t.author||'')}</div>
      <div class="mono" style="font-size:10px;color:var(--muted)">${esc(t.publisher||'')} ${esc(t.year||'')}</div></div></div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">
      <span class="badge badge-sm ${av?'badge-ok':'badge-critical'}">${av}/${t.totalCopies||0} free</span>
      <span class="badge badge-sm badge-unknown">${esc(t.category||'')}</span>
      ${(t.courses||[]).map(c=>`<span class="badge badge-sm badge-unknown">${esc(c)}</span>`).join('')}
      ${(t.sems||[]).length?`<span class="badge badge-sm badge-unknown">Sem ${(t.sems||[]).join(',')}</span>`:''}
      ${q.length?`<span class="badge badge-sm badge-warning">${q.length} waiting</span>`:''}
      ${t.tagConf==='needs_review'&&isStaff()?`<span class="badge badge-sm badge-warning">needs tag</span>`:''}</div>
    ${t.variants&&isStaff()?`<div class="alert" style="font-size:10px">Merged from ${t.variants.length} spellings: ${t.variants.map(esc).join(' · ')}</div>`:''}
    ${isStaff()&&holders.length?`<div class="card"><h3>CURRENTLY WITH</h3>${holders.map(([i,x])=>{
      const d=x.due?daysLeft(x.due):null;
      return `<div class="rw"><div style="display:flex;gap:8px;align-items:center;min-width:0">${avatar(x.urn,x.name)}
        <div style="min-width:0"><div style="font-size:11.5px;font-weight:700">${esc(x.name)}</div>
        <div class="mono" style="font-size:9px;color:var(--muted)">${esc(x.urn)} · ${esc(x.acc)}</div></div></div>
        <span class="badge badge-sm ${d===null?'badge-unknown':d<0?'badge-critical':'badge-info'}">${d===null?'staff':d<0?(-d)+'d late':d+'d left'}</span></div>`;
    }).join('')}</div>`:''}
    ${isStu()
      ? `<div class="alert">Loan ${STATE.cfg.loanDays||7} days · fine ₹${STATE.cfg.finePerDay||5}/day · max ${maxBooks()} books. You have ${myOpen(iss).length}/${maxBooks()} out.</div>`
      : `<div class="alert">Staff loan — <b>no limit, no fine, no due date.</b> Same catalogue; availability still applies.</div>`}
    ${btn}
    ${canCirc()?`<button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="editBook('${tid}')">✏️ Edit book &amp; copies</button>`:''}
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Close</button>`);
}
function spine(t){
  const h=hueOf(t.name||'x');
  return `<div style="width:36px;height:50px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:18px;color:#000;background:linear-gradient(160deg,hsl(${h},55%,63%),hsl(${h},50%,45%))">${esc((t.name||'?').charAt(0).toUpperCase())}</div>`;
}

<script>
/* ═══ VIEWS: BROWSE ═══════════════════════════════════════════════════════
   courses[] is a DEFAULT VIEW, never a restriction — any student may borrow any
   book. "My Course" is just the useful default; "All Books" is one tap away. */
/* v1.09: three independent dropdowns replace the chip strip — a catalogue is
   not only course/sem material (general reading, reference, competitive exam
   books need a home too). Every option is pulled live from the catalogue, so
   nothing appears until at least one book actually uses it, and a brand-new
   category/course typed into Add Book shows up on the next render via
   refreshFilterOptions() rather than needing a reload. */
function refreshFilterOptions(){
  const co=new Set(), ca=new Set(), se=new Set();
  Object.values(STATE.titles).forEach(t=>{
    if(t.status==='merged'||t.status==='retired') return;
    (t.courses||[]).forEach(c=>c&&co.add(c));
    if(t.category) ca.add(t.category);
    (t.sems||[]).forEach(s=>s&&se.add(s));
  });
  STATE.optCourses=Array.from(co).sort();
  STATE.optCats=Array.from(ca).sort();
  STATE.optSems=Array.from(se).sort((a,b)=>a-b);
}
const KNOWN_COURSES=['BCA','BCom','BBA','BBM','BEd','PUC'];
function courseTokenOf(cls){
  const s=String(cls||'').toUpperCase();
  return KNOWN_COURSES.find(c=>s.includes(c.toUpperCase()))||'';
}
function viewBrowse(){
  if(!STATE.optCourses) refreshFilterOptions();
  const q=(STATE.query||'').toLowerCase();
  const myTok=isStu()?courseTokenOf(STATE.user.class):'';
  if(STATE.fCourse===undefined) STATE.fCourse=myTok||'';
  const fCourse=STATE.fCourse, fCat=STATE.fCat||'', fSem=STATE.fSem||'';
  let L=Object.entries(STATE.titles).filter(([i,t])=>t.status!=='merged'&&t.status!=='retired');
  if(fCourse) L=L.filter(([i,t])=>(t.courses||[]).includes(fCourse));
  if(fCat) L=L.filter(([i,t])=>t.category===fCat);
  if(fSem) L=L.filter(([i,t])=>(t.sems||[]).map(String).includes(String(fSem)));
  if(q) L=L.filter(([i,t])=>((t.name||'')+' '+(t.author||'')).toLowerCase().includes(q));
  /* v1.01: also match an accession or local register number typed straight in */
  if(q && !L.length && STATE.accIdx){
    const hit=STATE.accIdx[q]||STATE.accIdx[q.toUpperCase()];
    if(hit&&STATE.titles[hit]) L=[[hit,STATE.titles[hit]]];
  }
  const rows=L.slice(0,60).map(([i,t])=>{
    const av=availOf(i);
    return `<div class="bkrow" onclick="bookSheet('${i}')">${spine(t)}
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px;line-height:1.3">${esc(t.name)}</div>
        <div class="mono" style="font-size:10px;color:var(--muted);margin-top:2px">${esc(t.author||'')}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px">
          <span class="badge badge-sm ${av?'badge-ok':'badge-critical'}">${av?av+'/'+(t.totalCopies||0)+' free':'all out'}</span>
          <span class="badge badge-sm badge-unknown">${esc(t.category||'')}</span></div></div>
      <button class="btn btn-sm ${av?'':'btn-ghost'}">${av?'Apply':'Queue'}</button></div>`;
  }).join('');
  const selOpt=(opts,cur,allLabel)=>`<option value="">${allLabel}</option>`+opts.map(o=>`<option value="${esc(o)}" ${String(o)===String(cur)?'selected':''}>${esc(o)}</option>`).join('');
  return `
    <div style="position:sticky;top:0;background:var(--bg);z-index:5;padding-bottom:9px">
      <input id="q" placeholder="Search title, author, or accession no…" value="${esc(STATE.query||'')}" oninput="onSearch(this.value)">
      <div style="display:flex;gap:6px;margin-top:8px">
        <select style="flex:1" onchange="STATE.fCourse=this.value;render()">${selOpt(STATE.optCourses,fCourse,isStu()?'All Courses':'Course: All')}</select>
        <select style="flex:1" onchange="STATE.fCat=this.value;render()">${selOpt(STATE.optCats,fCat,'Category: All')}</select>
        <select style="flex:1" onchange="STATE.fSem=this.value;render()">${selOpt(STATE.optSems,fSem,'Sem: All')}</select>
      </div>
    </div>
    ${isStu()&&fCourse&&fCourse===myTok?`<div class="alert">Showing <b>${esc(myTok)}</b> books by default. Change the Course dropdown to see other courses, or set it to <b>All Courses</b> — you can borrow any book regardless of what it's tagged for.</div>`:''}
    ${canCirc()?`<button class="btn btn-full" style="margin-bottom:10px" onclick="addBook()">➕ Add New Book</button>`:''}
    <div class="mono" style="font-size:9.5px;color:var(--muted);margin-bottom:7px">${L.length} TITLES${L.length>60?' · showing first 60, refine search or filters':''}</div>
    ${rows||'<div class="empty">NOTHING FOUND — try All Courses / All Categories</div>'}`;
}
function onSearch(v){
  STATE.query=v;
  clearTimeout(window._sT);
  window._sT=setTimeout(()=>{
    render();
    const e=document.getElementById('q');
    if(e){ e.focus(); e.setSelectionRange(e.value.length,e.value.length); }
  },220);
}

/* ═══ VIEWS: MY BOOKS ═══ */

        <div class="tok" style="margin-top:9px">${esc(id)}</div>
        ${r.appt?`<div style="background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.35);border-radius:8px;padding:9px;margin-top:9px;text-align:center">
          <div class="mono" style="font-size:9px;color:var(--muted);letter-spacing:1px">📅 COLLECT AT</div>

        <button class="btn btn-sm btn-ghost btn-full" style="margin-top:9px" onclick="cancelReq('${id}','${r.tid}',true)">Cancel</button></div>`;

      <div style="font-size:13px;font-weight:700">${esc(t.name)}</div>

      <button class="btn btn-sm btn-ghost" style="margin-top:9px" onclick="cancelReq('${id}','${r.tid}',false)">Cancel request</button></div>`;

  const rows=my.map(([id,x])=>{

      <div style="font-size:12px;font-weight:700">${esc(t.name)}</div>

      <div style="text-align:right"><span class="badge badge-sm ${d===null?'badge-unknown':d<0?'badge-critical':d<=2?'badge-warning':'badge-ok'}">${d===null?'no due':d<0?(-d)+'d LATE':d+'d left'}</span>
      ${f?`<div class="mono" style="font-size:9.5px;color:var(--danger);margin-top:3px">fine ₹${f}</div>`:''}</div></div>`;
  }).join('');
  return `${cards}<div class="card"><h3>📗 WITH ME <span class="badge badge-unknown badge-sm">${my.length}${isStu()?'/'+maxBooks():''}</span></h3>
    ${rows||'<div class="empty">NO BOOKS ISSUED</div>'}</div>`;
}

/* ═══ VIEWS: HISTORY — AY + sem stamped at issue time, never recomputed ═══ */
async function viewHistory(urn,who){
  const id=urn||STATE.user.id;
  const idx=await d2get('library/byUrn/'+id);
  if(!idx||!Object.keys(idx).length) return `<div class="empty">NO LIBRARY HISTORY YET</div>`;
  const iss=await getIssues();
  const groups=[];
  Object.entries(idx).forEach(([ay,sems])=>{
    Object.entries(sems||{}).forEach(([sem,list])=>{
      const items=Object.keys(list||{}).map(k=>iss[k]).filter(Boolean);
      if(items.length) groups.push({ay,sem,items});
    });
  });
  groups.sort((a,b)=> b.ay.localeCompare(a.ay) || Number(b.sem)-Number(a.sem));
  const tot=groups.reduce((a,g)=>a+g.items.length,0);
  const mx=Math.max(1,...groups.map(g=>g.items.length));
  const paid=groups.reduce((a,g)=>a+g.items.reduce((x,i)=>x+(i.fine||0),0),0);
  const open=Object.values(iss||{}).filter(i=>i.urn===id&&!i.ret).length;
  return `<div class="kp">
      <div class="stat-box"><div class="stat-label">Total</div><div class="stat-value">${tot}</div></div>
      <div class="stat-box"><div class="stat-label">Out now</div><div class="stat-value" style="color:var(--blue)">${open}</div></div>
      <div class="stat-box"><div class="stat-label">Fines</div><div class="stat-value" style="color:var(--ok)">₹${paid}</div></div></div>
    <div class="card"><h3>📅 SEM BY SEM${who?' · '+esc(who):''}</h3>
    ${groups.map(g=>{
      const k=g.ay+'|'+g.sem, open=STATE.selSem===k;
      return `<div><div style="display:flex;align-items:center;gap:9px;padding:7px 0;cursor:pointer" onclick="STATE.selSem=${open?'null':`'${k}'`};render()">
        <span class="mono" style="font-size:10px;color:var(--muted);width:104px;flex-shrink:0">${esc(g.ay)} · SEM ${esc(g.sem)}</span>
        <div class="bar-wrap"><div class="bar" style="width:${g.items.length/mx*100}%"></div></div>
        <span class="badge badge-sm badge-unknown">${g.items.length}</span></div>
        ${open?`<table style="width:100%;border-collapse:collapse;font-size:11px;margin:2px 0 9px">${g.items.map(i=>{
          const t=STATE.titles[i.tid]||{name:'(unknown)'};
          return `<tr><td style="padding:6px 3px;border-bottom:1px solid var(--border);max-width:150px">${esc(t.name)}</td>
            <td class="mono" style="padding:6px 3px;border-bottom:1px solid var(--border);color:var(--muted);white-space:nowrap">${fmt(i.out)}→${i.ret?fmt(i.ret):'—'}</td>
            <td style="padding:6px 3px;border-bottom:1px solid var(--border);text-align:right"><span class="badge badge-sm ${i.fine?'badge-critical':'badge-ok'}">${i.fine?'₹'+i.fine:(i.ret?Math.round((i.ret-i.out)/864e5)+'d':'out')}</span></td></tr>`;
        }).join('')}</table>`:''}</div>`;
    }).join('')}</div>`;
}
</script>
<script>

async function viewDesk(){

async function doIssue(reqId){
  const reqs=await getRequests();
  const r=reqs[reqId]; if(!r) return toast('Request not found',true);
  const t=STATE.titles[r.tid]||{name:''};

  sheet(`<div class="page-title" style="font-size:20px">ISSUE BOOK</div>

    <div class="fld"><label>Accession number</label>
      <select id="accSel" onchange="syncLocalBox()">${cand.length?cand.map(([a,c])=>`<option value="${esc(a)}" data-la="${esc(c.localAcc||'')}">${esc(a)}${c.localAcc?'  ·  reg '+esc(c.localAcc):''}</option>`).join(''):'<option value="">— no free copies —</option>'}</select></div>

    <div class="mono" style="font-size:9.5px;color:var(--muted);margin-bottom:11px">${cand.length} copy/copies available. Pick the physical book you're handing over. If this copy has no register number yet, type it here — it saves against the copy permanently.</div>
    <div id="isErr"></div>
    <button class="btn btn-full" id="isBtn" ${cand.length?'':'disabled'} onclick="confirmIssue('${reqId}')">Confirm issue</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Cancel</button>`);
}
async function confirmIssue(reqId){
  const acc=(document.getElementById('accSel')||{}).value;
  if(!acc) return;
  setBusy('isBtn',true,'Issuing…');
  try{
    const reqs=await getRequests(true); const r=reqs[reqId];
    if(!r||r.st==='collected'){ showErr('isErr','This request was already processed.'); return; }
    const c=await d2get('library/copies/'+acc);
    if(!c) { showErr('isErr','Accession number not found.'); return; }
    if(c.titleId!==r.tid){ showErr('isErr','That copy belongs to a different title.'); return; }
    if(c.status!=='available'){ showErr('isErr','That copy is not available ('+c.status+').'); return; }
    const staffLoan = r.kind==='staff';
    const iid=await bump('library/counters/issueSeq');
    const issueId='ISS'+String(iid).padStart(6,'0');
    const ay=STATE.cfg.currentAY||'2025-26';
    const sem=r.sem||'0';
    const rec={ urn:r.uid, name:r.name, tid:r.tid, acc, out:Date.now(),
      due: staffLoan?null:addDays(STATE.cfg.loanDays||7), ret:null,
      ay, sem, fine:0, kind:r.kind, byStaff:STATE.user.name, reqId };
    const patch={};
    const la=((document.getElementById('accLocal')||{}).value||'').trim();
    if(la){ patch['library/copies/'+acc+'/localAcc']=la; rec.localAcc=la; }
    else if(c.localAcc) rec.localAcc=c.localAcc;
    patch['library/issues/'+issueId]=rec;
    patch['library/copies/'+acc+'/status']='issued';
    patch['library/copies/'+acc+'/currentIssueId']=issueId;
    patch['library/requests/'+reqId+'/st']='collected';
    patch['library/byUrn/'+r.uid+'/'+ay+'/'+sem+'/'+issueId]=true;
    await d2update(patch);
    _reqCache.at=0; _issCache.at=0;
    closeSheet(); toast('Issued to '+r.name+' · '+acc); render();
  }catch(e){ showErr('isErr','Failed: '+e.message); }
  finally{ setBusy('isBtn',false,'Confirm issue'); }
}
async function doReject(reqId){
  if(!confirm('Reject this request and release the copy?')) return;
  try{
    const reqs=await getRequests(); const r=reqs[reqId];
    const patch={}; patch['library/requests/'+reqId+'/st']='rejected';
    patch['library/requests/'+reqId+'/byStaff']=STATE.user.name;
    /* released copy goes to the next in queue, else back on the shelf */
    const q=queueFor(reqs,r.tid);
    if(q.length){ patch['library/requests/'+q[0][0]+'/st']='ready';
      patch['library/requests/'+q[0][0]+'/exp']=addDays(STATE.cfg.pickupDays||2); }
    else patch['library/avail/'+r.tid]=availOf(r.tid)+1;
    await d2update(patch); _reqCache.at=0; await loadAvail(true);
    toast(q.length?'Rejected → passed to #1 in queue':'Rejected — copy released'); render();
  }catch(e){ toast('Failed: '+e.message,true); }
}
/* Return: copy frees, fine locks in, and the copy auto-holds for #1 in queue
   rather than going back to the shelf (Koha behaviour). */
async function doReturn(issueId){
  try{
    const iss=await getIssues(true); const x=iss[issueId];
    if(!x||x.ret) return toast('Already returned',true);
    const f=x.due?fineOf(x.due):0;
    const reqs=await getRequests(true);
    const q=queueFor(reqs,x.tid);
    const patch={};
    patch['library/issues/'+issueId+'/ret']=Date.now();
    patch['library/issues/'+issueId+'/fine']=f;
    patch['library/issues/'+issueId+'/retBy']=STATE.user.name;
    patch['library/copies/'+x.acc+'/status']='available';
    patch['library/copies/'+x.acc+'/currentIssueId']=null;
    if(q.length){
      patch['library/requests/'+q[0][0]+'/st']='ready';
      patch['library/requests/'+q[0][0]+'/exp']=addDays(STATE.cfg.pickupDays||2);
    } else {
      patch['library/avail/'+x.tid]=availOf(x.tid)+1;
    }
    await d2update(patch);
    _issCache.at=0; _reqCache.at=0; await loadAvail(true);
    toast(q.length?('Returned → auto-held for #1 '+q[0][1].name):(f?'Returned · fine ₹'+f:'Returned on time'));
    render();
  }catch(e){ toast('Failed: '+e.message,true); }
}

async function waRemind(urn){
  const s=await d2get('davan_pub/portal_students/'+urn);

function simKey(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function editDist(a,b){
  if(Math.abs(a.length-b.length)>Math.max(a.length,b.length)*0.3) return 99;
  let p=Array.from({length:b.length+1},(_,i)=>i);
  for(let i=1;i<=a.length;i++){ const c=[i];
    for(let j=1;j<=b.length;j++) c.push(Math.min(p[j]+1,c[j-1]+1,p[j-1]+(a[i-1]!==b[j-1]?1:0)));
    p=c; }
  return p[b.length];
}
/* EDITION GUARD — never fold different years/editions/volumes together. */
function edTokens(t){
  const s=String(t||'').toLowerCase(); const o=new Set();
  (s.match(/(19|20)\d{2}/g)||[]).forEach(x=>o.add(x));
  (s.match(/\b\d+\s*(st|nd|rd|th)\b/g)||[]).forEach(x=>o.add(x.replace(/\s/g,'')));
  (s.match(/\bvol(ume)?\s*\.?\s*\w+/g)||[]).forEach(x=>o.add(x.replace(/\s/g,'')));
  (s.match(/\bpart\s*\.?\s*\w+/g)||[]).forEach(x=>o.add(x.replace(/\s/g,'')));
  return Array.from(o).sort().join('|');
}
function findDupes(){
  const L=Object.entries(STATE.titles).filter(([i,t])=>t.status!=='merged'&&t.status!=='retired');
  const bucket={};
  L.forEach(([i,t])=>{
    const a=simKey(t.author).split(' ').filter(w=>w.length>2)[0]||'~';
    (bucket[a]=bucket[a]||[]).push([i,t]);
  });
  const out=[];
  Object.values(bucket).forEach(g=>{
    if(g.length<2||g.length>200) return;
    const seen=new Set();
    for(let x=0;x<g.length;x++){
      if(seen.has(g[x][0])) continue;
      const cl=[g[x]];
      for(let y=x+1;y<g.length;y++){
        if(seen.has(g[y][0])) continue;
        const a=simKey(g[x][1].name), b=simKey(g[y][1].name);
        if(!a||!b) continue;
        if(edTokens(g[x][1].name)!==edTokens(g[y][1].name)) continue;
        if(editDist(a,b)<=Math.max(2,Math.floor(Math.max(a.length,b.length)*0.15))){ cl.push(g[y]); seen.add(g[y][0]); }
      }
      if(cl.length>1){ out.push(cl); seen.add(g[x][0]); }
    }
  });
  return out.sort((a,b)=>b.length-a.length);
}
async function openMerge(){
  sheet('<div class="empty">Scanning catalogue…</div>');
  const cl=findDupes();
  sheet(`<div class="page-title" style="font-size:20px">MERGE DUPLICATES</div>
    <div class="alert">Found <b>${cl.length}</b> suspected cluster(s). Editions are never merged — "…2016-2017" and "…2017-2018" stay separate by design. Merging re-points copies, live loans and queue positions; accession numbers are untouched and the merge is reversible.</div>
    ${cl.slice(0,25).map((c,ix)=>`<div class="card">
      <h3 style="font-size:14px">CLUSTER ${ix+1} <span class="badge badge-warning badge-sm">${c.reduce((a,x)=>a+(x[1].totalCopies||0),0)} copies</span></h3>
      ${c.map(([i,t],k)=>`<label style="display:flex;gap:8px;align-items:flex-start;padding:6px 0;text-transform:none;letter-spacing:0;font-family:var(--body);font-size:11.5px;color:var(--text)">
        <input type="radio" name="keep${ix}" value="${i}" ${k===0?'checked':''} style="width:auto;margin-top:3px">
        <span><b>${esc(t.name)}</b><br><span class="mono" style="font-size:9.5px;color:var(--muted)">${esc(i)} · ${t.totalCopies||0} copies · ${esc(t.author||'')}</span></span></label>`).join('')}
      <button class="btn btn-sm btn-full" style="margin-top:7px" onclick="doMerge(${ix},'${c.map(x=>x[0]).join(',')}')">Merge into selected</button>
    </div>`).join('')||'<div class="empty">NO DUPLICATES FOUND</div>'}
    <button class="btn btn-full btn-ghost" onclick="closeSheet()">Close</button>`);
}
async function doMerge(ix,idsCsv){
  const ids=idsCsv.split(',');
  const sel=document.querySelector('input[name="keep'+ix+'"]:checked');
  if(!sel) return;
  const keep=sel.value, drop=ids.filter(i=>i!==keep);
  if(!confirm('Merge '+drop.length+' record(s) into "'+STATE.titles[keep].name+'"?')) return;
  try{
    const [copies,iss,reqs]=await Promise.all([d2get('library/copies'),getIssues(true),getRequests(true)]);
    const patch={}; let n=0;
    Object.entries(copies||{}).forEach(([a,c])=>{
      if(drop.includes(c.titleId)){
        patch['library/copies/'+a+'/origTitleId']=c.titleId;   /* enables unmerge */
        patch['library/copies/'+a+'/titleId']=keep; n++;
      }
    });
    Object.entries(iss||{}).forEach(([i,x])=>{ if(drop.includes(x.tid)){ patch['library/issues/'+i+'/origTid']=x.tid; patch['library/issues/'+i+'/tid']=keep; } });
    Object.entries(reqs||{}).forEach(([i,r])=>{ if(drop.includes(r.tid)){ patch['library/requests/'+i+'/origTid']=r.tid; patch['library/requests/'+i+'/tid']=keep; } });
    const tot=ids.reduce((a,i)=>a+((STATE.titles[i]||{}).totalCopies||0),0);
    const av=ids.reduce((a,i)=>a+availOf(i),0);
    patch['library/titles/'+keep+'/totalCopies']=tot;
    patch['library/titles/'+keep+'/variants']=ids.map(i=>(STATE.titles[i]||{}).name).filter(Boolean);
    patch['library/avail/'+keep]=av;
    drop.forEach(i=>{
      patch['library/titles/'+i+'/status']='merged';
      patch['library/titles/'+i+'/mergedInto']=keep;
      patch['library/titles/'+i+'/mergedBy']=STATE.user.name;
      patch['library/avail/'+i]=0;
    });
    await d2update(patch);
    await loadCatalogue(true); await loadAvail(true); _issCache.at=0; _reqCache.at=0;
    bumpCatNow(); closeSheet(); toast('Merged '+drop.length+' record(s) · '+n+' copies re-pointed'); render();
  }catch(e){ toast('Merge failed: '+e.message,true); }
}

/* ═══ IMPORTER — chunked, resumable, idempotent ════════════════════════════
   NOT a single set(): 8557 nodes in one request times out on college wifi and
   leaves the DB half-written. Batched update() on explicit keyed paths, so
   re-running writes identical data (never push(), which would duplicate).
   Live circulation nodes are never named in the patch → survive a re-import.
   availCopies is written on FIRST import only; on re-runs it is left alone and
   rebuilt from copy statuses, otherwise a re-import would reset shelf counts
   while books are physically out with students. */
async function runImport(){
  const meta=await d2get('library/meta');
  if(meta&&meta.importVersion){
    if(!confirm('Catalogue already imported ('+meta.importVersion+').\n\nRe-running updates book details and adds new copies, but will NOT reset availability or touch live loans.\n\nContinue?')) return;
  }
  setBusy('impBtn',true,'Fetching…');
  const box=document.getElementById('impBox');
  const say=m=>{ if(box) box.innerHTML='<div class="alert">'+m+'</div>'; };
  try{
    const r=await fetch(IMPORT_URL);
    if(!r.ok) throw new Error('library_import.json not found next to this file ('+r.status+')');
    const d=await r.json();
    const first=!(meta&&meta.importVersion);
    const T=Object.entries(d.titles||{}), C=Object.entries(d.copies||{});
    const cur=await d2get('library/meta/importCursor')||{t:0,c:0};
    const B=400;
    for(let i=(cur.t||0);i<T.length;i+=B){
      const p={};
      T.slice(i,i+B).forEach(([k,v])=>{
        const o=Object.assign({},v);
        if(!first) delete o.availCopies;   /* never clobber live shelf state */
        delete o.sources;
        p['library/titles/'+k]=o;
        if(first) p['library/avail/'+k]=v.availCopies!=null?v.availCopies:v.totalCopies;
      });
      p['library/meta/importCursor']={t:i+B,c:cur.c||0};
      await d2update(p);
      say('Writing titles… '+Math.min(i+B,T.length)+' / '+T.length);
      setBusy('impBtn',true,'Titles '+Math.min(i+B,T.length)+'/'+T.length);
    }
    for(let i=(cur.c||0);i<C.length;i+=B){
      const p={}; const ex=first?null:await Promise.resolve(null);
      C.slice(i,i+B).forEach(([k,v])=>{
        /* only seed genuinely new accession numbers; issued copies keep status */
        /* localAcc starts empty — it is filled from your register, never invented */
        p['library/copies/'+k]=first?Object.assign({localAcc:''},v):{titleId:v.titleId,status:'available',localAcc:''};
      });
      p['library/meta/importCursor']={t:T.length,c:i+B};
      await d2update(p);
      say('Writing copies… '+Math.min(i+B,C.length)+' / '+C.length);
      setBusy('impBtn',true,'Copies '+Math.min(i+B,C.length)+'/'+C.length);
    }
    const patch={};
    patch['library/meta/importVersion']=(d.meta&&d.meta.importVersion)||'import-v1';
    patch['library/meta/importedAt']=Date.now();
    patch['library/meta/importedBy']=STATE.user.name;
    patch['library/meta/importCursor']=null;
    patch['library/meta/catVersion']=Date.now();
    if(first&&d.config) patch['library/config']=d.config;
    if(first) patch['library/counters/titleSeq']=T.length;
    await d2update(patch);
    await loadCatalogue(true); await loadAvail(true); await loadCfg();
    say('✅ Imported '+T.length+' titles / '+C.length+' copies.');
    toast('Import complete'); render();
  }catch(e){
    say('❌ '+e.message+'<br>Progress was checkpointed — press Import again to resume from where it stopped.');
    toast('Import failed: '+e.message,true);
  } finally { setBusy('impBtn',false,'📥 Import catalogue'); }
}

}
/* Self-healing: rebuilds every avail counter from real copy statuses. */

/* ═══ ROUTER ═══ */

  desk:['🗂️','Desk'], out:['📖','Issued'], adm:['⚙️','Admin'] };

}

function footerHtml(){

/* ═══ BOOT ═══ */
async function boot(){
  const app=document.getElementById('app');
  app.innerHTML='<div class="empty" style="padding:60px">Loading library…</div>';
  try{
    await getAuthToken();
    await Promise.all([loadCfg(),loadCatalogue(),loadAvail()]);
    loadPhotos();               /* non-blocking: initials render first, photos inject */
    buildAccIdx();              /* staff only — lets search match register numbers */
    await ensureSeed();
    await render();
  }catch(e){
    app.innerHTML='<div class="main"><div class="alert alert-err">Could not start: '+esc(e.message)+'<br><br>Check your connection and reload.</div></div>';
    warn('boot failed: '+e.message);
  }
}
/* One-time seed so the librarian can log in before anything else exists. */
async function ensureSeed(){
  /* v1.12: MUST check for the SPECIFIC lowercase key, not "is the staff list
     non-empty" — an old capital-key record from an earlier session (before
     v1.09's lowercase fix) satisfied "non-empty" and silently blocked the
     lowercase key from ever being created, which is exactly what happened. */
  try{
    const key=SEED_LIBRARIAN.name.toLowerCase();
    const exact=await d2get('library/staff/'+key);
    if(exact&&exact.password){
      log('library/staff/'+key+' already exists, seed skipped');
      return;
    }
    /* migrate an old capital-key record if one exists, rather than silently
       creating a second account with a different password. */
    const all=await d2get('library/staff');
    const oldKey=Object.keys(all||{}).find(k=>k.toLowerCase()===key&&k!==key);
    if(oldKey&&all[oldKey]&&all[oldKey].password){
      await d2set('library/staff/'+key,Object.assign({},all[oldKey],{migratedFrom:oldKey}));
      log('migrated library/staff/'+oldKey+' → library/staff/'+key);
      return;
    }
    await d2set('library/staff/'+key,{displayName:SEED_LIBRARIAN.name,role:'librarian',password:SEED_LIBRARIAN.password,seeded:true});
    log('seeded default librarian at library/staff/'+key);
  }catch(e){ warn('seed failed — check DB2 write rules for library/staff: '+e.message); }
}
(async function init(){
  try{
    const s=sessionStorage.getItem('lib_sess');
    if(s){ STATE.user=JSON.parse(s); await boot(); return; }
  }catch(e){}
  document.getElementById('app').innerHTML=loginScreen();
  document.getElementById('footer').innerHTML=footerHtml();
  await getAuthToken();
  ensureSeed();  /* v1.10: fire on the login screen too, not just post-login boot() */
})();
/* PWA: cache the shell so a flaky campus connection still opens the app.
   The catalogue itself is cached in IndexedDB (see loadCatalogue), not here. */
if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET') return;
  const u=new URL(e.request.url);
  if(u.origin!==location.origin) return;
  e.respondWith(fetch(e.request).then(r=>{
    const c=r.clone(); caches.open('davan-lib-v1').then(x=>x.put(e.request,c)); return r;
  }).catch(()=>caches.match(e.request)));
});`;
  const b=new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
}

<script>
/* ═══ DASHBOARD (v1.01) ════════════════════════════════════════════════════
   "Due today / due tomorrow" is the number that actually runs a library — it is
   who walks in this morning. Everything else is context. */
function startOfDay(ts){ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function isToday(ts){ return ts && startOfDay(ts)===startOfDay(Date.now()); }
function isTomorrow(ts){ return ts && startOfDay(ts)===startOfDay(Date.now())+864e5; }
async function viewDash(){
  const [iss,reqs]=await Promise.all([getIssues(true),getRequests(true)]);
  const T=Object.entries(STATE.titles).filter(([i,t])=>t.status!=='merged'&&t.status!=='retired');
  const open=Object.values(iss||{}).filter(x=>!x.ret);
  const ov=open.filter(x=>x.due&&daysLeft(x.due)<0);
  const dueT=open.filter(x=>isToday(x.due)), dueM=open.filter(x=>isTomorrow(x.due));
  const bookedToday=Object.values(iss||{}).filter(x=>isToday(x.out));
  const appliedToday=Object.values(reqs||{}).filter(r=>isToday(r.dt));
  const ready=Object.values(reqs||{}).filter(r=>r.st==='ready');
  const copies=T.reduce((a,[i,t])=>a+(t.totalCopies||0),0);
  const untag=T.filter(([i,t])=>t.tagConf==='needs_review').length;
  /* per-course breakdown */
  const cc={};
  T.forEach(([i,t])=>{
    const cs=(t.courses||[]).length?t.courses:['(untagged)'];
    cs.forEach(c=>{ cc[c]=cc[c]||{t:0,c:0}; cc[c].t++; cc[c].c+=(t.totalCopies||0); });
  });
  const rows=Object.entries(cc).sort((a,b)=>b[1].c-a[1].c);
  const mx=Math.max(1,...rows.map(r=>r[1].c));
  const nameOf=t=>(STATE.titles[t]||{}).name||'(unknown)';
  return `
  <div class="kp" style="grid-template-columns:repeat(4,1fr)">
    <div class="stat-box"><div class="stat-label">Total copies</div><div class="stat-value">${copies}</div></div>
    <div class="stat-box"><div class="stat-label">Titles</div><div class="stat-value">${T.length}</div></div>
    <div class="stat-box"><div class="stat-label">Out now</div><div class="stat-value" style="color:var(--blue)">${open.length}</div></div>
    <div class="stat-box"><div class="stat-label">Overdue</div><div class="stat-value" style="color:var(--danger)">${ov.length}</div></div>
  </div>
  <div class="kp" style="grid-template-columns:repeat(4,1fr)">
    <div class="stat-box"><div class="stat-label">Issued today</div><div class="stat-value" style="color:var(--ok)">${bookedToday.length}</div></div>
    <div class="stat-box"><div class="stat-label">Applied today</div><div class="stat-value" style="color:var(--warn)">${appliedToday.length}</div></div>
    <div class="stat-box"><div class="stat-label">Due TODAY</div><div class="stat-value" style="color:var(--warn)">${dueT.length}</div></div>
    <div class="stat-box"><div class="stat-label">Due tomorrow</div><div class="stat-value">${dueM.length}</div></div>
  </div>
  <div class="kp">
    <div class="stat-box"><div class="stat-label">Ready pickup</div><div class="stat-value" style="color:var(--ok)">${ready.length}</div></div>
    <div class="stat-box"><div class="stat-label">Fines due</div><div class="stat-value" style="color:var(--danger)">₹${ov.reduce((a,b)=>a+fineOf(b.due),0)}</div></div>
    <div class="stat-box"><div class="stat-label">Untagged</div><div class="stat-value" style="color:var(--muted)">${untag}</div></div>
  </div>
  ${(dueT.length||dueM.length)?`<div class="card"><h3>📆 EXPECTED BACK</h3>
    ${dueT.map(x=>`<div class="rw"><div style="display:flex;gap:8px;align-items:center;min-width:0">${avatar(x.urn,x.name)}
      <div style="min-width:0"><div style="font-size:12px;font-weight:700">${esc(x.name)} <span class="badge badge-sm badge-unknown">${esc(x.urn)}</span></div>
      <div style="font-size:10px;color:var(--muted)">${esc(nameOf(x.tid))}</div></div></div>
      <span class="badge badge-warning badge-sm">TODAY</span></div>`).join('')}
    ${dueM.map(x=>`<div class="rw"><div style="display:flex;gap:8px;align-items:center;min-width:0">${avatar(x.urn,x.name)}
      <div style="min-width:0"><div style="font-size:12px;font-weight:700">${esc(x.name)} <span class="badge badge-sm badge-unknown">${esc(x.urn)}</span></div>
      <div style="font-size:10px;color:var(--muted)">${esc(nameOf(x.tid))}</div></div></div>
      <span class="badge badge-info badge-sm">TOMORROW</span></div>`).join('')}</div>`:''}
  <div class="card"><h3>📚 BY COURSE</h3>
    ${rows.map(([c,v])=>`<div style="display:flex;align-items:center;gap:9px;padding:6px 0">
      <span class="mono" style="font-size:10.5px;width:82px;flex-shrink:0;color:${c==='(untagged)'?'var(--muted)':'var(--text)'}">${esc(c)}</span>
      <div class="bar-wrap"><div class="bar" style="width:${v.c/mx*100}%"></div></div>
      <span class="mono" style="font-size:9.5px;color:var(--muted);width:104px;text-align:right;flex-shrink:0">${v.t} titles / ${v.c} copies</span></div>`).join('')}
    <div class="mono" style="font-size:9px;color:var(--muted);margin-top:8px;line-height:1.5">A title tagged for two courses counts under both, so course totals exceed the catalogue total. Untagged books still appear to students under All Books.</div></div>
  <div class="card"><h3>🧾 PURCHASE REQUISITIONS</h3>
    <button class="btn btn-full" style="margin-bottom:7px" onclick="newOrder()">➕ New requisition</button>
    <div id="ordList"><div class="empty">Loading…</div></div></div>`;
}

async function renderOrders(){
  const el=document.getElementById('ordList'); if(!el) return;
  const o=await d2get('library/orders');
  const L=Object.entries(o||{}).sort((a,b)=>(b[1].at||0)-(a[1].at||0));
  const P={requested:'badge-warning',approved:'badge-info',ordered:'badge-unknown',received:'badge-ok'};
  el.innerHTML=L.slice(0,20).map(([id,x])=>`<div class="rw">

      <div class="mono" style="font-size:9px;color:var(--muted)">${esc(id)} · ${esc(x.author||'')} · qty ${x.qty} · ₹${x.price||'—'}</div></div>

function newOrder(){
  sheet(`<div class="page-title" style="font-size:20px">NEW REQUISITION</div>

async function saveOrder(){
  const t=val('o-title'); const q=parseInt(val('o-qty')||'1',10);
  if(!t) return showErr('oErr','Book title is required.');
  if(!(q>0&&q<=500)) return showErr('oErr','Quantity must be 1–500.');
  setBusy('oBtn',true,'Saving…');
  try{
    const n=await bump('library/counters/ordSeq');
    const d=new Date();
    const id='REQN-'+String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+'-'+String(n).padStart(3,'0');
    const rec={ title:t, author:val('o-auth'), publisher:val('o-pub'), isbn:val('o-isbn'),
      qty:q, price:val('o-price')||'', campus:val('o-cam'), stream:val('o-str'),
      course:val('o-course'), why:val('o-why'), to:val('o-to'),
      st:'requested', by:STATE.user.name, at:Date.now() };
    await d2set('library/orders/'+id,rec);
    closeSheet(); toast('Requisition '+id+' saved'); render();
    setTimeout(()=>printOrder(id),400);
  }catch(e){ showErr('oErr','Failed: '+e.message); }
  finally{ setBusy('oBtn',false,'Save requisition'); }
}
async function advOrder(id,st){
  const nx={requested:'approved',approved:'ordered',ordered:'received'}[st];
  if(!nx) return;
  if(nx==='received'){
    if(!confirm('Mark received?\n\nThis creates the title and generates accession numbers for every copy.')) return;
    try{
      const o=await d2get('library/orders/'+id);
      const seq=await bump('library/counters/titleSeq');
      const tid='T'+String(seq).padStart(5,'0');
      const cam=o.campus||'Davan', str=o.stream||'DEG';
      const pfx={DEG:'DEG',PUC:'PUC',BEd:'BED'}[str]||'GEN';
      const patch={};
      patch['library/titles/'+tid]={ name:o.title, author:o.author||'Unknown', publisher:o.publisher||'',
        isbn:o.isbn||'', price:o.price||null, campus:cam, stream:str, category:'Uncategorized',
        courses:o.course?[o.course]:[], sems:[], tagConf:'needs_review', totalCopies:o.qty,
        fromOrder:id, addedBy:STATE.user.name, addedAt:Date.now() };
      for(let k=0;k<o.qty;k++){
        const a=await bump('library/counters/acc/'+cam+'/'+str);
        patch['library/copies/'+cam.slice(0,3).toUpperCase()+'-'+pfx+'-'+String(a).padStart(5,'0')]={titleId:tid,status:'available',localAcc:''};
      }
      patch['library/avail/'+tid]=o.qty;
      patch['library/orders/'+id+'/st']='received';
      patch['library/orders/'+id+'/tid']=tid;
      patch['library/orders/'+id+'/receivedAt']=Date.now();
      await d2update(patch);
      await loadCatalogue(true); await loadAvail(true); bumpCatNow();
      toast('Received — '+o.qty+' copies added. Print labels from Admin → Data.'); render();
    }catch(e){ toast('Failed: '+e.message,true); }
    return;
  }
  try{ await d2update({['library/orders/'+id+'/st']:nx,['library/orders/'+id+'/'+nx+'By']:STATE.user.name});
    toast('Marked '+nx); renderOrders(); }
  catch(e){ toast('Failed: '+e.message,true); }
}
