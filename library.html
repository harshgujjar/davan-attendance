      <div class="mono" style="font-size:9px;color:var(--muted);margin-top:8px;line-height:1.5"><b>Two numbers per copy.</b> The grey one (${esc((mine[0]||[''])[0].split('-').slice(0,2).join('-'))}-…) is generated by this app and is what the database uses. The box next to it is <b>yours</b> — type whatever is written in your register or stamped in the book. Both are searchable.</div>
      <div class="mono" style="font-size:9px;color:var(--muted);margin-top:6px;line-height:1.5">Quantity follows the copies — you add or retire physical books, the count updates itself. Issued copies cannot be retired; take the return first. Retired copies keep their accession number and never get reused.</div></div>
    <button class="btn btn-full btn-ghost" onclick="closeSheet()">Close</button>`);

async function saveEdit(tid){
  setBusy('ebBtn',true,'Saving…');

async function addCopies(tid){
  const n=parseInt(val('e-add')||'1',10);
  if(!(n>0&&n<=50)) return toast('1–50 copies at a time',true);
  try{
    const t=STATE.titles[tid];

      const a=await bump('library/counters/acc/'+cam+'/'+str);

async function retireCopy(tid,acc,st){
  if(!confirm('Mark '+acc+' as '+st+'? It leaves circulation but the record is kept.')) return;
  try{
    const patch={};
    patch['library/copies/'+acc+'/status']=st;
    patch['library/copies/'+acc+'/retiredBy']=STATE.user.name;
    patch['library/avail/'+tid]=Math.max(0,availOf(tid)-1);
    await d2update(patch); await loadAvail(true);
    toast(acc+' marked '+st); editBook(tid);

async function restoreCopy(tid,acc){
  try{
    const patch={};
    patch['library/copies/'+acc+'/status']='available';
    patch['library/avail/'+tid]=availOf(tid)+1;
    await d2update(patch); await loadAvail(true);
    toast(acc+' restored'); editBook(tid);
  }catch(e){ toast('Failed: '+e.message,true); }
}

/* ═══ MERGE — soft, reversible. Copies/issues/queue re-point; accession numbers
   never change (the physical label on the book stays correct). ═══ */
function simKey(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function editDist(a,b){
  if(Math.abs(a.length-b.length)>Math.max(a.length,b.length)*0.3) return 99;
  let p=Array.from({length:b.length+1},(_,i)=>i);
  for(let i=1;i<=a.length;i++){ const c=[i];
    for(let j=1;j<=b.length;j++) c.push(Math.min(p[j]+1,c[j-1]+1,p[j-1]+(a[i-1]!==b[j-1]?1:0)));
    p=c; }
  return p[b.length];
}
/* EDITION GUARD — never fold different years/editions/volumes together. */
function edTokens(t){
  const s=String(t||'').toLowerCase(); const o=new Set();
  (s.match(/(19|20)\d{2}/g)||[]).forEach(x=>o.add(x));
  (s.match(/\b\d+\s*(st|nd|rd|th)\b/g)||[]).forEach(x=>o.add(x.replace(/\s/g,'')));
  (s.match(/\bvol(ume)?\s*\.?\s*\w+/g)||[]).forEach(x=>o.add(x.replace(/\s/g,'')));
  (s.match(/\bpart\s*\.?\s*\w+/g)||[]).forEach(x=>o.add(x.replace(/\s/g,'')));
  return Array.from(o).sort().join('|');
}
function findDupes(){
  const L=Object.entries(STATE.titles).filter(([i,t])=>t.status!=='merged'&&t.status!=='retired');
  const bucket={};
  L.forEach(([i,t])=>{
    const a=simKey(t.author).split(' ').filter(w=>w.length>2)[0]||'~';
    (bucket[a]=bucket[a]||[]).push([i,t]);
  });
  const out=[];
  Object.values(bucket).forEach(g=>{
    if(g.length<2||g.length>200) return;
    const seen=new Set();
    for(let x=0;x<g.length;x++){
      if(seen.has(g[x][0])) continue;
      const cl=[g[x]];
      for(let y=x+1;y<g.length;y++){
        if(seen.has(g[y][0])) continue;
        const a=simKey(g[x][1].name), b=simKey(g[y][1].name);
        if(!a||!b) continue;
        if(edTokens(g[x][1].name)!==edTokens(g[y][1].name)) continue;
        if(editDist(a,b)<=Math.max(2,Math.floor(Math.max(a.length,b.length)*0.15))){ cl.push(g[y]); seen.add(g[y][0]); }
      }
      if(cl.length>1){ out.push(cl); seen.add(g[x][0]); }
    }
  });
  return out.sort((a,b)=>b.length-a.length);
}
async function openMerge(){
  sheet('<div class="empty">Scanning catalogue…</div>');
  const cl=findDupes();
  sheet(`<div class="page-title" style="font-size:20px">MERGE DUPLICATES</div>
    <div class="alert">Found <b>${cl.length}</b> suspected cluster(s). Editions are never merged — "…2016-2017" and "…2017-2018" stay separate by design. Merging re-points copies, live loans and queue positions; accession numbers are untouched and the merge is reversible.</div>

      ${c.map(([i,t],k)=>`<label style="display:flex;gap:8px;align-items:flex-start;padding:6px 0;text-transform:none;letter-spacing:0;font-family:var(--body);font-size:11.5px;color:var(--text)">

      <button class="btn btn-sm btn-full" style="margin-top:7px" onclick="doMerge(${ix},'${c.map(x=>x[0]).join(',')}')">Merge into selected</button>
    </div>`).join('')||'<div class="empty">NO DUPLICATES FOUND</div>'}
    <button class="btn btn-full btn-ghost" onclick="closeSheet()">Close</button>`);
}
async function doMerge(ix,idsCsv){
  const ids=idsCsv.split(',');
  const sel=document.querySelector('input[name="keep'+ix+'"]:checked');
  if(!sel) return;
  const keep=sel.value, drop=ids.filter(i=>i!==keep);
  if(!confirm('Merge '+drop.length+' record(s) into "'+STATE.titles[keep].name+'"?')) return;
  try{
    const [copies,iss,reqs]=await Promise.all([d2get('library/copies'),getIssues(true),getRequests(true)]);
    const patch={}; let n=0;
    Object.entries(copies||{}).forEach(([a,c])=>{
      if(drop.includes(c.titleId)){
        patch['library/copies/'+a+'/origTitleId']=c.titleId;   /* enables unmerge */
        patch['library/copies/'+a+'/titleId']=keep; n++;
      }
    });
    Object.entries(iss||{}).forEach(([i,x])=>{ if(drop.includes(x.tid)){ patch['library/issues/'+i+'/origTid']=x.tid; patch['library/issues/'+i+'/tid']=keep; } });
    Object.entries(reqs||{}).forEach(([i,r])=>{ if(drop.includes(r.tid)){ patch['library/requests/'+i+'/origTid']=r.tid; patch['library/requests/'+i+'/tid']=keep; } });
    const tot=ids.reduce((a,i)=>a+((STATE.titles[i]||{}).totalCopies||0),0);
    const av=ids.reduce((a,i)=>a+availOf(i),0);
    patch['library/titles/'+keep+'/totalCopies']=tot;
    patch['library/titles/'+keep+'/variants']=ids.map(i=>(STATE.titles[i]||{}).name).filter(Boolean);
    patch['library/avail/'+keep]=av;
    drop.forEach(i=>{
      patch['library/titles/'+i+'/status']='merged';
      patch['library/titles/'+i+'/mergedInto']=keep;
      patch['library/titles/'+i+'/mergedBy']=STATE.user.name;
      patch['library/avail/'+i]=0;
    });
    await d2update(patch);
    await loadCatalogue(true); await loadAvail(true); _issCache.at=0; _reqCache.at=0;
    bumpCatNow(); closeSheet(); toast('Merged '+drop.length+' record(s) · '+n+' copies re-pointed'); render();
  }catch(e){ toast('Merge failed: '+e.message,true); }
}

/* ═══ IMPORTER — chunked, resumable, idempotent ════════════════════════════
   NOT a single set(): 8557 nodes in one request times out on college wifi and
   leaves the DB half-written. Batched update() on explicit keyed paths, so
   re-running writes identical data (never push(), which would duplicate).
   Live circulation nodes are never named in the patch → survive a re-import.
   availCopies is written on FIRST import only; on re-runs it is left alone and
   rebuilt from copy statuses, otherwise a re-import would reset shelf counts
   while books are physically out with students. */
/* ═══ REPLACE CATALOGUE (v1.21) ════════════════════════════════════════════
   Distinct from the additive Import above. Import only ever ADDS/updates —
   its guard recognises "have I imported before" but has no notion of "this
   is a corrected replacement." Running Import again after a catalogue
   correction (e.g. the v1.20 duplicate-title fix) would have ADDED the
   corrected 2060 titles on top of the existing buggy ones — not replaced
   them. This does a real replace:
     1. Any copy currently ISSUED is identified and its accession number +
        current issue are preserved — never deleted, only re-pointed to the
        NEW title ID if that title still exists in the new catalogue by
        matching normalized name, so a student's live loan doesn't break.
     2. Every title/copy from the OLD catalogue that is NOT an issued copy
        is deleted.
     3. The new catalogue is written in.
     4. library/issues, library/requests, library/byUrn — circulation
        HISTORY — are NEVER touched by this or the normal importer. Only
        titles/copies/avail change. ═══ */
async function replaceCatalogue(){
  toast('Checking what would change…');
  try{
    const [oldTitles,oldCopies,r]=await Promise.all([
      d2get('library/titles'),d2get('library/copies'),fetch(IMPORT_URL)
    ]);
    if(!r.ok) throw new Error('library_import.json not found next to this file');
    const nd=await r.json();
    const newTitles=nd.titles||{}, newCopies=nd.copies||{};
    const issuedAccs=new Set(Object.entries(oldCopies||{}).filter(([a,c])=>c.status==='issued').map(([a])=>a));
    const nk=t=>String(t||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
    const newByName={}; Object.entries(newTitles).forEach(([tid,t])=>newByName[nk(t.name)]=tid);
    let matched=0,unmatched=0;
    issuedAccs.forEach(a=>{
      const oldTid=(oldCopies[a]||{}).titleId;
      const oldName=(oldTitles[oldTid]||{}).name;
      if(newByName[nk(oldName)]) matched++; else unmatched++;
    });
    sheet(`<div class="page-title" style="font-size:20px">REPLACE CATALOGUE</div>
      <div class="alert" style="border-color:rgba(239,68,68,.3)">This is DIFFERENT from Import — it REPLACES the existing catalogue instead of adding to it. Use this only after correcting the source data (e.g. a duplicate-title fix), not for routine re-imports.</div>
      <div class="card"><h3>WHAT HAPPENS</h3>
        <div class="rw"><span style="font-size:12px">Titles in new catalogue</span><span class="mono">${Object.keys(newTitles).length}</span></div>
        <div class="rw"><span style="font-size:12px">Copies in new catalogue</span><span class="mono">${Object.keys(newCopies).length}</span></div>
        <div class="rw"><span style="font-size:12px">Old titles/copies deleted</span><span class="mono">${Object.keys(oldTitles||{}).length} / ${Object.keys(oldCopies||{}).length}</span></div>
        <div class="rw"><span style="font-size:12px;color:var(--ok)">Currently issued copies</span><span class="mono">${issuedAccs.size} — <b>preserved</b>, never deleted</span></div>
        <div class="rw"><span style="font-size:12px">→ re-matched to new title by name</span><span class="mono">${matched}</span></div>
        ${unmatched?`<div class="rw"><span style="font-size:12px;color:var(--warn)">→ title not found in new data</span><span class="mono">${unmatched} — copy kept, title unchanged</span></div>`:''}
        <div class="rw"><span style="font-size:12px;color:var(--ok)">Issues / requests / history</span><span class="mono">never touched</span></div></div>
      <div id="rcErr"></div>
      <button class="btn btn-full" id="rcBtn" style="background:var(--danger)" onclick="confirmReplace()">Replace catalogue now</button>
      <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Cancel</button>`);
    window._replaceData={oldTitles,oldCopies,newTitles,newCopies,nd};
  }catch(e){ toast('Failed: '+e.message,true); }
}
async function confirmReplace(){
  const {oldTitles,oldCopies,newTitles,newCopies,nd}=window._replaceData||{};
  if(!nd) return;
  setBusy('rcBtn',true,'Replacing…');
  try{
    const nk=t=>String(t||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
    const newByName={}; Object.entries(newTitles).forEach(([tid,t])=>newByName[nk(t.name)]=tid);
    const patch={};
    /* delete every old title/copy first */
    Object.keys(oldTitles||{}).forEach(tid=>patch['library/titles/'+tid]=null);
    Object.keys(oldCopies||{}).forEach(acc=>patch['library/copies/'+acc]=null);
    /* re-point issued copies to survive, using their OLD accession number
       (the physical book's label doesn't change) but the NEW title ID */
    Object.entries(oldCopies||{}).forEach(([acc,c])=>{
      if(c.status!=='issued') return;
      const oldName=(oldTitles[c.titleId]||{}).name;
      const newTid=newByName[nk(oldName)];
      patch['library/copies/'+acc]=Object.assign({},c,{titleId:newTid||c.titleId,preservedFromReplace:true});
    });
    await d2update(patch);
    /* write new catalogue in batches, same chunking as normal import */
    const T=Object.entries(newTitles), C=Object.entries(newCopies).filter(([a])=>!(oldCopies&&oldCopies[a]&&oldCopies[a].status==='issued'));
    const B=400;
    for(let i=0;i<T.length;i+=B){
      const p={}; T.slice(i,i+B).forEach(([k,v])=>{ p['library/titles/'+k]=v; p['library/avail/'+k]=v.availCopies!=null?v.availCopies:v.totalCopies; });
      await d2update(p); setBusy('rcBtn',true,'Titles '+Math.min(i+B,T.length)+'/'+T.length);
    }
    for(let i=0;i<C.length;i+=B){
      const p={}; C.slice(i,i+B).forEach(([k,v])=>p['library/copies/'+k]=v);
      await d2update(p); setBusy('rcBtn',true,'Copies '+Math.min(i+B,C.length)+'/'+C.length);
    }
    await d2update({
      'library/meta/importVersion':(nd.meta&&nd.meta.importVersion)||'import-v1',
      'library/meta/importedAt':Date.now(),'library/meta/importedBy':STATE.user.name,
      'library/meta/catVersion':Date.now(),'library/counters/titleSeq':T.length
    });
    await loadCatalogue(true); await loadAvail(true);
    closeSheet(); toast('Catalogue replaced — '+T.length+' titles, '+issuedAccs_count(oldCopies)+' live loans preserved'); render();
  }catch(e){ toast('Replace failed: '+e.message,true); }
  finally{ setBusy('rcBtn',false,'Replace catalogue now'); }
}
function issuedAccs_count(oldCopies){ return Object.values(oldCopies||{}).filter(c=>c.status==='issued').length; }
async function runImport(){
  const meta=await d2get('library/meta');
  if(meta&&meta.importVersion){
    if(!confirm('Catalogue already imported ('+meta.importVersion+').\n\nRe-running updates book details and adds new copies, but will NOT reset availability or touch live loans.\n\nContinue?')) return;
  }
  setBusy('impBtn',true,'Fetching…');
  const box=document.getElementById('impBox');
  const say=m=>{ if(box) box.innerHTML='<div class="alert">'+m+'</div>'; };
  try{
    const r=await fetch(IMPORT_URL);
    if(!r.ok) throw new Error('library_import.json not found next to this file ('+r.status+')');
    const d=await r.json();
    const first=!(meta&&meta.importVersion);
    const T=Object.entries(d.titles||{}), C=Object.entries(d.copies||{});
    const cur=await d2get('library/meta/importCursor')||{t:0,c:0};
    const B=400;
    for(let i=(cur.t||0);i<T.length;i+=B){
      const p={};
      T.slice(i,i+B).forEach(([k,v])=>{
        const o=Object.assign({},v);
        if(!first) delete o.availCopies;   /* never clobber live shelf state */
        delete o.sources;
        p['library/titles/'+k]=o;
        if(first) p['library/avail/'+k]=v.availCopies!=null?v.availCopies:v.totalCopies;
      });
      p['library/meta/importCursor']={t:i+B,c:cur.c||0};
      await d2update(p);
      say('Writing titles… '+Math.min(i+B,T.length)+' / '+T.length);
      setBusy('impBtn',true,'Titles '+Math.min(i+B,T.length)+'/'+T.length);
    }
    for(let i=(cur.c||0);i<C.length;i+=B){
      const p={}; const ex=first?null:await Promise.resolve(null);
      C.slice(i,i+B).forEach(([k,v])=>{
        /* only seed genuinely new accession numbers; issued copies keep status */
        /* localAcc starts empty — it is filled from your register, never invented */
        p['library/copies/'+k]=first?Object.assign({localAcc:''},v):{titleId:v.titleId,status:'available',localAcc:''};
      });
      p['library/meta/importCursor']={t:T.length,c:i+B};
      await d2update(p);
      say('Writing copies… '+Math.min(i+B,C.length)+' / '+C.length);
      setBusy('impBtn',true,'Copies '+Math.min(i+B,C.length)+'/'+C.length);
    }
    const patch={};
    patch['library/meta/importVersion']=(d.meta&&d.meta.importVersion)||'import-v1';
    patch['library/meta/importedAt']=Date.now();
    patch['library/meta/importedBy']=STATE.user.name;
    patch['library/meta/importCursor']=null;
    patch['library/meta/catVersion']=Date.now();
    if(first&&d.config) patch['library/config']=d.config;
    if(first) patch['library/counters/titleSeq']=T.length;
    await d2update(patch);
    await loadCatalogue(true); await loadAvail(true); await loadCfg();
    say('✅ Imported '+T.length+' titles / '+C.length+' copies.');
    toast('Import complete'); render();
  }catch(e){
    say('❌ '+e.message+'<br>Progress was checkpointed — press Import again to resume from where it stopped.');
    toast('Import failed: '+e.message,true);
  } finally { setBusy('impBtn',false,'📥 Import catalogue'); }
}
async function exportBackup(){
  toast('Building backup…');
  try{
    const [t,c,i,r,cfg]=await Promise.all([d2get('library/titles'),d2get('library/copies'),
      d2get('library/issues'),d2get('library/requests'),d2get('library/config')]);
    const blob=new Blob([JSON.stringify({meta:{exportedAt:new Date().toISOString(),by:STATE.user.name,app:APP_VERSION},
      titles:t,copies:c,issues:i,requests:r,config:cfg},null,1)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='library_backup_'+dkey(new Date())+'.json';
    a.click(); URL.revokeObjectURL(a.href);
    toast('Backup downloaded');
  }catch(e){ toast('Export failed: '+e.message,true); }
}
/* Self-healing: rebuilds every avail counter from real copy statuses. */
async function recount(){
  if(!confirm('Rebuild all availability counters from copy records?')) return;
  toast('Recounting…');
  try{
    const c=await d2get('library/copies');
    const n={};
    Object.values(c||{}).forEach(x=>{ if(x.status==='available') n[x.titleId]=(n[x.titleId]||0)+1; });
    const patch={};
    Object.keys(STATE.titles).forEach(t=>patch['library/avail/'+t]=n[t]||0);
    await d2update(patch); await loadAvail(true);
    toast('Recount done — '+Object.keys(patch).length+' counters rebuilt'); render();
  }catch(e){ toast('Recount failed: '+e.message,true); }
}

/* ═══ ROUTER ═══ */
const NAV={ dash:['📊','Dash'], browse:['🔍','Browse'], mine:['📗','My Books'], hist:['📅','History'],
  desk:['🗂️','Desk'], out:['📖','Issued'], sheet:['📋','Sheet'], adm:['⚙️','Admin'] };
function navFor(){

async function render(){

/* ═══ BOOT ═══ */
async function boot(){
  const app=document.getElementById('app');

  try{
    await getAuthToken();
    await Promise.all([loadCfg(),loadCatalogue(),loadAvail()]);

/* One-time seed so the librarian can log in before anything else exists. */
async function ensureSeed(){
  /* v1.12: MUST check for the SPECIFIC lowercase key, not "is the staff list
     non-empty" — an old capital-key record from an earlier session (before
     v1.09's lowercase fix) satisfied "non-empty" and silently blocked the
     lowercase key from ever being created, which is exactly what happened. */
  try{
    const key=SEED_LIBRARIAN.name.toLowerCase();
    const exact=await d2get('library/staff/'+key);
    if(exact&&exact.password){
      log('library/staff/'+key+' already exists, seed skipped');
      return;
    }
    /* migrate an old capital-key record if one exists, rather than silently
       creating a second account with a different password. */
    const all=await d2get('library/staff');
    const oldKey=Object.keys(all||{}).find(k=>k.toLowerCase()===key&&k!==key);
    if(oldKey&&all[oldKey]&&all[oldKey].password){
      await d2set('library/staff/'+key,Object.assign({},all[oldKey],{migratedFrom:oldKey}));
      log('migrated library/staff/'+oldKey+' → library/staff/'+key);
      return;
    }
    await d2set('library/staff/'+key,{displayName:SEED_LIBRARIAN.name,role:'librarian',password:SEED_LIBRARIAN.password,seeded:true});
    log('seeded default librarian at library/staff/'+key);
  }catch(e){ warn('seed failed — check DB2 write rules for library/staff: '+e.message); }
}
/* ═══ SSO — EMBEDDED MODE (v1.33) ═══════════════════════════════════════════
   When library.html is opened inside an <iframe> by index.html or
   student_portal.html, the parent already authenticated this person. Rather
   than make them type a second set of credentials, the parent posts its live
   session over postMessage and we adopt it directly.

   SECURITY: we only accept a handshake when
     (a) we are actually framed (window.parent !== window), AND
     (b) event.origin is exactly our own origin.
   Both portals and this app are served from the same GitHub Pages origin, so
   a same-origin check is sufficient and cannot be forged by another site.
   The payload carries NO password — only identity + role, which the parent
   established against the same DB2 credential store this app uses.

   Opened standalone (not framed), none of this runs and the normal login
   screen behaves exactly as before. */
const LIB_EMBEDDED = (function(){ try{ return window.parent && window.parent!==window; }catch(e){ return false; } })();
let _ssoSettled=false;

/* Map the parent's session object onto this app's STATE.user shape. */
function ssoAdopt(p){
  if(!p||!p.kind) return null;
  if(p.kind==='student'){
    if(!p.id) return null;
    return {kind:'student',id:String(p.id).toUpperCase(),name:p.name||'',role:'student',
      class:p.class||'',sem:p.sem||'',phone:p.phone||'',ay:p.ay||'',sso:true};
  }
  if(p.kind==='staff'){
    if(!p.name) return null;
    const role=['admin','manager','vp','fulltime','visiting','librarian'].includes(p.role)?p.role:'visiting';
    return {kind:'staff',id:p.id||('STF-'+String(p.name).replace(/\s+/g,'').slice(0,8).toUpperCase()),
      name:p.name,role:role,phone:p.phone||'',class:'',sem:'',sso:true};
  }
  return null;
}

/* A staff member who is ALSO a librarian in the DB2 overlay must keep that
   elevated role when arriving via SSO — same rule as loginStaff() step 2. */
async function ssoApplyOverlay(u){
  if(u.kind!=='staff') return u;
  if(['admin','manager','vp'].includes(u.role)) return u;  /* never downgrade */
  try{
    const ov=await d2get('library/staff/'+encodeURIComponent(u.name.toLowerCase()).replace(/\./g,'%2E'));
    if(ov&&ov.role) u.role=ov.role;
    if(ov&&ov.displayName) u.name=ov.displayName;
  }catch(e){ warn('sso overlay lookup failed: '+e.message); }
  return u;
}

/* Student SSO is verified against DB2 the same way loginStudent() does —
   the URN must exist and must not be banned. Identity comes from the parent;
   authorisation is still re-checked here. */
async function ssoVerifyStudent(u){
  const d=await d2get('davan_pub/portal_students/'+u.id);
  if(!d||!d.urn) throw new Error('URN not found');
  const ban=await d2get('controls/bannedStudents');
  const arr=ban&&typeof ban==='object'&&!Array.isArray(ban)?Object.keys(ban):(Array.isArray(ban)?ban:[]);
  if(arr.includes(u.id)) throw new Error('suspended');
  u.name=d.name||u.name; u.class=d.class||u.class;
  u.sem=d.semester||u.sem; u.phone=d.phone||u.phone; u.ay=d.ay||u.ay;
  return u;
}

async function ssoHandshake(ev){
  if(_ssoSettled) return;
  if(ev.origin!==window.location.origin) return;          /* forgery guard */
  const d=ev.data;
  if(!d||d.type!=='DAVAN_LIB_SSO'||!d.user) return;
  let u=ssoAdopt(d.user);
  if(!u){ ssoFallback('Session could not be read — please sign in.'); return; }
  _ssoSettled=true;
  try{
    if(u.kind==='student') u=await ssoVerifyStudent(u);
    else                   u=await ssoApplyOverlay(u);
  }catch(e){
    ssoFallback(e.message==='suspended'
      ? 'Your account has been suspended. Please contact your administrator.'
      : 'Could not verify your account — please sign in.');
    return;
  }
  STATE.user=u;
  /* Deliberately NOT saveSession(): an SSO session belongs to the parent tab.
     Persisting it would leave the library signed in after the portal logs out. */
  await boot();
}

/* If the handshake never lands (parent too old to send it, or payload
   rejected) fall back to the ordinary login screen rather than hanging. */
function ssoFallback(msg){
  _ssoSettled=true;
  if(STATE.user) return;
  document.getElementById('app').innerHTML=loginScreen();
  document.getElementById('footer').innerHTML=footerHtml();
  if(msg) showErr('err-stu',msg);
  getAuthToken(); ensureSeed();
}

(async function init(){
  const remembered=loadSession();
  if(remembered){ STATE.user=remembered; await boot(); return; }

  if(LIB_EMBEDDED){
    window.addEventListener('message',ssoHandshake);
    document.getElementById('app').innerHTML=
      '<div style="padding:60px 20px;text-align:center;color:var(--muted);font-size:12px">'+
      '<span class="spin"></span><br><br>Signing you in…</div>';
    await getAuthToken();
    /* Tell the parent we are listening — it may have loaded before us. */
    try{ window.parent.postMessage({type:'DAVAN_LIB_READY'},window.location.origin); }catch(e){}
    setTimeout(()=>{ if(!_ssoSettled) ssoFallback(''); },6000);
    return;
  }
  document.getElementById('app').innerHTML=loginScreen();
  document.getElementById('footer').innerHTML=footerHtml();
  await getAuthToken();
  ensureSeed();  /* v1.10: fire on the login screen too, not just post-login boot() */
})();
/* PWA: cache the shell so a flaky campus connection still opens the app.
   The catalogue itself is cached in IndexedDB (see loadCatalogue), not here. */
if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET') return;
  const u=new URL(e.request.url);
  if(u.origin!==location.origin) return;
  e.respondWith(fetch(e.request).then(r=>{
    const c=r.clone(); caches.open('davan-lib-v1').then(x=>x.put(e.request,c)); return r;
  }).catch(()=>caches.match(e.request)));
});`;
  const b=new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
}
</script>
<script>
/* ═══ DASHBOARD (v1.01) ════════════════════════════════════════════════════
   "Due today / due tomorrow" is the number that actually runs a library — it is
   who walks in this morning. Everything else is context. */
function startOfDay(ts){ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function isToday(ts){ return ts && startOfDay(ts)===startOfDay(Date.now()); }
function isTomorrow(ts){ return ts && startOfDay(ts)===startOfDay(Date.now())+864e5; }
/* ═══ SHEET VIEW (v1.16) — spreadsheet table, sticky header + sticky first
   column, inline-editable cells. Reached via nav tab OR by tapping any
   dashboard stat/course bar with a pre-set filter (window._sheetFilter). ═══ */
/* v1.23: expand/collapse a sheet cell in place. Only ONE cell open at a
   time — opening a new one closes whatever was already open, and clicking
   anywhere outside an open cell closes it (see the document click listener
   near boot). This keeps the table from turning into a wall of open lists. */
function sheetExpand(cid){
  const already=document.getElementById('pk-'+cid);
  const wasOpen=already && !already.classList.contains('hide');
  document.querySelectorAll('.sheet-expand').forEach(el=>el.classList.add('hide'));
  if(!wasOpen && already) already.classList.remove('hide');
}
document.addEventListener('click',e=>{
  if(e.target.closest('.sheet-collapsed')||e.target.closest('.sheet-expand')) return;
  document.querySelectorAll('.sheet-expand').forEach(el=>el.classList.add('hide'));
});
function viewSheetLink(kind,val){
  window._sheetFilter={kind,val};
  STATE.tab='sheet'; render();
}
async function viewSheet(){
  if(!STATE.optCourses) refreshFilterOptions();
  const pre=window._sheetFilter; window._sheetFilter=null;
  const q=(window._shQ||'').toLowerCase();
  let course=window._shCourse!==undefined?window._shCourse:'';
  let cat=window._shCat!==undefined?window._shCat:'';
  let sem=window._shSem!==undefined?window._shSem:'';
  let label='All titles';
  if(pre){
    /* v1.19: label text no longer carries a count (pre.val) — the count shown
       to the user is now ALWAYS L.length, read at the same point rows are
       built, so label and rows can never disagree. */
    if(pre.kind==='untagged'){ window._shUntagged=true; label='Untagged'; }
    else if(pre.kind==='course'){ course=pre.val; window._shCourse=course; label='Course: '+pre.val; }
    else if(pre.kind==='overdue'){ window._shOverdue=true; label='Overdue titles'; }
    else if(pre.kind==='out'){ window._shOut=true; label='Titles currently out'; }

    <td class="mono" style="color:var(--muted);text-align:right">${idx+1}</td>

    <td><input type="number" value="${t.totalCopies||0}" style="width:56px;font-size:11px;padding:3px 6px" onchange="sheetQtyChange('${i}',this.value,this)"><span id="sv-qty-${esc(i)}" class="sheet-saved" style="display:none;margin-left:4px">✓</span></td>
    <td class="mono" style="font-size:9.5px;color:var(--muted)">${availOf(i)}</td>
    <td><button class="btn btn-sm btn-ghost" onclick="bookSheet('${i}')">Open</button></td>
  </tr>`).join('');
  /* v1.25: same L, same chipCell() markup — just arranged as a vertical card
     instead of table cells, for phone width where a 7-column table cannot
     be made usably editable. */
  const cards=L.map(([i,t],idx)=>`<div class="sheet-card" data-tid="${esc(i)}">
    <div class="sc-title"><span class="mono" style="color:var(--muted);font-size:11px;font-weight:400">${idx+1}.</span> ${esc(t.name)}</div>
    <div class="sc-author">${esc(t.author||'')}</div>

async function sheetCellSave(tid,field,cid,multi){
  try{
    const v=pickerValue(cid,multi);
    const upd={};
    if(field==='category') upd.category=v||'Uncategorized';
    else if(field==='courses') upd.courses=v;
    else if(field==='sems') upd.sems=v.map(Number);
    upd.tagConf='manual';
    const patch={}; Object.entries(upd).forEach(([k,val])=>patch['library/titles/'+tid+'/'+k]=val);
    await d2update(patch);
    Object.assign(STATE.titles[tid],upd);
    await idbSet('titles',STATE.titles);
    refreshFilterOptions(); bumpCat();
    /* v1.23: update the collapsed pill's visible text immediately, without a
       full re-render — otherwise the just-edited selection wouldn't show
       until the row happened to redraw for some other reason. */
    const cw=document.querySelector('#cw-'+cid+' span');
    if(cw){ cw.textContent=v.length?(Array.isArray(v)?v.join(', '):v):'—'; cw.style.color=v.length?'var(--accent)':'var(--muted)'; }
    const sv=document.getElementById('sv-'+cid);
    if(sv){ sv.style.display='inline'; setTimeout(()=>sv.style.display='none',1400); }
  }catch(e){ toast('Failed: '+e.message,true); }
}
async function sheetQtyChange(tid,val,inputEl){
  const n=parseInt(val,10);
  const t=STATE.titles[tid];
  if(!(n>=0)||!t) return toast('Invalid quantity',true);
  const diff=n-(t.totalCopies||0);
  if(diff===0) return;
  if(diff<0){ toast("To reduce copies, retire individual copies in Edit Book — quantity can't be lowered from here (which copy would be removed?)",true); inputEl.value=t.totalCopies||0; return; }
  try{
    const cam=t.campus||'Davan', str=t.stream||'DEG';
    const pfx={DEG:'DEG',PUC:'PUC',BEd:'BED'}[str]||'GEN';
    const patch={};
    for(let k=0;k<diff;k++){
      const a=await bump('library/counters/acc/'+cam+'/'+str);
      patch['library/copies/'+cam.slice(0,3).toUpperCase()+'-'+pfx+'-'+String(a).padStart(5,'0')]={titleId:tid,status:'available',localAcc:''};
    }
    patch['library/titles/'+tid+'/totalCopies']=n;
    patch['library/avail/'+tid]=availOf(tid)+diff;
    await d2update(patch);
    t.totalCopies=n; STATE.avail[tid]=availOf(tid);
    await idbSet('titles',STATE.titles); bumpCat();
    const sv=document.getElementById('sv-qty-'+tid);
    if(sv){ sv.style.display='inline'; setTimeout(()=>sv.style.display='none',1400); }
    toast('+'+diff+' copies added');
  }catch(e){ toast('Failed: '+e.message,true); }
}

async function saveOrder(){
  const t=val('o-title'); const q=parseInt(val('o-qty')||'1',10);
  if(!t) return showErr('oErr','Book title is required.');
  if(!(q>0&&q<=500)) return showErr('oErr','Quantity must be 1–500.');
  setBusy('oBtn',true,'Saving…');
  try{
    const n=await bump('library/counters/ordSeq');
    const d=new Date();
    const id='REQN-'+String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+'-'+String(n).padStart(3,'0');
    const rec={ title:t, author:val('o-auth'), publisher:val('o-pub'), isbn:val('o-isbn'),
      qty:q, price:val('o-price')||'', campus:val('o-cam'), stream:val('o-str'),
      course:val('o-course'), why:val('o-why'), to:val('o-to'),
      st:'requested', by:STATE.user.name, at:Date.now() };
    await d2set('library/orders/'+id,rec);
    closeSheet(); toast('Requisition '+id+' saved'); render();
    setTimeout(()=>printOrder(id),400);
  }catch(e){ showErr('oErr','Failed: '+e.message); }
  finally{ setBusy('oBtn',false,'Save requisition'); }
}
async function advOrder(id,st){
  const nx={requested:'approved',approved:'ordered',ordered:'received'}[st];
  if(!nx) return;
  if(nx==='received'){
    if(!confirm('Mark received?\n\nThis creates the title and generates accession numbers for every copy.')) return;
    try{
      const o=await d2get('library/orders/'+id);
      const seq=await bump('library/counters/titleSeq');
      const tid='T'+String(seq).padStart(5,'0');
      const cam=o.campus||'Davan', str=o.stream||'DEG';
      const pfx={DEG:'DEG',PUC:'PUC',BEd:'BED'}[str]||'GEN';
      const patch={};
      patch['library/titles/'+tid]={ name:o.title, author:o.author||'Unknown', publisher:o.publisher||'',
        isbn:o.isbn||'', price:o.price||null, campus:cam, stream:str, category:'Uncategorized',
        courses:o.course?[o.course]:[], sems:[], tagConf:'needs_review', totalCopies:o.qty,
        fromOrder:id, addedBy:STATE.user.name, addedAt:Date.now() };
      for(let k=0;k<o.qty;k++){
        const a=await bump('library/counters/acc/'+cam+'/'+str);
        patch['library/copies/'+cam.slice(0,3).toUpperCase()+'-'+pfx+'-'+String(a).padStart(5,'0')]={titleId:tid,status:'available',localAcc:''};
      }
      patch['library/avail/'+tid]=o.qty;
      patch['library/orders/'+id+'/st']='received';
      patch['library/orders/'+id+'/tid']=tid;
      patch['library/orders/'+id+'/receivedAt']=Date.now();
      await d2update(patch);
      await loadCatalogue(true); await loadAvail(true); bumpCatNow();
      toast('Received — '+o.qty+' copies added. Print labels from Admin → Data.'); render();
    }catch(e){ toast('Failed: '+e.message,true); }
    return;
  }
  try{ await d2update({['library/orders/'+id+'/st']:nx,['library/orders/'+id+'/'+nx+'By']:STATE.user.name});
    toast('Marked '+nx); renderOrders(); }
  catch(e){ toast('Failed: '+e.message,true); }
}
/* Two copies on one A4 — one to address, one for office file. */

      <tr><td class="k">Quantity</td><td class="v"><b>${o.qty}</b></td><td class="k">Est. price each</td><td class="v">${o.price?'Rs. '+esc(o.price):'—'}</td></tr>

      <tr><td class="k">Justification</td><td class="v" colspan="3">${esc(o.why||'—')}</td></tr>

    .pb{width:100%;border-collapse:collapse}
    .pb td{border:1px solid #555;padding:2.5mm 3mm;vertical-align:top}
    .k{background:#f0f0f0;font-size:8.5pt;letter-spacing:.5px;width:23%;font-weight:bold}
    .v{font-size:10.5pt;width:27%}
    .sg{display:flex;justify-content:space-between;margin-top:16mm;font-size:9pt}
    .sg>div{width:44%;text-align:center}
    .sl{border-top:1px solid #000;margin-bottom:1.5mm}
    .sn{font-size:8pt;color:#444}
    @media print{.noprint{display:none}}
  </style></head><body>${cp('TO THE ADDRESS')}${cp('OFFICE COPY')}
  <div class="noprint" style="text-align:center;margin-top:5mm">
    <button onclick="window.print()" style="padding:9px 22px;font-size:12pt;cursor:pointer">Print</button></div>
  </body></html>`);
  w.document.close();
}
</script>
<script>
/* ═══ LOCAL ACCESSION (v1.01) ══════════════════════════════════════════════
   accNo  = generated here, unique, permanent — what the DB hangs loans on.
   localAcc = whatever is written in YOUR register / stamped in the book.
   Both kept because the source data was inconsistent: B'Ed sheets had real
   accession numbers, PUC & DEGREE (1571 copies) had none at all. Register
   numbers can be blank, duplicated across campuses or simply not yet known,
   so they cannot safely be the primary key — but they ARE what the librarian
   reads off the shelf, so they must be first-class and searchable. */
async function saveLocal(acc){
  const v=((document.getElementById('la-'+acc)||{}).value||'').trim();
  try{
    await d2set('library/copies/'+acc+'/localAcc',v);
    if(STATE.accIdx){ STATE.accIdx[v.toLowerCase()]=STATE.accIdx[acc.toLowerCase()]; }
    toast(v?('Saved reg. no. '+v):'Register number cleared');
  }catch(e){ toast('Failed: '+e.message,true); }
}
function syncLocalBox(){
  const s=document.getElementById('accSel'); const b=document.getElementById('accLocal');
  if(!s||!b) return;
  const o=s.options[s.selectedIndex];
  b.value=o?(o.getAttribute('data-la')||''):'';
}
function bulkLocal(tid){
  sheet(`<div class="page-title" style="font-size:20px">BULK REGISTER NUMBERS</div>
    <div class="alert">One copy per line: <b>accession , your number</b><br>
      <span class="mono" style="font-size:9.5px">DAV-DEG-00410,4521<br>DAV-DEG-00411,4522</span><br><br>
      Paste two columns straight out of Excel (tab-separated works too). Only the copies you list are touched — everything else is left alone.</div>
    <textarea id="blk" style="width:100%;height:190px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px;font-family:var(--mono);font-size:11px" placeholder="DAV-DEG-00410,4521"></textarea>
    <div id="blkErr"></div>
    <button class="btn btn-full" id="blkBtn" style="margin-top:9px" onclick="saveBulkLocal('${tid||''}')">Save all</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="${tid?`editBook('${tid}')`:'closeSheet()'}">Cancel</button>`);
}
async function saveBulkLocal(tid){
  const raw=((document.getElementById('blk')||{}).value||'').trim();
  if(!raw) return;
  setBusy('blkBtn',true,'Saving…');
  try{
    const all=await d2get('library/copies')||{};
    const patch={}; let ok=0; const bad=[];
    raw.split(/\r?\n/).forEach(line=>{
      if(!line.trim()) return;
      const p=line.split(/[,\t;]/).map(x=>x.trim());
      if(p.length<2||!p[0]) return;
      const acc=p[0].toUpperCase();
      if(!all[acc]){ bad.push(p[0]); return; }
      patch['library/copies/'+acc+'/localAcc']=p[1]; ok++;
    });
    if(!ok){ showErr('blkErr','No valid accession numbers found. Check the left column matches numbers like DAV-DEG-00410.'); return; }
    await d2update(patch);
    await buildAccIdx(true);
    closeSheet();
    toast(ok+' register numbers saved'+(bad.length?' · '+bad.length+' unknown accession(s) skipped':''));
    if(tid) editBook(tid);
  }catch(e){ showErr('blkErr','Failed: '+e.message); }
  finally{ setBusy('blkBtn',false,'Save all'); }
}
/* Index accNo + localAcc → titleId so either number finds the book from search.
   Built lazily for staff only; students never need it (and it would cost them
   a 600KB copies read for nothing). */
async function buildAccIdx(force){
  if(!isStaff()) return;
  if(STATE.accIdx&&!force) return;
  const c=await d2get('library/copies');
  const ix={};
  Object.entries(c||{}).forEach(([a,x])=>{
    ix[a.toLowerCase()]=x.titleId;
    if(x.localAcc) ix[String(x.localAcc).toLowerCase()]=x.titleId;
  });
  STATE.accIdx=ix; log('acc index '+Object.keys(ix).length);
}
/* ═══ EXPORT ACCESSION LABELS ═══
   Both numbers on every label — the system one and yours — so a spine carries
   the ID the DB uses and the ID your register uses. This is what makes the
   generated numbers real on the 1571 copies that never had any. */
/* ═══ CATALOGUE REGISTER — per-TITLE bookkeeping export (v1.14), distinct from
   Export Accession Labels which is per-COPY for printing stickers. This one
   answers "English 5 books, Kannada 21 books" — one row per title with its
   quantity and every accession/register number rolled up, grouped by
   category with subtotals, ending in the grand total. ═══ */
async function exportRegister(){
  toast('Building register…');
  try{
    const c=await d2get('library/copies')||{};
    const byTitle={};
    Object.entries(c).forEach(([acc,cp])=>{
      (byTitle[cp.titleId]=byTitle[cp.titleId]||{accs:[],las:[]}).accs.push(acc);
      if(cp.localAcc) byTitle[cp.titleId].las.push(cp.localAcc);
    });
    const rows=Object.entries(STATE.titles)
      .filter(([i,t])=>t.status!=='merged'&&t.status!=='retired')
      .map(([i,t])=>({
        tid:i, name:t.name||'', author:t.author||'', category:t.category||'Uncategorized',
        courses:(t.courses||[]).join(', '), qty:t.totalCopies||0,
        accs:(byTitle[i]&&byTitle[i].accs||[]).sort().join('; '),
        las:(byTitle[i]&&byTitle[i].las||[]).sort().join('; ')
      }));
    rows.sort((a,b)=>a.category.localeCompare(b.category)||a.name.localeCompare(b.name));
    const byCat={};
    rows.forEach(r=>{ byCat[r.category]=byCat[r.category]||{n:0,q:0}; byCat[r.category].n++; byCat[r.category].q+=r.qty; });
    const grandTitles=rows.length, grandCopies=rows.reduce((a,r)=>a+r.qty,0);
    sheet(`<div class="page-title" style="font-size:20px">CATALOGUE REGISTER</div>
      <div class="alert">${grandTitles} titles · ${grandCopies} total copies, grouped by category. This is your bookkeeping record — a full list with quantities, distinct from the printable sticker labels.</div>
      <div class="card"><h3>BY CATEGORY</h3>
        ${Object.entries(byCat).sort((a,b)=>b[1].q-a[1].q).map(([cat,v])=>`<div class="rw">
          <span style="font-size:12px">${esc(cat)}</span>
          <span class="mono" style="font-size:11px;color:var(--muted)">${v.n} titles · ${v.q} copies</span></div>`).join('')}
        <div class="rw" style="border-top:2px solid var(--border);margin-top:4px;padding-top:9px">
          <span style="font-size:12px;font-weight:700">GRAND TOTAL</span>
          <span class="mono" style="font-size:12px;font-weight:700">${grandTitles} titles · ${grandCopies} copies</span></div></div>
      <button class="btn btn-full" style="margin-bottom:7px" onclick='doRegister("csv")'>📄 Download CSV</button>
      <button class="btn btn-full btn-ghost" style="margin-bottom:7px" onclick='doRegister("print")'>🖨️ Print register</button>
      <button class="btn btn-full btn-ghost" onclick="closeSheet()">Close</button>`);
    window._regRows=rows; window._regByCat=byCat; window._regTotals={t:grandTitles,c:grandCopies};
  }catch(e){ toast('Failed: '+e.message,true); }
}
function doRegister(mode){
  const rows=window._regRows||[], byCat=window._regByCat||{}, tot=window._regTotals||{t:0,c:0};
  if(!rows.length) return toast('Nothing to export',true);
  if(mode==='csv'){
    const esc2=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
    const out=[['Sl.No.','Category','Title','Author','Courses','Quantity','Accession Numbers','Register Numbers']];
    rows.forEach((r,i)=>out.push([i+1,r.category,r.name,r.author,r.courses,r.qty,r.accs,r.las]));
    out.push([]); out.push(['','','','','GRAND TOTAL',tot.c,tot.t+' titles','']);
    const blob=new Blob([out.map(r=>r.map(esc2).join(',')).join('\n')],{type:'text/csv'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='catalogue_register_'+dkey(new Date())+'.csv'; a.click();
    URL.revokeObjectURL(a.href); toast(rows.length+' titles exported');
    window.focus();  /* v1.30: the download click can blur focus off the sheet */
    return;
  }
  const w=window.open('','_blank');
  window.focus();  /* v1.30: opening a new tab/window can leave THIS window
    unfocused, making the sheet's Close button unresponsive until the user
    manually clicks back — bring focus back explicitly instead of relying
    on browser default. */
  w.document.write(`<!DOCTYPE html><html><head><title>Catalogue Register</title><style>
    @page{size:A4;margin:12mm}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Georgia,serif;color:#000;background:#fff;font-size:9.5pt}
    h1{font-size:15pt;text-align:center;margin-bottom:2mm}
    .sub{text-align:center;font-size:9pt;color:#555;margin-bottom:8mm}
    .cat{font-size:11pt;font-weight:bold;background:#eee;padding:2mm 3mm;margin-top:6mm;border:1px solid #999}
    table{width:100%;border-collapse:collapse;margin-bottom:2mm}
    th,td{border:1px solid #999;padding:1.5mm 2mm;font-size:8.5pt;text-align:left;vertical-align:top}
    th{background:#f5f5f5}
    .qty{text-align:center;font-weight:bold}
    .catsub{text-align:right;font-size:8.5pt;font-style:italic;padding:1mm 2mm}
    .grand{font-size:12pt;font-weight:bold;text-align:center;margin-top:8mm;border-top:2px solid #000;padding-top:4mm}
    .noprint{text-align:center;margin:5mm}
    @media print{.noprint{display:none}}
  </style></head><body>
    <div class="noprint"><button onclick="window.print()" style="padding:9px 22px;font-size:12pt;cursor:pointer">Print</button></div>
    <h1>DAVAN &amp; NUTANA GROUP — LIBRARY CATALOGUE REGISTER</h1>
    <div class="sub">Generated ${dkey(new Date())} · ${tot.t} titles · ${tot.c} total copies</div>
    ${Object.entries(byCat).sort((a,b)=>b[1].q-a[1].q).map(([cat,v])=>{
      const items=rows.filter(r=>r.category===cat);
      return `<div class="cat">${cat} — ${v.n} titles, ${v.q} copies</div>
      <table><tr><th style="width:5%">Sl.No.</th><th style="width:29%">Title</th><th style="width:14%">Author</th><th style="width:9%">Courses</th><th style="width:5%">Qty</th><th style="width:38%">Accession Nos.</th></tr>
      ${items.map((r,i)=>`<tr><td class="qty">${i+1}</td><td>${r.name}</td><td>${r.author}</td><td>${r.courses}</td><td class="qty">${r.qty}</td><td style="font-family:monospace;font-size:7.5pt">${r.accs}</td></tr>`).join('')}
      </table>`;
    }).join('')}
    <div class="grand">GRAND TOTAL: ${tot.t} TITLES · ${tot.c} COPIES</div>
  </body></html>`);
  w.document.close(); toast('Register ready to print');
}
async function exportLabels(){
  sheet(`<div class="page-title" style="font-size:20px">EXPORT ACCESSION LABELS</div>
    <div style="display:flex;gap:8px">
      <div class="fld" style="flex:1"><label>Campus</label><select id="lb-cam"><option value="">All</option>${CAMPUSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="fld" style="flex:1"><label>Stream</label><select id="lb-str"><option value="">All</option>${STREAMS.map(c=>`<option>${c}</option>`).join('')}</select></div></div>
    <div class="alert">Print one shelf at a time. Each label carries the system accession number <b>and</b> your register number, so the book physically matches the database.</div>
    <button class="btn btn-full" style="margin-bottom:7px" onclick="doLabels('print')">🖨️ Print label sheet</button>
    <button class="btn btn-full btn-ghost" style="margin-bottom:7px" onclick="doLabels('csv')">📄 Download CSV</button>
    <button class="btn btn-full btn-ghost" onclick="bulkLocal('')">📋 Bulk-enter register numbers</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Close</button>`);
}
async function doLabels(mode){
  const cam=val('lb-cam'), str=val('lb-str');
  toast('Building…');
  try{
    const c=await d2get('library/copies');
    let L=Object.entries(c||{}).map(([a,x])=>{
      const t=STATE.titles[x.titleId]||{};
      return {acc:a, la:x.localAcc||'', name:t.name||'', author:t.author||'',
              campus:t.campus||'', stream:t.stream||'', status:x.status};
    });
    if(cam) L=L.filter(x=>x.campus===cam);
    if(str) L=L.filter(x=>x.stream===str);
    L.sort((a,b)=>a.acc.localeCompare(b.acc));
    if(!L.length) return toast('No copies match',true);
    if(mode==='csv'){
      const esc2=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
      const rows=[['Sl.No.','Accession No','Register No','Title','Author','Campus','Stream','Status']]
        .concat(L.map((x,i)=>[i+1,x.acc,x.la,x.name,x.author,x.campus,x.stream,x.status]));
      const blob=new Blob([rows.map(r=>r.map(esc2).join(',')).join('\n')],{type:'text/csv'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob); a.download='accession_labels_'+dkey(new Date())+'.csv'; a.click();
      URL.revokeObjectURL(a.href); toast(L.length+' rows exported');
      window.focus();  /* v1.30: download click can blur focus off the sheet */
      return;
    }
    const w=window.open('','_blank');
    window.focus();  /* v1.30: keep the sheet focused/interactive after opening the print tab */
    w.document.write(`<!DOCTYPE html><html><head><title>Labels</title><style>
      @page{size:A4;margin:8mm}
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:Arial,Helvetica,sans-serif;color:#000;background:#fff}
      .g{display:grid;grid-template-columns:repeat(3,1fr);gap:3mm}
      .l{border:1px dashed #999;padding:3mm;height:26mm;page-break-inside:avoid;display:flex;flex-direction:column;justify-content:space-between}
      .h{font-size:6.5pt;letter-spacing:.5px;color:#444}
      .a{font-family:'Courier New',monospace;font-size:11pt;font-weight:bold;letter-spacing:.5px}
      .r{font-family:'Courier New',monospace;font-size:9pt;border-top:1px solid #ccc;padding-top:1mm}
      .r b{font-size:11pt}
      .t{font-size:6.5pt;line-height:1.25;overflow:hidden;max-height:7mm}
      .noprint{text-align:center;margin:5mm}
      @media print{.noprint{display:none}}
    </style></head><body>
      <div class="noprint"><button onclick="window.print()" style="padding:9px 22px;font-size:12pt;cursor:pointer">Print ${L.length} labels</button></div>
      <div class="g">${L.map(x=>`<div class="l">
        <div><div class="h">DAVAN &amp; NUTANA LIBRARY</div><div class="a">${x.acc}</div></div>
        <div class="t">${String(x.name).slice(0,58)}</div>
        <div class="r">REG: <b>${x.la||'____________'}</b></div></div>`).join('')}</div>
    </body></html>`);
    w.document.close(); toast(L.length+' labels ready');
  }catch(e){ toast('Failed: '+e.message,true); }
}
/* ═══ COLLECTION APPOINTMENT (v1.01) ═══
   A ready hold gets a real slot rather than a vague "held for N days", so the
   counter is scheduled instead of queued. The pickup window still governs
   expiry — the appointment is guidance, not a second deadline. */
function setAppt(reqId){
  const d=new Date(Date.now()+864e5);
  const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  sheet(`<div class="page-title" style="font-size:20px">COLLECTION SLOT</div>
    <div class="fld"><label>Date</label><input id="ap-d" type="date" value="${iso}"></div>
    <div style="display:flex;gap:8px">
      <div class="fld" style="flex:1"><label>From</label><input id="ap-f" type="time" value="11:00"></div>
      <div class="fld" style="flex:1"><label>To</label><input id="ap-t" type="time" value="12:30"></div></div>
    <div class="fld"><label>Note (optional)</label><input id="ap-n" placeholder="Bring your ID card"></div>
    <div class="alert">This appears on the student's own login beside their token. The ${'{'}pickup${'}'} window still applies — if they don't collect, the copy passes to the next in queue.</div>
    <button class="btn btn-full" id="apBtn" onclick="saveAppt('${reqId}')">Save slot</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Cancel</button>`.replace('{pickup}',String(STATE.cfg.pickupDays||2)+'-day'));
}
async function saveAppt(reqId){
  const d=val('ap-d'), f=val('ap-f'), t=val('ap-t');
  if(!d||!f) return toast('Pick a date and time',true);
  setBusy('apBtn',true,'Saving…');
  try{
    await d2update({
      ['library/requests/'+reqId+'/appt']:{d,f,t,note:val('ap-n'),by:STATE.user.name},
    });
    _reqCache.at=0; closeSheet(); toast('Collection slot set'); render();
  }catch(e){ toast('Failed: '+e.message,true); }
  finally{ setBusy('apBtn',false,'Save slot'); }
}
function apptLine(a){
  if(!a) return '';
  const dt=new Date(a.d+'T00:00:00');
  const ds=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()]+' '+String(dt.getDate()).padStart(2,'0')+' '+MON[dt.getMonth()];
  return ds+', '+a.f+(a.t?' – '+a.t:'');
}
</script>
