</script>
<script>
/* ═══ LOCAL ACCESSION (v1.01) ══════════════════════════════════════════════
   accNo  = generated here, unique, permanent — what the DB hangs loans on.
   localAcc = whatever is written in YOUR register / stamped in the book.
   Both kept because the source data was inconsistent: B'Ed sheets had real
   accession numbers, PUC & DEGREE (1571 copies) had none at all. Register
   numbers can be blank, duplicated across campuses or simply not yet known,
   so they cannot safely be the primary key — but they ARE what the librarian
   reads off the shelf, so they must be first-class and searchable. */
async function saveLocal(acc){
  const v=((document.getElementById('la-'+acc)||{}).value||'').trim();
  try{
    await d2set('library/copies/'+acc+'/localAcc',v);
    if(STATE.accIdx){ STATE.accIdx[v.toLowerCase()]=STATE.accIdx[acc.toLowerCase()]; }
    toast(v?('Saved reg. no. '+v):'Register number cleared');
  }catch(e){ toast('Failed: '+e.message,true); }
}
function syncLocalBox(){
  const s=document.getElementById('accSel'); const b=document.getElementById('accLocal');
  if(!s||!b) return;
  const o=s.options[s.selectedIndex];
  b.value=o?(o.getAttribute('data-la')||''):'';
}
function bulkLocal(tid){
  sheet(`<div class="page-title" style="font-size:20px">BULK REGISTER NUMBERS</div>
    <div class="alert">One copy per line: <b>accession , your number</b><br>
      <span class="mono" style="font-size:9.5px">DAV-DEG-00410,4521<br>DAV-DEG-00411,4522</span><br><br>
      Paste two columns straight out of Excel (tab-separated works too). Only the copies you list are touched — everything else is left alone.</div>
    <textarea id="blk" style="width:100%;height:190px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px;font-family:var(--mono);font-size:11px" placeholder="DAV-DEG-00410,4521"></textarea>
    <div id="blkErr"></div>
    <button class="btn btn-full" id="blkBtn" style="margin-top:9px" onclick="saveBulkLocal('${tid||''}')">Save all</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="${tid?`editBook('${tid}')`:'closeSheet()'}">Cancel</button>`);
}
async function saveBulkLocal(tid){
  const raw=((document.getElementById('blk')||{}).value||'').trim();
  if(!raw) return;
  setBusy('blkBtn',true,'Saving…');
  try{
    const all=await d2get('library/copies')||{};
    const patch={}; let ok=0; const bad=[];
    raw.split(/\r?\n/).forEach(line=>{
      if(!line.trim()) return;
      const p=line.split(/[,\t;]/).map(x=>x.trim());
      if(p.length<2||!p[0]) return;
      const acc=p[0].toUpperCase();
      if(!all[acc]){ bad.push(p[0]); return; }
      patch['library/copies/'+acc+'/localAcc']=p[1]; ok++;
    });
    if(!ok){ showErr('blkErr','No valid accession numbers found. Check the left column matches numbers like DAV-DEG-00410.'); return; }
    await d2update(patch);
    await buildAccIdx(true);
    closeSheet();
    toast(ok+' register numbers saved'+(bad.length?' · '+bad.length+' unknown accession(s) skipped':''));
    if(tid) editBook(tid);
  }catch(e){ showErr('blkErr','Failed: '+e.message); }
  finally{ setBusy('blkBtn',false,'Save all'); }
}
/* Index accNo + localAcc → titleId so either number finds the book from search.
   Built lazily for staff only; students never need it (and it would cost them
   a 600KB copies read for nothing). */
async function buildAccIdx(force){
  if(!isStaff()) return;
  if(STATE.accIdx&&!force) return;
  const c=await d2get('library/copies');
  const ix={};
  Object.entries(c||{}).forEach(([a,x])=>{
    ix[a.toLowerCase()]=x.titleId;
    if(x.localAcc) ix[String(x.localAcc).toLowerCase()]=x.titleId;
  });
  STATE.accIdx=ix; log('acc index '+Object.keys(ix).length);
}
/* ═══ EXPORT ACCESSION LABELS ═══
   Both numbers on every label — the system one and yours — so a spine carries
   the ID the DB uses and the ID your register uses. This is what makes the
   generated numbers real on the 1571 copies that never had any. */
async function exportLabels(){
  sheet(`<div class="page-title" style="font-size:20px">EXPORT ACCESSION LABELS</div>
    <div style="display:flex;gap:8px">
      <div class="fld" style="flex:1"><label>Campus</label><select id="lb-cam"><option value="">All</option>${CAMPUSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="fld" style="flex:1"><label>Stream</label><select id="lb-str"><option value="">All</option>${STREAMS.map(c=>`<option>${c}</option>`).join('')}</select></div></div>
    <div class="alert">Print one shelf at a time. Each label carries the system accession number <b>and</b> your register number, so the book physically matches the database.</div>
    <button class="btn btn-full" style="margin-bottom:7px" onclick="doLabels('print')">🖨️ Print label sheet</button>
    <button class="btn btn-full btn-ghost" style="margin-bottom:7px" onclick="doLabels('csv')">📄 Download CSV</button>
    <button class="btn btn-full btn-ghost" onclick="bulkLocal('')">📋 Bulk-enter register numbers</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Close</button>`);
}
async function doLabels(mode){
  const cam=val('lb-cam'), str=val('lb-str');
  toast('Building…');
  try{
    const c=await d2get('library/copies');
    let L=Object.entries(c||{}).map(([a,x])=>{
      const t=STATE.titles[x.titleId]||{};
      return {acc:a, la:x.localAcc||'', name:t.name||'', author:t.author||'',
              campus:t.campus||'', stream:t.stream||'', status:x.status};
    });
    if(cam) L=L.filter(x=>x.campus===cam);
    if(str) L=L.filter(x=>x.stream===str);
    L.sort((a,b)=>a.acc.localeCompare(b.acc));
    if(!L.length) return toast('No copies match',true);
    if(mode==='csv'){
      const esc2=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
      const rows=[['Accession No','Register No','Title','Author','Campus','Stream','Status']]
        .concat(L.map(x=>[x.acc,x.la,x.name,x.author,x.campus,x.stream,x.status]));
      const blob=new Blob([rows.map(r=>r.map(esc2).join(',')).join('\n')],{type:'text/csv'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob); a.download='accession_labels_'+dkey(new Date())+'.csv'; a.click();
      URL.revokeObjectURL(a.href); toast(L.length+' rows exported'); return;
    }
    const w=window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>Labels</title><style>
      @page{size:A4;margin:8mm}
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:Arial,Helvetica,sans-serif;color:#000;background:#fff}
      .g{display:grid;grid-template-columns:repeat(3,1fr);gap:3mm}
      .l{border:1px dashed #999;padding:3mm;height:26mm;page-break-inside:avoid;display:flex;flex-direction:column;justify-content:space-between}
      .h{font-size:6.5pt;letter-spacing:.5px;color:#444}
      .a{font-family:'Courier New',monospace;font-size:11pt;font-weight:bold;letter-spacing:.5px}
      .r{font-family:'Courier New',monospace;font-size:9pt;border-top:1px solid #ccc;padding-top:1mm}
      .r b{font-size:11pt}
      .t{font-size:6.5pt;line-height:1.25;overflow:hidden;max-height:7mm}
      .noprint{text-align:center;margin:5mm}
      @media print{.noprint{display:none}}
    </style></head><body>
      <div class="noprint"><button onclick="window.print()" style="padding:9px 22px;font-size:12pt;cursor:pointer">Print ${L.length} labels</button></div>
      <div class="g">${L.map(x=>`<div class="l">
        <div><div class="h">DAVAN &amp; NUTANA LIBRARY</div><div class="a">${x.acc}</div></div>
        <div class="t">${String(x.name).slice(0,58)}</div>
        <div class="r">REG: <b>${x.la||'____________'}</b></div></div>`).join('')}</div>
    </body></html>`);
    w.document.close(); toast(L.length+' labels ready');
  }catch(e){ toast('Failed: '+e.message,true); }
}
/* ═══ COLLECTION APPOINTMENT (v1.01) ═══
   A ready hold gets a real slot rather than a vague "held for N days", so the
   counter is scheduled instead of queued. The pickup window still governs
   expiry — the appointment is guidance, not a second deadline. */
function setAppt(reqId){
  const d=new Date(Date.now()+864e5);
  const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  sheet(`<div class="page-title" style="font-size:20px">COLLECTION SLOT</div>
    <div class="fld"><label>Date</label><input id="ap-d" type="date" value="${iso}"></div>
    <div style="display:flex;gap:8px">
      <div class="fld" style="flex:1"><label>From</label><input id="ap-f" type="time" value="11:00"></div>
      <div class="fld" style="flex:1"><label>To</label><input id="ap-t" type="time" value="12:30"></div></div>
    <div class="fld"><label>Note (optional)</label><input id="ap-n" placeholder="Bring your ID card"></div>
    <div class="alert">This appears on the student's own login beside their token. The ${'{'}pickup${'}'} window still applies — if they don't collect, the copy passes to the next in queue.</div>
    <button class="btn btn-full" id="apBtn" onclick="saveAppt('${reqId}')">Save slot</button>
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Cancel</button>`.replace('{pickup}',String(STATE.cfg.pickupDays||2)+'-day'));
}
async function saveAppt(reqId){
  const d=val('ap-d'), f=val('ap-f'), t=val('ap-t');
  if(!d||!f) return toast('Pick a date and time',true);
  setBusy('apBtn',true,'Saving…');
  try{
    await d2update({
      ['library/requests/'+reqId+'/appt']:{d,f,t,note:val('ap-n'),by:STATE.user.name},
    });
    _reqCache.at=0; closeSheet(); toast('Collection slot set'); render();
  }catch(e){ toast('Failed: '+e.message,true); }
  finally{ setBusy('apBtn',false,'Save slot'); }
}
function apptLine(a){
  if(!a) return '';
  const dt=new Date(a.d+'T00:00:00');
  const ds=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()]+' '+String(dt.getDate()).padStart(2,'0')+' '+MON[dt.getMonth()];
  return ds+', '+a.f+(a.t?' – '+a.t:'');
}
</script>
