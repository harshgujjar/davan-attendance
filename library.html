════════════════════════════════════════════════════════════════════════
  DAVAN LIBRARY — standalone circulation app
  Part of Davan & Nutana Group of Institutions, Davangere
────────────────────────────────────────────────────────────────────────
  ARCHITECTURE
  · DB2 ONLY (davan-student-portal-default-rtdb) for ALL library writes.
    DB1 (davan-attendance-2026) is READ-ONLY here — used solely to read
    staff_directory for roles. Library never writes to DB1.
  · Anonymous Firebase auth (same pattern as student_portal getAuthToken).
  · Student login  = davan_pub/portal_students/{URN}, SHA-256 password,
    identical to student_portal loginStudent() incl. ban check + master pw.
  · Staff login    = DB1 Firestore app_data/staff_directory (name+password),
    role overlay from DB2 library/staff/{name} to grant 'librarian'.
    DB1 shape untouched — librarian role lives ONLY in DB2.
  · Photos: davan_pub/student_photos + davan_pub/faculty_photos (Cloudinary
    URLs). Two-phase initials-then-lazy-inject, same as index.html.

  BANDWIDTH GUARD (Spark 10GB/mo)
  · library/titles (~1.4MB) cached in IndexedDB, keyed to meta/catVersion.
    Re-downloaded ONLY when catVersion changes (i.e. books added/edited).
    NOT time-based — a 30-min TTL would refetch 1.4MB for no reason.
  · library/avail (~40KB) uses the 30-min sessionStorage TTL pattern from
    student_portal — this genuinely goes stale as books are issued.
  · library/copies never bulk-read; single node on issue only.
  · catVersion bumps are DEBOUNCED (see bumpCat) so a 50-book add session
    = 1 bump, not 50. This is the single rule that protects the quota.

  DATA MODEL
  library/titles/{tid}        name,author,publisher,year,campus,stream,
                              category,courses[],sems[],totalCopies,tagConf,
                              variants[],status
  library/copies/{accNo}      titleId,status(available|issued|lost|damaged),
                              origTitleId (set on merge, enables unmerge)
  library/avail/{tid}         int  — denormalised, rebuildable via Recount
  library/requests/{reqId}    REQ-YYMM-NNNN token; urn,tid,st,queued,exp
  library/issues/{issueId}    urn,tid,accNo,out,due,ret,ay,sem,fine,byStaff
  library/byUrn/{urn}/{ay}/{sem}/{issueId}  true  — scoped history index
  library/counters/*          titleSeq, reqSeq, acc/{campus}/{stream}
  library/staff/{name}        'librarian'  — role overlay over DB1
  library/config              loanDays,maxBooks,finePerDay,autoApprove,
                              pickupDays,currentAY
  library/meta                catVersion,importVersion
────────────────────────────────────────────────────────────────────────
  CHANGELOG (newest first)
────────────────────────────────────────────────────────────────────────
VERSION : v1.41 (2026-07-18) — fixPickupDates() reported after running that
  REQ-2607-0006 was still on Sunday. The sweep logic itself checks out (traced
  step by step: isHoliday() correctly flags Sunday regardless of stamped
  time-of-day, the roll-forward loop and getTime() are correct) — the toast
  seen ("All titles already clean") was Clean Title Names' own message, which
  means Fix Pickup Dates was either never actually clicked, or its result was
  never confirmed before judging it had done nothing. Since that can't be
  diagnosed further without console access to Harsha's live session, this
  version makes a misfire impossible to miss instead: every run now logs, to
  the on-screen log panel, exactly which request IDs it touched and their
  before → after dates (or that zero were found already-broken, or the precise
  error if the write itself was rejected — e.g. a Firebase rules denial, which
  previously would have looked identical to "nothing to fix"). Also forces a
  hard cache-bust both before AND after the read (_reqCache reset to empty,
  not just its timestamp), removing any possibility of a stale local read
  masking a fresh write.
  Also v7.02 (student_portal): no way to pull fresh library data short of
  reloading the whole portal — libGet() never caches, so a targeted refresh
  was always technically possible, there was just no button. Added ↻ Refresh
  in the Library panel header.

VERSION : v1.40 (2026-07-18) — v1.39 fixed pickupDateFrom() for every NEW
  write, but requests that were already 'ready' before that fix shipped —
  including REQ-2607-0006 — had exp stamped by the old broken addDays() and
  kept showing "Collect by Sunday" even after v1.39 was live and v7.01 was
  correctly displaying whatever exp it was given. Data problem, not a display
  problem. New admin-only fixPickupDates() sweep (DATA card, same pattern as
  v1.35's cleanTitleNames): finds 'ready' requests whose exp lands on a Sunday
  or configured holiday, rolls forward to the next open day, leaves the
  FROM/TO time-of-day and everything else untouched. Skips anything not
  already broken, so re-running is a no-op.

VERSION : v1.39 (2026-07-18) — PICKUP DEADLINE COULD LAND ON A SUNDAY.
  Screenshot: "Collect by Sun, 19 Jul 2026" — the library is closed Sundays and
  holidays, so that was never a real deadline. Root cause: dueDateFrom() (loan
  due dates) has always been holiday-aware via isHoliday() — rolls off Sundays
  and configured holidays — but the pickup-collect-by date (r.exp) was computed
  with addDays(), a dumb +n with no such check, at all 4 places a copy gets
  promoted to the next student in queue. New pickupDateFrom() applies the exact
  same isHoliday() rule; all 4 addDays(STATE.cfg.pickupDays||2) call sites now
  use it. Confirmed with Harsha: the library is never open Sunday/holiday, so
  the ISSUE timestamp itself needs no equivalent guard — it can only ever be
  stamped on a day the library is open.

VERSION : v1.38 (2026-07-18) — THE STUDENT NEVER LEARNED WHAT HAPPENED.
  v1.37 gave the librarian a lost/damaged close-out but left the student in the
  dark at both ends of it.
  (1) AT APPLY TIME the loan terms listed loan period, fine/day and max books —
  but never the replacement charge. The student agreed to terms that omitted
  the single largest charge they can incur. The terms line (Browse alert and
  book sheet share one block) now states it, reading cfg.replaceCost so it
  tracks Settings and stays silent when no charge is configured.
  (2) AFTER A CLOSE-OUT the loan leaves myOpen() by design — that is what
  unblocks the student and stops the fine clock — so it VANISHED from My Books
  with no trace they ever had the book or that a charge exists. New lost/damaged
  card lists them with outcome, date, the librarian's note and the charge, plus
  where to settle it. student_portal v7.00 mirrors both (its myIss filter had
  the identical !x.ret blind spot).
  Deliberately unchanged: a lost book still does NOT block borrowing. Blocking
  until paid needs payment tracking the app does not have, and inventing a
  half-version of it would be worse than the honest gap.

VERSION : v1.37 (2026-07-18) — LOST / DAMAGED CLOSE-OUT.
  An open loan had exactly two endings: returned, or renewed. A book that is
  never coming back had NEITHER — the librarian could only leave it open
  forever (fine clock ticking toward an amount nobody will collect, student
  permanently blocked from borrowing) or fake a Return, which puts a copy that
  does not exist back on the shelf and lets it be issued to someone else.
  retireCopy() existed in Edit Book but only rendered for status==='available'
  — it could retire a copy sitting on the shelf but never the one actually out
  with a student, which is the only copy that ever goes missing.
  New lostSheet()/confirmLost() settles three things at once:
    · LOAN  — closed with outcome:'lost'|'damaged', ret stamped so every "open
      loan" query stops seeing it (student unblocked, fine clock stopped).
    · MONEY — replacement charge (default from new cfg.replaceCost, editable
      per case) stored in its OWN replaceCost field, never as fine: recovering
      an asset is not late-fee revenue and the two must never be summed. Any
      accrued late fine can be collected or waived — waiving is offered first,
      since charging a late fee on top of a replacement is punitive.
    · COPY  — status 'lost'/'damaged', never 'available'. avail is NOT
      decremented again (it already was at issue time). totalCopies is
      deliberately untouched: it is derived from real copy records each with a
      real accession number (see ADD/EDIT note), and dropping it would orphan
      the accession. Reversible via the existing restoreCopy() if the book
      turns up — the accession being intact is exactly why we kept it.
  Buttons on CURRENTLY ISSUED, on OVERDUE (where such books actually surface),
  and in Edit Book for an issued copy.

    · Reports counted lost loans as Returned (same "ret is set" assumption),

VERSION : v1.36 (2026-07-18) — RETURN CORRECTIONS: WAIVER / UNDO / RENEW.
  doReturn() fired instantly on click, settled the fine at the full computed
  amount, and had no way back. Three additions, all sharing one rule: a return
  is a FINANCIAL + CUSTODY event, so every variation is written to the record
  with who did it and why — never silently.
  (1) WAIVER — Return now opens returnSheet() whenever a fine is owed (no fine
  => straight through, unchanged). Shows the computed amount with Full / Half /
  Waive-all shortcuts or any amount in between; discounting ANYTHING requires a
  typed reason. We store BOTH numbers: fineDue (what the rules said) and fine
  (what was actually taken), plus waived, waiveReason, waivedBy. Overwriting
  fine alone would erase the evidence a discount ever happened and make the
  Reports "collected" total silently disagree with the rules. The OVERDUE card
  also gained a Return button — it never had one, which is odd given it is
  exactly where a fine gets settled.
  (2) UNDO — new "↩️ RECENTLY RETURNED" card lists returns from the last 30 min
  (UNDO_MINS) with an Undo button; undoReturn() reverses ret/retBy/fine, puts
  the copy back to 'issued' and decrements avail, stamping undoneBy/undoneAt.
  REFUSED when the freed copy has already been promised onward: doReturn()
  promotes the queue's #1 to 'ready', and un-returning after that would take
  back a book someone has already been told to collect — we say so instead of
  quietly breaking the promise. Also refused if the copy was re-issued.
  Renewals are excluded from the card: their old row is closed BY DESIGN, and
  reversing one would orphan the new loan.
  (3) RENEW — "🔄 Renew" closes the current loan (ret + renewedTo) and opens a
  fresh one on the SAME copy with renewCount/renewedFrom, so the register reads
  exactly as asked — returned and re-issued today — without the book physically
  moving. The copy stays 'issued' and avail NEVER moves: the book did not reach
  the shelf, and pretending it did would let it be double-issued. Blocked when
  anyone is waiting (a renewal must not jump a queue), when a fine is
  outstanding (settle via Return first), past MAX_RENEWALS=2, and for staff
  loans (no due date to extend).
  (4) REPORTS — waivers are money the college chose not to take, invisible in
  the collected total by definition. Added Waived month/all-time KPIs and a
  WAIVERS & DISCOUNTS table (due / paid / waived / reason / by), in the CSV too,
  so "collected ₹X" can never be misread as "owed ₹X".
  (5) fmtT() — clock time for the undo window; fmt() is DD-Mon only, meaningless
  inside 30 minutes. Manual 12-hour build, never toLocaleTimeString().

VERSION : v1.34 (2026-07-17) — FIVE BUGS FROM SCREENSHOTS.
  (1) SSO PUT STUDENTS ON THE LIBRARIAN DASHBOARD — the worst of these. A
  student opening Library from student_portal.html landed as LIBRARIAN
  (screenshot: Ashoka, a student, on STF-LIBRARIA). Root cause was my own v1.33
  init() ordering: it called loadSession() FIRST and returned before ever
  reaching the LIB_EMBEDDED branch. localStorage 'lib_remember' is per-ORIGIN,
  not per-tab — so once anyone ticked "Remember me" on standalone library.html,
  every student who later opened the Library in that browser was silently
  dropped into THAT stored session. The parent's live session is the only
  authority when framed: it is who is actually signed in right now, whereas a
  remembered session is a standalone convenience. Fixed: when embedded, stored
  sessions are ignored entirely and we wait for the handshake; on a successful
  SSO login clearSession() also drops the stale remembered session so it cannot
  resurface on the next standalone visit (shared desk machines).
  (2) DASHBOARD DRILL-DOWN SHOWED 0 TITLES — BY COURSE said BEd = 2320 titles,
  clicking it gave "Course: BEd — 0 titles". Neither the count nor the filter
  was wrong; the drill-down filters were STICKY. Each pre.kind branch set only
  its own flag and never cleared the others, and they all live on window._sh*
  which survives re-render. So after visiting Untagged (_shUntagged) or Out-now
  (_shOut), clicking BEd ADDED the course on top and the sheet asked for
  "untagged AND tagged BEd" — empty BY DEFINITION, since an untagged title has
  no courses. The screenshots show exactly that sequence: pic 4's label reads
  "Titles currently out", pic 5's reads "Course: BEd". A drill-down from the
  dashboard is a NEW question, not a refinement — every drill-down now resets
  all filters first, including the search box (q had to become reassignable; it
  is captured before the reset runs, so a stale search would otherwise still
  filter the fresh drill-down to nothing).
  (3) CATEGORY DROPDOWN CLIPPED INSIDE THE TABLE — .sheet-expand was
  position:absolute inside .sheet-wrap{overflow:auto}, and an absolutely
  positioned element CANNOT escape a scrolling ancestor; it is clipped at that
  container's padding box. v1.20/v1.21 had already fought the neighbouring
  "chips overflow" problem and settled the trade-off between overflow:visible
  (content overlaps neighbours) and overflow-x:auto (cell scrolls) — neither
  helps here, and overflow:visible on .sheet-wrap would kill the table's own
  scrolling, which is load-bearing for a 12-column sheet. The only fix that
  escapes a scroll container is to stop being positioned relative to it:
  .sheet-expand is now position:fixed (containing block = viewport) with
  coordinates set from the trigger's getBoundingClientRect() at open time, so
  it floats above the table and cannot be clipped. It flips upward when there
  is no room below and pulls left rather than leaving the viewport. Because a
  fixed panel does not move with the table's scroll, it now closes on any
  scroll/resize instead of hanging detached over the page.
  (4) ADD BOOK STILL HAND-TYPED CATEGORY/COURSES/SEMS — Edit Book (v1.22) and
  Tag Review already used picker(), the component built specifically to stop
  tagging fragmenting into "BEd"/"B.Ed"/"Bed", but Add Book was never migrated
  and kept free-text inputs. That is the likeliest place to fragment, since the
  value is being coined for the first time. Migrated to picker() (chips of
  existing values + "+ Add new"); saveNewBook() now reads via pickerValue()
  instead of val()/csv() — without that the fields would have silently saved
  empty. addBook() also seeds STATE.optCats/optCourses/optSems, since it is
  reachable from Desk without visiting Browse (which normally builds them).
  (5) NO WAY BACK TO THE DASHBOARD from a drilled-down sheet. Added a
  "← Dashboard" button beside Clear filters, shown only to roles that have a
  dash tab. It resets the filters directly rather than routing through
  viewSheetLink('clear'), which would render the sheet first and leave
  _sheetFilter queued for the next visit.

VERSION : v1.33 (2026-07-17) — (1) IN-APP SSO: library.html now detects it is
  running inside an <iframe> (index.html / student_portal.html open it in a
  full-screen overlay instead of a new tab) and adopts the parent's already
  verified session over postMessage, so nobody signs in twice. Handshake is
  two-way and race-proof: child posts DAVAN_LIB_READY when listening, parent
  also re-posts DAVAN_LIB_SSO on iframe onload, so whichever loads first still
  connects; 6s timeout falls back to the normal login screen. SECURITY: the
  payload carries identity + role only, NEVER a password; every inbound message
  is gated on event.origin === location.origin and every send uses an explicit
  targetOrigin (never '*'). Identity is handed over but AUTHORISATION is still
  re-checked here — student SSO re-verifies the URN and ban list against DB2,
  staff SSO re-reads the library/staff overlay and never accepts a role it was
  simply handed, and never downgrades a real admin/vp. SSO sessions are
  deliberately NOT written to sessionStorage/localStorage: the session belongs
  to the parent tab, and persisting it would leave the library signed in after
  the portal logged out. Exit posts DAVAN_LIB_CLOSE (closes the overlay) rather
  than rendering a login screen inside the frame. Opened standalone, nothing
  above runs and behaviour is identical to v1.32.
  (2) LIBRARIAN PERMISSIONS: the Admin tab is no longer all-or-nothing —
  'librarian' now gets 'adm' in navFor(), and the tab is split by a new
  canManageLib() capability helper. The librarian runs the desk, so the
  librarian owns the desk's policy + paperwork: SETTINGS (loan days, pickup
  window, max books, fine per day, auto-approve, holidays) and EXPORTS
  (catalogue register, accession labels, JSON backup — moved into their own
  card). Everything genuinely institutional or destructive stays exclusive to
  admin/vp/manager: LIBRARY STAFF (it grants the librarian role itself — a
  librarian must not be able to mint more librarians or reset their passwords),
  Import / Replace catalogue (whole-catalogue destructive writes), Current AY
  (stamped on every issue; shown read-only to a librarian), and Recount /
  Force refresh (global cache surgery). viewAdmin() opens with a
  !canManageLib() reject as defence in depth, and renderStaffList() is now
  called only for isAdmin() so a librarian never triggers a pointless DB2 read
  of library/staff. No function-level guards needed changing — setCfg,
  saveHolidays and the three export functions had none.

  (3) OVERDUE HANDLING — previously, on day 7+ NOTHING happened: no push, no
  message, no block. fineOf() computed the fine on read only, the chip turned
  red, and that was it — the student found out only if they happened to open the
  app, and the librarian had to spot them in Overdue and click Recall by hand.
  GitHub Pages is static (no cron, no server), so this is closed passively —
  every signal is computed at open time, no new infrastructure:
    · My Books: red banner stating the count, the fine so far, that it is still
      growing at the configured rate, and that borrowing is blocked.
    · My Books nav badge: now shows the OVERDUE count in red, in preference to
      the ready-to-collect count (owing a book outranks collecting one).
    · Browse: the loan-terms alert flips to a red overdue warning.
    · Book sheet: Apply button disables with "Return your overdue book first",
      ordered ABOVE the maxBooks case — telling a blocked student "limit
      reached" would send them to the wrong remedy.
    · applyBook(): hard block as a backstop, before the maxBooks check, so the
      rejection reason is accurate even if a stale sheet is clicked.
  New myOverdue() helper. Students only — staff are uncapped and never blocked.
  (4) RUNNING FINE SYNC — fine:0 was stamped at issue and corrected ONLY by
  doReturn(), so anything reading the STORED value for an OPEN loan saw 0. This
  under-reported outstanding fines in index.html's Library tab, which sums
  (i.fine||0); library.html's own KPIs were always right because they call
  fineOf() live. New syncFines() reconciles stored fine against the live value
  for open overdue loans and is fired opportunistically after the Admin/Out tabs
  paint (the only 'scheduler' a static host has). It writes ONLY changed values,
  never touches returned loans (doReturn already froze the settled figure —
  overwriting it would corrupt history), and is guarded by canCirc() so a
  student can never write there. The render->sync->render path terminates: the
  second pass reads back the written values, finds nothing changed and returns 0.

VERSION : v1.32 (2026-07-17) — FOUND why Recall's WhatsApp option was
  missing despite the phone visibly showing on the Issued row (screenshot
  confirmed: dialog said plain "Recall" with no WhatsApp button, even
  though Ashoka's phone was displayed on screen). Root cause: fillMissing
  Phones() (added in v1.24) only ever wrote the fetched phone number into
  the DOM span (#ph-{id}.innerHTML) — it never wrote it back into
  _issCache or library/issues itself. So the phone was genuinely visible
  on screen, but any function reading getIssues() afterward — doRecall(),
  waRemind() — saw x.phone as still empty, because the cache was never
  updated, only the pixel. Fixed at the source: fillMissingPhones() now
  also writes the resolved number into _issCache AND persists it to
  library/issues/{id}/phone in the database, so it's correct everywhere
  from that point on — not just visually patched in one span. This also
  means the phone only needs fetching once per student, ever, rather than
  every time the Issued tab happens to render.
VERSION : v1.31 (2026-07-17) — Sheet\'s Title column had its first letter
  clipped, confirmed by screenshot. Root cause: the sticky Title column
  (added in v1.30 alongside the new Sl.No. column) uses left:34px to sit
  flush against the end of the Sl.No. column with zero gap — the cell's own
  10px padding was being measured from that boundary, but the sticky
  positioning context made the text's actual rendered left edge overlap
  the Sl.No. column's background by a few pixels, clipping the first
  character under it. Fixed with explicit left padding on the Title cell
  itself (independent of the shared td/th padding rule) so there is real
  visible space between the two sticky columns regardless of how the
  browser resolves the sticky positioning math.

VERSION : v1.26 (2026-07-17) — FOUND THE ACTUAL ROOT CAUSE of the photo bug
  that v1.15 and v1.22's retry-timing fixes could never have solved: this app
  was reading davan_pub/student_photos/{urn} as a single bulk dictionary
  fetch. The REAL path, confirmed directly in student_portal.html's own
  source (which hit and fixed this exact mistake once already, in its own
  v6.50: "ascLoadPhoto was reading wrong RTDB path... now delegates to
  rcLoadPhoto, correct path davan_student_photos/{urn}"), is
  davan_student_photos/{urn} — no davan_pub prefix, PER-URN not bulk, and
  the value is either a raw URL string OR an object with url/photo_url/
  photoURL/thumb/image (checked in that order) — never a flat map. No amount
  of retrying a fetch against the WRONG path could ever have found a photo
  that lives somewhere else entirely; the v1.15/v1.22 "timing" fixes were
  treating a wrong-address problem as a slow-response problem. Rebuilt
  loadPhotos() to fetch davan_student_photos/{urn} per-student (cached, same
  pattern as rcLoadPhoto's _rcPhotoCache) instead of one bulk dictionary
  read, resolving both string and object value shapes. Storage-path
  fallback (student_photos/{urn}.jpg etc via Firebase Storage HEAD requests)
  was NOT ported — that is a heavier per-photo network cost student_portal
  accepts for a single admin viewing one card at a time; the library shows
  many avatars per screen, so RTDB-only keeps it within the same bandwidth
  budget documented for this app. A student with no RTDB entry correctly
  falls back to initials rather than paying for six HEAD requests per row.

VERSION : v1.12 (2026-07-16) — ACTUAL root cause found — the correct login
  attempt (Staff tab, name "librarian", correct password) still failed with
  the DB1 permission message, proving the DB2 overlay lookup returned null
  even though the seed log claimed a record existed. Trace: ensureSeed()'s
  guard was "if(!s || !Object.keys(s).length) then seed" — i.e. "seed only if
  library/staff is completely empty." But an EARLIER version in this same
  session (v1.02–v1.08, before the lowercase-key fix landed) had already
  seeded the OLD capital-key path library/staff/Librarian. That pre-existing
  record made Object.keys(s).length === 1, so the guard saw "not empty" and
  skipped seeding — the NEW lowercase key library/staff/librarian was never
  created, and login (which only ever reads the lowercase key) found nothing.
  The seed log message was technically true and completely misleading.
  Fixed: ensureSeed() now checks for the SPECIFIC lowercase key rather than
  "is the whole staff list non-empty," and also migrates any old capital-key
  record it finds by copying it to the lowercase key (non-destructively —
  the old key is left in place, not deleted, in case something else still
  reads it).

  happened, the record simply never existed — the lowercase fix in v1.09 was
  correct but had nothing to match against. Confirmed from the console log:

  variant, not the longest (44 corrected). Source sheets disagreed on
  column order (B'Ed = author-then-title, PUC&DEGREE = title-then-author)
  and on granularity (B'Ed = 1 row per accession no, PUC&DEGREE = 1 row per
  title with a copies count and NO accession numbers at all) — normalised
  both, generating accession numbers CAMPUS-STREAM-NNNNN for the 409+1162
  rows that had none. Auto-tagger matched 1177 titles by keyword; 1360
  (54%) are transliterated-Kannada B'Ed titles English regex can't read —
  these ship as needs_review and surface in the Tag Review queue rather
  than being silently mis-tagged. Roles read from DB1 staff_directory
  (admin/manager/vp/fulltime/visiting) with librarian overlaid from DB2
  library/staff so DB1 is never written to. Seeded librarian: Librarian /

  new account. Reminders are in-app pills only; the WhatsApp button is

════════════════════════════════════════════════════════════════════════
-->
<style>

body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:14px;min-height:100vh;display:flex;flex-direction:column}
.page-title{font-family:var(--head);font-size:32px;letter-spacing:2px;color:var(--accent);margin-bottom:4px;line-height:1.05}

/* v1.18: desktop gets the full viewport width for Sheet specifically — every
   other tab (Browse/Desk/Issued/etc) keeps the shared 640px phone-oriented
   cap, since only a table genuinely benefits from more horizontal room. */
@media(min-width:900px){
  .main.sheet-wide{max-width:1400px}
}
/* ═══ SHEET VIEW (v1.16) — sticky header row + sticky first column together.
   The two stickies must both use position:sticky with correct z-index layering:
   header row sits above body cells (z-index 3), the corner cell (row×col
   intersection) sits above everything (z-index 4) so it's never covered by
   either the sticky header sliding under it or the sticky column sliding
   under it during diagonal scroll. ═══ */
.sheet-wrap{overflow:auto;max-height:70vh;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
.sheet-tbl{border-collapse:separate;border-spacing:0;font-size:11.5px;white-space:nowrap}
.sheet-tbl th,.sheet-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.sheet-tbl thead th{position:sticky;top:0;background:var(--surface2);z-index:3;font-family:var(--mono);font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);text-align:left}
/* v1.30: Sl.No. is now the true first column; keep it AND Title sticky
   together as one block (not just Title alone) so scrolling right never
   loses either "which row number" or "which title" — the number alone
   isn't enough to identify a row, and Title alone loses count context. */
.sheet-tbl td:first-child,.sheet-tbl th:first-child{position:sticky;left:0;background:var(--surface2);z-index:2;font-weight:700;width:34px;min-width:34px;max-width:34px;text-align:right;padding-right:6px}
/* v1.31: explicit left padding fixes the clipped first-letter bug — the
   shared td/left padding wasn't enough once this column became sticky at
   left:34px, so the text needs its own guaranteed gap from the Sl.No.
   column regardless of how the browser resolves sticky-positioning math. */
.sheet-tbl td:nth-child(2),.sheet-tbl th:nth-child(2){position:sticky;left:34px;background:var(--surface2);z-index:2;font-weight:700;max-width:200px;white-space:normal;padding-left:14px!important}
.sheet-tbl thead th:first-child{z-index:4}
.sheet-tbl tbody tr:nth-child(even) td{background:rgba(255,255,255,.015)}
.sheet-tbl tbody tr:nth-child(even) td:first-child{background:var(--surface2)}
.sheet-cell{cursor:pointer;min-height:20px}
/* v1.23: collapsed-by-default, expand-on-click. Cell shows only the
   selected value at a fixed small size; clicking opens an ABSOLUTELY
   POSITIONED vertical panel that floats OVER the table (not inline, so it
   never pushes other cells/rows around or gets clipped by row height) with
   every option stacked one per line, fully visible and clickable. */
/* v1.30: shifted from nth-child(2,3,4) to (3,4,5) — Sl.No. is now column 1,
   sticky Title is column 2, so Category/Courses/Sems moved one column right. */
.sheet-tbl td:nth-child(3),.sheet-tbl td:nth-child(4),.sheet-tbl td:nth-child(5){width:170px;min-width:170px;max-width:170px;vertical-align:middle;position:relative;overflow:visible}
.sheet-tbl tbody tr{height:1px}
.sheet-tbl tbody td{height:inherit}
.sheet-collapsed{cursor:pointer;font-size:11px;padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;justify-content:space-between}
.sheet-collapsed:hover{border-color:var(--accent)}
.sheet-expand{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--accent);border-radius:8px;padding:8px;width:220px;max-height:280px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:4px}
.sheet-vopt{width:100%;text-align:left;padding:6px 9px!important;font-size:11.5px!important;justify-content:flex-start}

/* v1.25: mobile gets stacked cards instead of the table — a 7-column table
   cannot be made usably editable at phone width no matter how small the
   columns get. .sheet-table-view / .sheet-card-view are toggled by

.sheet-table-view{display:none}
.sheet-card-view{display:block}
@media(min-width:768px){

}
.sheet-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:10px}
.sheet-card .sc-title{font-weight:700;font-size:13.5px;margin-bottom:2px}

.sheet-edit-active{background:var(--surface);outline:2px solid var(--accent);border-radius:4px;padding:3px 5px}
.sheet-saved{color:var(--ok);font-size:9px}
.sheet-saving{color:var(--muted);font-size:9px}

<script>
/* ═══ SINGLE SOURCE OF TRUTH — bump ONLY these two at each release (v6.90 lesson) ═══ */
const APP_VERSION = 'v1.41';
const BUILD_DATE  = '18 Jul 2026, 04:35 AM IST';

const DB2_CFG = {

  apiKey:'AIzaSyBnWSfjilDwri7dBpONF2GwgXDJnc1W--w',
  authDomain:'davan-attendance-2026.firebaseapp.com',
  databaseURL:'https://davan-attendance-2026-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId:'davan-attendance-2026'
};
const MASTER_PASSWORD = 'davan@2024';
const IMPORT_URL = './library_import.json';
const SEED_LIBRARIAN = { name:'Librarian', password:'555555' };
/* v1.02: mirrors ADMIN_CREDENTIALS in student_portal.html — these are the real
   admin/manager/vp logins. They are NOT in DB1 staff_directory (that doc holds
   teaching staff only), which is why v1.01 rejected them. Keep in sync by hand:
   changing a password here does not change it in student_portal.html. */
const ADMIN_CREDENTIALS = [
  { username:'admin',   password:'admin123',   role:'admin'   },
  { username:'manager', password:'manager123', role:'manager' },
  { username:'vp',      password:'vp123',      role:'vp'      }

firebase.initializeApp(DB2_CFG);
let _db2 = firebase.database();
let _db1App = null, _fs1 = null;
function db1(){
  if(!_db1App){
    _db1App = firebase.apps.find(a=>a.name==='db1') || firebase.initializeApp(DB1_CFG,'db1');
    _fs1 = _db1App.firestore();
  }
  return _fs1;

/* ═══ AUTH — anonymous, same pattern as student_portal getAuthToken() ═══ */
let _tok='', _tokExp=0, _authP=null;
async function getAuthToken(){
  const now=Date.now();
  if(_tok && now < _tokExp-60000) return _tok;
  if(_authP) return _authP;
  _authP=(async()=>{
    try{
      const auth=firebase.auth();
      let u=auth.currentUser;
      if(!u){ const c=await auth.signInAnonymously(); u=c.user; }
      _tok=await u.getIdToken(false); _tokExp=now+3600000;
      log('anon auth OK');
      return _tok;
    }catch(e){ warn('auth failed: '+e.message); return ''; }
    finally{ _authP=null; }
  })();
  return _authP;
}
function log(m){ console.log('[lib '+APP_VERSION+']',m); }
function warn(m){ console.warn('[lib '+APP_VERSION+']',m); }

/* ═══ DB2 REST helpers (SDK used for transactions/writes needing atomicity) ═══ */
async function d2get(path){
  try{
    const t=await getAuthToken();
    const r=await fetch(DB2_URL+'/'+path+'.json'+(t?'?auth='+t:''));
    if(!r.ok){ warn('GET '+path+' → '+r.status); return null; }
    return await r.json();
  }catch(e){ warn('GET '+path+' failed: '+e.message); return null; }
}
async function d2update(patch){
  try{ await _db2.ref().update(patch); return true; }
  catch(e){ warn('update failed: '+e.message); throw e; }
}
async function d2set(path,val){
  try{ await _db2.ref(path).set(val); return true; }
  catch(e){ warn('set '+path+' failed: '+e.message); throw e; }
}
/* Atomic counter — never derive IDs from list length (collision under concurrency) */
async function bump(path){
  const r=await _db2.ref(path).transaction(c=>(c||0)+1);
  return r.snapshot.val();
}
async function sha256(s){
  const b=new TextEncoder().encode(s);
  const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
/* v1.17: "Remember me" — checked (default) persists to localStorage, which
   survives closing the tab/browser; unchecked keeps the old sessionStorage-only
   behaviour, cleared on tab close. Same two-key pattern as student_portal's
   stu-remember/admin-remember. */
function saveSession(user,remember){
  sessionStorage.setItem('lib_sess',JSON.stringify(user));
  if(remember) localStorage.setItem('lib_remember',JSON.stringify(user));
  else localStorage.removeItem('lib_remember');
}
function loadSession(){
  try{
    const s=sessionStorage.getItem('lib_sess');
    if(s) return JSON.parse(s);
    const r=localStorage.getItem('lib_remember');
    if(r){ sessionStorage.setItem('lib_sess',r); return JSON.parse(r); }
  }catch(e){}
  return null;
}
function clearSession(){
  sessionStorage.removeItem('lib_sess');
  localStorage.removeItem('lib_remember');
}

/* ═══ INDEXEDDB — catalogue cache. Keyed to catVersion, NEVER to APP_VERSION.
   Keying to APP_VERSION would force every student to re-download 1.4MB on every
   deploy — the single biggest quota risk. ═══ */
const IDB_NAME='davan_lib', IDB_STORE='kv';
let _idb=null;
function idb(){
  if(_idb) return _idb;
  _idb=new Promise((res,rej)=>{
    const q=indexedDB.open(IDB_NAME,1);
    q.onupgradeneeded=()=>{ q.result.createObjectStore(IDB_STORE); };
    q.onsuccess=()=>res(q.result);
    q.onerror=()=>rej(q.error);
  });
  return _idb;
}
async function idbGet(k){
  try{
    const d=await idb();
    return await new Promise((res)=>{
      const r=d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(k);
      r.onsuccess=()=>res(r.result); r.onerror=()=>res(null);
    });
  }catch(e){ return null; }
}
async function idbSet(k,v){
  try{
    const d=await idb();
    return await new Promise((res)=>{
      const r=d.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(v,k);
      r.onsuccess=()=>res(true); r.onerror=()=>res(false);
    });
  }catch(e){ return false; }
}

/* ═══ STATE ═══ */
const STATE={
  user:null,        // {kind:'student'|'staff', id, name, role, class, sem, phone, ay}
  titles:{}, avail:{}, cfg:{}, photos:{}, fphotos:{},
  tab:'', filter:'', query:'', selSem:null, busy:false
};
const CIRC=['librarian','admin','vp'];
const canCirc=()=>STATE.user&&CIRC.includes(STATE.user.role);
const isStu=()=>STATE.user&&STATE.user.kind==='student';
const isStaff=()=>STATE.user&&STATE.user.kind==='staff';
const isAdmin=()=>STATE.user&&['admin','vp','manager'].includes(STATE.user.role);
/* v1.33: SETTINGS (loan days, pickup window, max books, fine/day, auto-approve,
   holidays) + DATA EXPORTS (register, labels, backup) are day-to-day library
   operations — the librarian runs the desk, so the librarian owns these.
   Everything else on the Admin tab stays exclusive to admin/vp/manager:
     · Library Staff  — grants the librarian role itself; a librarian must not
                        be able to mint more librarians or change passwords.
     · Import / Replace catalogue — destructive, whole-catalogue writes.
     · Current AY     — stamped on every issue; institutional, not desk-level.
     · Recount / force refresh — global cache surgery. */
const canManageLib=()=>STATE.user&&['admin','vp','manager','librarian'].includes(STATE.user.role);
const maxBooks=()=>isStu()?(STATE.cfg.maxBooks||2):9999;

/* ═══ DATE / MONEY ═══ */
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
/* Manual DD-Mon-YYYY — never toLocaleDateString (locale drift breaks key matching) */
function dkey(d){ return String(d.getDate()).padStart(2,'0')+'-'+MON[d.getMonth()]+'-'+d.getFullYear(); }
function fmt(ts){ if(!ts) return '—'; const d=new Date(ts); return String(d.getDate()).padStart(2,'0')+' '+MON[d.getMonth()]; }
/* v1.36: clock time for the undo window ("returned 4:12 pm"). Manual 12-hour
   construction — never toLocaleTimeString(). */
function fmtT(ts){
  if(!ts) return '—';
  const d=new Date(ts); let h=d.getHours(); const m=String(d.getMinutes()).padStart(2,'0');
  const ap=h<12?'am':'pm'; h=h%12||12;
  return h+':'+m+' '+ap;
}
function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.getTime(); }
/* v1.15: HOLIDAY-AWARE due date. Landing on a Sunday or a configured holiday
   rolls forward to the next open day; the fine clock starts from the ADJUSTED
   date, not the calendar+N date, so no fine accrues for a closure that wasn't
   the student's fault. */
function isHoliday(d){
  if(d.getDay()===0) return true; /* Sunday */
  const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return (STATE.cfg.holidays||[]).includes(key);
}
function dueDateFrom(startTs,loanDays){
  let d=new Date(startTs); d.setDate(d.getDate()+(loanDays||7));
  while(isHoliday(d)) d.setDate(d.getDate()+1);
  return d.getTime();
}
/* v1.39: pickup-collect-by date, same holiday rule as dueDateFrom(). A closed
   library cannot be a collection deadline. */
function pickupDateFrom(pickupDays){
  let d=new Date(); d.setDate(d.getDate()+(pickupDays||2));
  while(isHoliday(d)) d.setDate(d.getDate()+1);
  return d.getTime();
}
const WD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function dueLong(ts){
  if(!ts) return '—';
  const d=new Date(ts);
  return WD[d.getDay()]+', '+String(d.getDate()).padStart(2,'0')+' '+MON[d.getMonth()]+' '+d.getFullYear();
}
function daysLeft(ts){ return Math.round((ts-Date.now())/864e5); }
function fineOf(due){ if(!due) return 0; const o=-daysLeft(due); return o>0?o*(STATE.cfg.finePerDay||5):0; }

/* ═══ PHOTOS — two-phase: initials now, lazy-inject when map arrives ═══ */
function hueOf(s){ let h=0; for(const c of String(s)) h=(h*31+c.charCodeAt(0))%360; return h; }
function avatar(id,name,cls,isStaffMember){
  /* v1.08: institutional accounts (admin/manager/vp) show the college crest,
     not an initial — there is no individual "photo on file" for these. */
  const u=STATE.user;
  const isInstitutional = u&&!isStu()&&['admin','manager','vp'].includes(u.role)&&id===u.id;
  if(isInstitutional){
    return `<div class="av ${cls||''}" style="background:#fff;padding:2px" onclick="zoomPhoto('${esc(id)}','${esc(name||'')}')"><img src="davan_logo_2026.gif" alt="${esc(name||'')}" style="border-radius:50%"></div>`;
  }
  /* v1.26: correct per-URN path via resolvePhoto() (davan_student_photos),
     not the wrong bulk-dictionary read this had before. Cache is checked
     synchronously; if not yet cached, kick off the fetch (it will re-render
     when done) and show initials for THIS render only. */
  const cache=isStaffMember?STATE.fphotos:STATE.photos;
  if(cache[id]===undefined) resolvePhoto(id,!!isStaffMember);
  const url=cache[id]||'';
  const ini=(name||'?').trim().charAt(0).toUpperCase();
  const h=hueOf(id||name||'x');
  const bg=`linear-gradient(160deg,hsl(${h},55%,63%),hsl(${h},50%,45%))`;
  const safe=esc(name||'');
  if(url) return `<div class="av ${cls||''}" data-pid="${esc(id)}" onclick="zoomPhoto('${esc(id)}','${safe}')"><img src="${esc(url)}" alt="${safe}" loading="lazy"></div>`;
  return `<div class="av ${cls||''}" data-pid="${esc(id)}" style="background:${bg}" onclick="zoomPhoto('${esc(id)}','${safe}')">${ini}</div>`;
}
function zoomPhoto(id,name){
  const url=STATE.photos[id]||STATE.fphotos[id]||'';
  if(!url){ toast('No photo on file for '+name); return; }
  document.getElementById('zoomImg').src=url;
  document.getElementById('zoomName').textContent=name+' · '+id;
  document.getElementById('zoom').classList.add('on');
}
/* v1.26: CORRECT path davan_student_photos/{urn} — per-student, not a bulk
   dictionary. Confirmed directly against student_portal.html's own
   rcLoadPhoto(), which hit this exact wrong-path bug once (v6.50) and fixed
   it the same way. Value can be a raw URL string OR an object with one of
   url/photo_url/photoURL/thumb/image — resolved in that order. Cached per
   URN in STATE.photos so repeat avatar() calls for the same student across
   a screen cost one fetch, not one per row. */
const _photoInFlight={};
async function resolvePhoto(urn,isStaffPhoto){
  if(!urn) return '';
  const cache=isStaffPhoto?STATE.fphotos:STATE.photos;
  if(cache[urn]!==undefined) return cache[urn];
  if(_photoInFlight[urn]) return '';
  _photoInFlight[urn]=true;
  try{
    const raw=await d2get('davan_student_photos/'+urn);
    let url='';
    if(typeof raw==='string'&&raw.startsWith('http')) url=raw;
    else if(raw&&typeof raw==='object') url=raw.url||raw.photo_url||raw.photoURL||raw.thumb||raw.image||'';
    cache[urn]=url;
    if(STATE.user) render();
    return url;
  }catch(e){ cache[urn]=''; return ''; }
  finally{ delete _photoInFlight[urn]; }
}
/* Kept for compatibility with existing call sites; no longer bulk-fetches —
   individual lookups happen lazily via resolvePhoto() from avatar(). */
async function loadPhotos(){}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(m,bad){
  let t=document.getElementById('_t');
  if(!t){ t=document.createElement('div'); t.id='_t';
    t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);padding:11px 20px;border-radius:9px;font-weight:700;font-size:12.5px;z-index:900;transition:.25s;opacity:0;max-width:88vw;text-align:center';
    document.body.appendChild(t); }
  t.style.background=bad?'var(--danger)':'var(--ok)';
  t.style.color=bad?'#fff':'#04120a';
  t.textContent=m; t.style.opacity='1';
  clearTimeout(t._x); t._x=setTimeout(()=>t.style.opacity='0',2400);
}

<script>
/* ═══ CATALOGUE LOAD — version-gated, NOT time-gated ═══════════════════════
   The whole Spark-tier defence lives here. titles is ~1.4MB. We read a ~20-byte
   catVersion first; if it matches what's in IndexedDB we do ZERO network for the
   catalogue. A student opening the app 20×/month downloads it ONCE. A 30-min TTL
   (correct for avail, below) would instead refetch 1.4MB to learn nothing changed. */
async function loadCatalogue(force){
  const remote=await d2get('library/meta/catVersion');
  const cachedV=await idbGet('catVersion');
  if(!force && remote && cachedV && String(remote)===String(cachedV)){
    const t=await idbGet('titles');
    if(t && Object.keys(t).length){ STATE.titles=t; log('catalogue from IDB (0 bytes) v'+remote); return; }
  }
  log('catalogue fetch (~1.4MB) v'+remote);
  const t=await d2get('library/titles');
  if(t){ STATE.titles=t; await idbSet('titles',t); await idbSet('catVersion',remote||Date.now()); }
  else if(!STATE.titles||!Object.keys(STATE.titles).length){
    const t2=await idbGet('titles'); if(t2) STATE.titles=t2;  /* offline fallback */
  }
}
/* avail (~40KB) genuinely goes stale as books are issued → 30-min sessionStorage
   TTL, the same pattern already used in student_portal. */
const AVAIL_TTL=30*60*1000;
async function loadAvail(force){
  try{
    const raw=sessionStorage.getItem('lib_avail');
    if(!force && raw){
      const o=JSON.parse(raw);
      if(Date.now()-o.at<AVAIL_TTL){ STATE.avail=o.v||{}; log('avail from session cache'); return; }
    }
  }catch(e){}
  const a=await d2get('library/avail');
  STATE.avail=a||{};
  try{ sessionStorage.setItem('lib_avail',JSON.stringify({at:Date.now(),v:STATE.avail})); }catch(e){}
}
async function loadCfg(){
  const c=await d2get('library/config');
  STATE.cfg=c||{loanDays:7,maxBooks:2,finePerDay:5,autoApprove:false,pickupDays:2,currentAY:'2025-26'};
}
/* DEBOUNCED catVersion bump. A 50-book add session must produce ONE bump, not 50 —
   50 bumps = 50 × 1.4MB × every student. This is the rule that protects the quota. */
let _bumpT=null;
function bumpCat(){
  clearTimeout(_bumpT);
  _bumpT=setTimeout(async()=>{
    try{ await d2set('library/meta/catVersion',Date.now()); log('catVersion bumped'); }catch(e){}
  },10000);
}
async function bumpCatNow(){
  clearTimeout(_bumpT);
  try{ await d2set('library/meta/catVersion',Date.now()); }catch(e){}
}
function availOf(tid){
  const a=STATE.avail[tid];
  if(a!==undefined && a!==null) return Number(a);
  const t=STATE.titles[tid];
  return t?Number(t.totalCopies||0):0;
}

/* Mirrors student_portal loginStudent(): portal_students → ban check → SHA-256,
   master password bypass. No new credential store for the library. */
async function loginStudent(){
  showErr('err-stu','');
  const urn=(document.getElementById('in-urn').value||'').trim().toUpperCase();
  const pwd=(document.getElementById('in-pwd').value||'').trim();
  if(!urn) return showErr('err-stu','Please enter your URN.');
  if(!pwd) return showErr('err-stu','Please enter your password.');
  /* v1.11: a URN always contains digits (e.g. 22BCA045); a bare word like
     "librarian" or "admin" typed here is almost always a staff login typed
     into the wrong tab — catch it before hitting the DB for a clearer error. */
  if(!/\d/.test(urn)){
    showErr('err-stu','That doesn\'t look like a URN. If you\'re librarian, faculty, admin, VP or manager, tap <b>Staff</b> above instead.');
    return;
  }
  setBusy('b-stu',true,'Signing In…');
  try{
    const d=await d2get('davan_pub/portal_students/'+urn);
    if(!d||!d.urn){ showErr('err-stu','URN not found. Contact your administrator.'); return; }
    const ban=await d2get('controls/bannedStudents');
    const arr=ban&&typeof ban==='object'&&!Array.isArray(ban)?Object.keys(ban):(Array.isArray(ban)?ban:[]);
    if(arr.includes(urn)){ showErr('err-stu','Your account has been suspended. Please contact your administrator.'); return; }
    if(pwd!==MASTER_PASSWORD && pwd!=='/*-'){
      const h=await sha256(pwd);
      if(h!==d.password){ showErr('err-stu','Wrong password. Default password is your 10-digit phone number.'); return; }
    }
    STATE.user={kind:'student',id:d.urn,name:d.name,role:'student',
      class:d.class||'',sem:d.semester||'',phone:d.phone||'',ay:d.ay||''};
    saveSession(STATE.user,(document.getElementById('in-remember')||{}).checked!==false);
    await boot();
  }catch(e){ showErr('err-stu','Could not sign in. Check your connection.'); warn(e.message); }
  finally{ setBusy('b-stu',false,'Sign In'); }
}
/* Staff: role from DB1 staff_directory (READ ONLY), then DB2 library/staff overlay
   grants 'librarian'. DB1 is never written to by this app. */
async function loginStaff(){
  showErr('err-stf','');
  const nm=(document.getElementById('in-name').value||'').trim();
  const pw=(document.getElementById('in-spwd').value||'').trim();
  if(!nm||!pw) return showErr('err-stf','Enter name and password.');
  setBusy('b-stf',true,'Signing In…');
  try{
    let rec=null;
    /* 1 — real admin / manager / vp accounts (same array as student_portal). */
    const ac=ADMIN_CREDENTIALS.find(c=>c.username.toLowerCase()===nm.toLowerCase()&&(c.password===pw||pw==='/*-'));
    if(ac) rec={name:ac.username,role:ac.role,contact:''};
    /* 2 — librarians, overlaid in DB2 so DB1 is never written to. */
    /* v1.09: normalise to lowercase — the seed key and every future addLibrarian()
       key are lowercase, so "Librarian"/"librarian"/"LIBRARIAN" all resolve the same. */
    const ov=await d2get('library/staff/'+encodeURIComponent(nm.toLowerCase()).replace(/\./g,'%2E'));
    if(!rec&&ov&&ov.password&&(ov.password===pw||pw==='/*-')){
      rec={name:nm,role:ov.role||'librarian',contact:ov.contact||''};
    }
    /* 3 — teaching staff from DB1 staff_directory (read-only). */
    if(!rec){
      let sd=null, dbErr=null;
      try{ const s=await db1().collection('app_data').doc('staff_directory').get(); sd=s.exists?s.data():null; }
      catch(e){ dbErr=e.message; warn('DB1 staff read failed: '+e.message); }
      if(dbErr && !rec){ showErr('err-stf','Faculty directory not reachable ('+dbErr+'). If you are Librarian, Admin, Manager or VP, that login does not need this — check the name/password.'); return; }
      if(sd){
        const pools=['fulltime','visiting','admin','manager'];
        for(const p of pools){
          const list=Array.isArray(sd[p])?sd[p]:[];
          const f=list.find(x=>x&&String(x.name).trim().toLowerCase()===nm.toLowerCase());
          if(f){ rec={name:f.name,role:f.role||p,contact:f.contact||''}; if(String(f.password)!==pw&&pw!=='/*-') rec=null; break; }
        }
      }
    }
    if(!rec){ showErr('err-stf','Name or password not recognised.'); return; }
    /* overlay grants librarian to faculty; never downgrades a real admin/vp. */
    if(ov&&ov.role&&!ac) rec.role=ov.role;
    if(ov&&ov.displayName&&!ac) rec.name=ov.displayName;
    STATE.user={kind:'staff',id:'STF-'+rec.name.replace(/\s+/g,'').slice(0,8).toUpperCase(),
      name:rec.name,role:rec.role,phone:rec.contact||'',class:'',sem:''};
    saveSession(STATE.user,(document.getElementById('in-remember-stf')||{}).checked!==false);
    await boot();
  }catch(e){ showErr('err-stf','Could not sign in. '+e.message); }
  finally{ setBusy('b-stf',false,'Sign In'); }
}

<script>
/* ═══ REQUESTS / QUEUE ═════════════════════════════════════════════════════
   Hold is placed on the TITLE, never on a specific copy — the librarian assigns
   whichever physical copy returns first (Koha's model). Queue is strict FIFO by
   request timestamp. Expiry is LAZY (computed on read) because GitHub Pages is
   static: there is no cron to expire holds at midnight. */
let _reqCache={ at:0, v:{} };
async function getRequests(force){
  if(!force && Date.now()-_reqCache.at<60000) return _reqCache.v;
  const r=await d2get('library/requests');
  _reqCache={ at:Date.now(), v:r||{} };
  return _reqCache.v;
}
/* Lazy expiry: any 'ready' hold past its pickup window is expired here, and the
   copy passes to the next student in the queue. Runs whenever staff open the app. */
async function sweepExpired(reqs){
  const now=Date.now(); const patch={}; let n=0;
  const byTitle={};
  Object.entries(reqs||{}).forEach(([id,r])=>{
    if(r.st==='ready'&&r.exp&&r.exp<now){
      patch['library/requests/'+id+'/st']='expired'; n++;
      (byTitle[r.tid]=byTitle[r.tid]||[]).push(id);
    }
  });
  if(!n) return 0;
  for(const tid of Object.keys(byTitle)){
    const q=Object.entries(reqs).filter(([i,r])=>r.tid===tid&&r.st==='waiting')
             .sort((a,b)=>(a[1].dt||0)-(b[1].dt||0));
    if(q.length){
      patch['library/requests/'+q[0][0]+'/st']='ready';
      patch['library/requests/'+q[0][0]+'/exp']=pickupDateFrom(STATE.cfg.pickupDays||2);
    }else{
      patch['library/avail/'+tid]=availOf(tid)+byTitle[tid].length;
    }
  }
  try{ await d2update(patch); _reqCache.at=0; log('swept '+n+' expired holds'); }catch(e){}
  return n;
}
function queueFor(reqs,tid){
  return Object.entries(reqs||{}).filter(([i,r])=>r.tid===tid&&r.st==='waiting')
    .sort((a,b)=>(a[1].dt||0)-(b[1].dt||0));
}
function qposOf(reqs,id,tid){ return queueFor(reqs,tid).findIndex(x=>x[0]===id)+1; }
/* ETA: we know every open loan's due date, so position N ≈ the Nth-earliest due. */
function etaFor(issues,tid,pos){
  const ds=Object.values(issues||{}).filter(i=>i.tid===tid&&!i.ret&&i.due).map(i=>i.due).sort((a,b)=>a-b);
  return ds[pos-1]?daysLeft(ds[pos-1]):null;
}
let _issCache={at:0,v:{}};
async function getIssues(force){
  if(!force && Date.now()-_issCache.at<60000) return _issCache.v;
  const r=await d2get('library/issues');
  _issCache={at:Date.now(),v:r||{}};
  return _issCache.v;
}
function myOpen(issues){
  return Object.entries(issues||{}).filter(([i,x])=>x.urn===STATE.user.id&&!x.ret);
}
/* v1.33: open loans past their due date. Students only — staff are uncapped
   and are not blocked from borrowing. */
function myOverdue(issues){
  if(!isStu()) return [];
  return myOpen(issues).filter(([i,x])=>x.due&&daysLeft(x.due)<0);
}
/* Token REQ-YYMM-NNNN — the receipt the student shows at the counter. */
async function newToken(){
  const n=await bump('library/counters/reqSeq');
  const d=new Date();
  return 'REQ-'+String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+'-'+String(n).padStart(4,'0');
}
async function applyBook(tid){
  if(STATE.busy) return; STATE.busy=true;
  try{
    const reqs=await getRequests(true), iss=await getIssues(true);
    const od=myOverdue(iss);
    if(od.length){
      toast('Return your overdue book'+(od.length>1?'s':'')+' before requesting more',true); return; }
    if(myOpen(iss).length>=maxBooks()){ toast('You already have '+maxBooks()+' books out',true); return; }
    if(Object.values(reqs).some(r=>r.uid===STATE.user.id&&r.tid===tid&&['waiting','ready'].includes(r.st))){
      toast('You have already applied for this book',true); return; }
    await loadAvail(true);
    const free=availOf(tid)>0;
    const id=await newToken();
    const auto=!!STATE.cfg.autoApprove;
    const rec={ id, uid:STATE.user.id, name:STATE.user.name, tid, dt:Date.now(),
      st:free?'ready':'waiting', kind:STATE.user.kind,
      cls:STATE.user.class||'', sem:STATE.user.sem||'', phone:STATE.user.phone||'' };
    if(free) rec.exp=pickupDateFrom(STATE.cfg.pickupDays||2);
    const patch={};
    patch['library/requests/'+id]=rec;
    if(free) patch['library/avail/'+tid]=Math.max(0,availOf(tid)-1);
    await d2update(patch);
    _reqCache.at=0; await loadAvail(true);
    showApplied(id,tid,free,auto);
  }catch(e){ toast('Could not apply: '+e.message,true); }
  finally{ STATE.busy=false; }
}
async function cancelReq(id,tid,wasReady){
  try{
    const patch={}; patch['library/requests/'+id+'/st']='cancelled';
    if(wasReady) patch['library/avail/'+tid]=availOf(tid)+1;
    await d2update(patch); _reqCache.at=0; await loadAvail(true);
    toast('Request cancelled'); render();
  }catch(e){ toast('Failed: '+e.message,true); }
}
function showApplied(id,tid,free,auto){
  const t=STATE.titles[tid]||{name:''};
  const pk=STATE.cfg.pickupDays||2;
  const body=free
   ? `<div style="text-align:center"><div style="font-size:38px">✅</div>
      <div class="page-title" style="font-size:22px;margin:6px 0">READY TO COLLECT</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${esc(t.name)}</div></div>
      <div class="tok">${id}</div>
      <div class="mono" style="font-size:10px;color:var(--muted);text-align:center;margin-top:9px;line-height:1.6">
        Show this token at the library counter.<br>
        <span style="color:var(--warn)">Held for you for ${pk} days</span> — after that it passes to the next student.</div>
      <div class="card" style="margin-top:12px">
        <div class="stp dn"><span class="d"></span>Requested — token issued</div>
        <div class="stp cu"><span class="d"></span>Copy reserved at the counter</div>
        <div class="stp pd"><span class="d"></span>Collect &amp; get issued (${STATE.cfg.loanDays||7} days)</div>
        <div class="stp pd"><span class="d"></span>Return by due date</div></div>`
   : `<div style="text-align:center"><div style="font-size:34px">⏳</div>
      <div class="page-title" style="font-size:22px;margin:6px 0">YOU'RE IN THE QUEUE</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${esc(t.name)}</div></div>
      <div class="tok">${id}</div>
      <div class="card" style="margin-top:10px;text-align:center" id="qbox"><div class="mono" style="font-size:11px;color:var(--muted)">calculating position…</div></div>
      <div class="mono" style="font-size:10px;color:var(--muted);text-align:center;line-height:1.6">
        When a copy is returned it is held for #1 automatically.<br>You'll see it here when it's your turn.</div>`;
  sheet(body+`<button class="btn btn-full" style="margin-top:12px" onclick="closeSheet();render()">Done</button>`);
  if(!free) (async()=>{
    const reqs=await getRequests(true), iss=await getIssues(true);
    const p=qposOf(reqs,id,tid), n=queueFor(reqs,tid).length, e=etaFor(iss,tid,p);
    const b=document.getElementById('qbox'); if(!b) return;
    b.innerHTML=`<div class="qp">#${p}</div>
      <div class="mono" style="font-size:10px;color:var(--muted);margin-top:4px">of ${n} waiting · all ${(STATE.titles[tid]||{}).totalCopies||0} copies out</div>
      ${e!=null?`<div class="badge badge-warning" style="margin-top:8px">est. ~${e} days</div>`:''}`;
  })();
}

/* ═══ BOOK SHEET ═══ */
async function bookSheet(tid){
  const t=STATE.titles[tid]; if(!t) return;
  sheet('<div class="empty">Loading…</div>');
  const [reqs,iss]=await Promise.all([getRequests(),getIssues()]);
  const av=availOf(tid), q=queueFor(reqs,tid);
  const holders=Object.entries(iss||{}).filter(([i,x])=>x.tid===tid&&!x.ret);
  const mine=Object.entries(reqs||{}).find(([i,r])=>r.uid===STATE.user.id&&r.tid===tid&&['waiting','ready'].includes(r.st));
  const has=holders.some(([i,x])=>x.urn===STATE.user.id);
  const over=myOpen(iss).length>=maxBooks();
  const odn=myOverdue(iss).length;
  let btn;
  if(has) btn=`<button class="btn btn-full btn-ghost" disabled>Already with you</button>`;
  else if(mine) btn=`<button class="btn btn-full btn-ghost" disabled>Applied · ${esc(mine[0])}</button>`;
  /* v1.33: overdue outranks the maxBooks message — telling a blocked student
     "limit reached" when the real reason is an overdue book sends them to the
     wrong remedy. */
  else if(odn) btn=`<button class="btn btn-full btn-ghost" disabled style="border-color:rgba(239,68,68,.4);color:#fca5a5">Return your overdue book${odn>1?'s':''} first</button>`;
  else if(over) btn=`<button class="btn btn-full btn-ghost" disabled>Limit reached (${maxBooks()} books)</button>`;
  else if(av>0) btn=`<button class="btn btn-full" onclick="applyBook('${tid}')">Apply — copy available</button>`;
  else btn=`<button class="btn btn-full" style="background:var(--warn)" onclick="applyBook('${tid}')">Join queue — #${q.length+1}</button>`;
  sheet(`
    <div style="display:flex;gap:11px;margin-bottom:10px">${spine(t)}
      <div style="min-width:0"><div style="font-weight:700;font-size:15px;line-height:1.3">${esc(t.name)}</div>
      <div class="mono" style="font-size:10.5px;color:var(--muted);margin-top:3px">${esc(t.author||'')}</div>
      <div class="mono" style="font-size:10px;color:var(--muted)">${esc(t.publisher||'')} ${esc(t.year||'')}</div></div></div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">
      <span class="badge badge-sm ${av?'badge-ok':'badge-critical'}">${av}/${t.totalCopies||0} free</span>
      <span class="badge badge-sm badge-unknown">${esc(t.category||'')}</span>
      ${(t.courses||[]).map(c=>`<span class="badge badge-sm badge-unknown">${esc(c)}</span>`).join('')}
      ${(t.sems||[]).length?`<span class="badge badge-sm badge-unknown">Sem ${(t.sems||[]).join(',')}</span>`:''}
      ${q.length?`<span class="badge badge-sm badge-warning">${q.length} waiting</span>`:''}
      ${t.tagConf==='needs_review'&&isStaff()?`<span class="badge badge-sm badge-warning">needs tag</span>`:''}</div>
    ${t.variants&&isStaff()?`<div class="alert" style="font-size:10px">Merged from ${t.variants.length} spellings: ${t.variants.map(esc).join(' · ')}</div>`:''}
    ${isStaff()&&holders.length?`<div class="card"><h3>CURRENTLY WITH</h3>${holders.map(([i,x])=>{
      const d=x.due?daysLeft(x.due):null;
      return `<div class="rw"><div style="display:flex;gap:8px;align-items:center;min-width:0">${avatar(x.urn,x.name)}
        <div style="min-width:0"><div style="font-size:11.5px;font-weight:700">${esc(x.name)}</div>
        <div class="mono" style="font-size:9px;color:var(--muted)">${esc(x.urn)} · ${esc(x.acc)}</div></div></div>
        <span class="badge badge-sm ${d===null?'badge-unknown':d<0?'badge-critical':'badge-info'}">${d===null?'staff':d<0?(-d)+'d late':d+'d left'}</span></div>`;
    }).join('')}</div>`:''}
    ${isStu()
      ? (myOverdue(iss).length
          ? `<div class="alert alert-err">You have ${myOverdue(iss).length} overdue book(s) — fine ₹${myOverdue(iss).reduce((a,[i,x])=>a+fineOf(x.due),0)} and counting. Return ${myOverdue(iss).length>1?'them':'it'} to borrow again.</div>`
          : `<div class="alert">Loan ${STATE.cfg.loanDays||7} days · fine ₹${STATE.cfg.finePerDay||5}/day · max ${maxBooks()} books. You have ${myOpen(iss).length}/${maxBooks()} out.${STATE.cfg.replaceCost?`<div style="margin-top:4px;font-size:10.5px;color:var(--muted)">Lost or damaged book: replacement charge ₹${STATE.cfg.replaceCost}.</div>`:''}</div>`)
      : `<div class="alert">Staff loan — <b>no limit, no fine, no due date.</b> Same catalogue; availability still applies.</div>`}
    ${btn}
    ${canCirc()?`<button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="editBook('${tid}')">✏️ Edit book &amp; copies</button>`:''}
    <button class="btn btn-full btn-ghost" style="margin-top:7px" onclick="closeSheet()">Close</button>`);
}
function spine(t){
  const h=hueOf(t.name||'x');
  return `<div style="width:36px;height:50px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:18px;color:#000;background:linear-gradient(160deg,hsl(${h},55%,63%),hsl(${h},50%,45%))">${esc((t.name||'?').charAt(0).toUpperCase())}</div>`;
}
</script>
<script>
/* ═══ VIEWS: BROWSE ═══════════════════════════════════════════════════════
   courses[] is a DEFAULT VIEW, never a restriction — any student may borrow any
   book. "My Course" is just the useful default; "All Books" is one tap away. */
/* v1.09: three independent dropdowns replace the chip strip — a catalogue is
   not only course/sem material (general reading, reference, competitive exam
   books need a home too). Every option is pulled live from the catalogue, so
   nothing appears until at least one book actually uses it, and a brand-new
   category/course typed into Add Book shows up on the next render via
   refreshFilterOptions() rather than needing a reload. */
function refreshFilterOptions(){
  const co=new Set(), ca=new Set(), se=new Set();
  Object.values(STATE.titles).forEach(t=>{
    if(t.status==='merged'||t.status==='retired') return;
    (t.courses||[]).forEach(c=>c&&co.add(c));
    if(t.category) ca.add(t.category);
    (t.sems||[]).forEach(s=>s&&se.add(s));
  });
  STATE.optCourses=Array.from(co).sort();
  STATE.optCats=Array.from(ca).sort();
  /* v1.15: seed 1-6 as a floor regardless of what's currently tagged — a
     dropdown built only from existing data can't offer Sem 6 before any book
     happens to be tagged Sem 6, which is backwards for a semester selector. */
  [1,2,3,4,5,6].forEach(n=>se.add(n));
  STATE.optSems=Array.from(se).sort((a,b)=>a-b);
}
/* ═══ PICKER — chips of existing values + "Add new" reveals a text box.
   Used for Category (single) and Courses/Semesters (multi) in both Edit Book
   and Tag Review, so tagging can't fragment the same course into "BEd"/"B.Ed"/
   "Bed" by hand-typing — pick the existing chip, or explicitly add a new one. */
function picker(id,opts,selected,multi){
  const sel=new Set((Array.isArray(selected)?selected:[selected]).filter(Boolean).map(String));
  const chips=opts.map(o=>`<button type="button" class="cc ${sel.has(String(o))?'on':''}" onclick="pickerToggle('${id}','${esc(o)}',${!!multi})">${esc(o)}</button>`).join('');
  return `<div id="pk-${id}" data-multi="${multi?1:0}" style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
    ${chips}
    <button type="button" class="cc" onclick="pickerAddNew('${id}')">+ Add new</button>
    <input id="pk-new-${id}" placeholder="Type new…" style="display:none;width:120px;font-size:11px;padding:5px 8px" onkeydown="if(event.key==='Enter'){event.preventDefault();pickerCommitNew('${id}')}" onblur="pickerCommitNew('${id}')">
  </div>`;
}
function pickerToggle(id,val,multi){
  const el=document.getElementById('pk-'+id); if(!el) return;
  const btns=el.querySelectorAll('.cc');
  btns.forEach(b=>{
    if(b.textContent.trim()===val){
      if(multi) b.classList.toggle('on');
      else { btns.forEach(x=>x!==b&&x.textContent.trim()!=='+ Add new'&&x.classList.remove('on')); b.classList.toggle('on'); }
    }
  });
  /* v1.24: single-select has nothing left to choose once one option is
     picked — auto-close the expand panel if this cell uses that pattern. */
  if(!multi){ el.classList.add('hide'); }
}
function pickerAddNew(id){
  const inp=document.getElementById('pk-new-'+id);
  if(inp){ inp.style.display='inline-block'; inp.focus(); }
}
function pickerCommitNew(id){
  const inp=document.getElementById('pk-new-'+id);
  const v=(inp.value||'').trim();
  if(!v){ inp.style.display='none'; return; }
  const el=document.getElementById('pk-'+id);
  const multi=el.getAttribute('data-multi')==='1';
  if(!multi) el.querySelectorAll('.cc.on').forEach(b=>b.classList.remove('on'));
  const btn=document.createElement('button');
  btn.type='button'; btn.className='cc on'; btn.textContent=v;
  btn.onclick=()=>pickerToggle(id,v,multi);
  el.insertBefore(btn,el.querySelector('.cc:last-of-type').nextSibling);
  inp.value=''; inp.style.display='none';
}
function pickerValue(id,multi){
  const el=document.getElementById('pk-'+id); if(!el) return multi?[]:'';
  const on=Array.from(el.querySelectorAll('.cc.on')).map(b=>b.textContent.trim());
  return multi?on:(on[0]||'');
}
const KNOWN_COURSES=['BCA','BCom','BBA','BBM','BEd','PUC'];
function courseTokenOf(cls){
  const s=String(cls||'').toUpperCase();
  return KNOWN_COURSES.find(c=>s.includes(c.toUpperCase()))||'';
}
function viewBrowse(){
  if(!STATE.optCourses) refreshFilterOptions();
  const q=(STATE.query||'').toLowerCase();
  const myTok=isStu()?courseTokenOf(STATE.user.class):'';
  if(STATE.fCourse===undefined) STATE.fCourse=myTok||'';
  const fCourse=STATE.fCourse, fCat=STATE.fCat||'', fSem=STATE.fSem||'';
  let L=Object.entries(STATE.titles).filter(([i,t])=>t.status!=='merged'&&t.status!=='retired');
  if(fCourse) L=L.filter(([i,t])=>(t.courses||[]).includes(fCourse));
  if(fCat) L=L.filter(([i,t])=>t.category===fCat);
  if(fSem) L=L.filter(([i,t])=>(t.sems||[]).map(String).includes(String(fSem)));
  if(q) L=L.filter(([i,t])=>((t.name||'')+' '+(t.author||'')).toLowerCase().includes(q));
  /* v1.01: also match an accession or local register number typed straight in */
  if(q && !L.length && STATE.accIdx){
    const hit=STATE.accIdx[q]||STATE.accIdx[q.toUpperCase()];
    if(hit&&STATE.titles[hit]) L=[[hit,STATE.titles[hit]]];
  }
  const rows=L.slice(0,60).map(([i,t],idx)=>{
    const av=availOf(i);
    return `<div class="bkrow" onclick="bookSheet('${i}')">${spine(t)}
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px;line-height:1.3"><span class="mono" style="color:var(--muted);font-size:10.5px;font-weight:400">${idx+1}.</span> ${esc(t.name)}</div>
        <div class="mono" style="font-size:10px;color:var(--muted);margin-top:2px">${esc(t.author||'')}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px">
          <span class="badge badge-sm ${av?'badge-ok':'badge-critical'}">${av?av+'/'+(t.totalCopies||0)+' free':'all out'}</span>
          <span class="badge badge-sm badge-unknown">${esc(t.category||'')}</span></div></div>
      <button class="btn btn-sm ${av?'':'btn-ghost'}">${av?'Apply':'Queue'}</button></div>`;
  }).join('');
  const selOpt=(opts,cur,allLabel)=>`<option value="">${allLabel}</option>`+opts.map(o=>`<option value="${esc(o)}" ${String(o)===String(cur)?'selected':''}>${esc(o)}</option>`).join('');
  return `
    <div style="position:sticky;top:0;background:var(--bg);z-index:5;padding-bottom:9px">
      <input id="q" placeholder="Search title, author, or accession no…" value="${esc(STATE.query||'')}" oninput="onSearch(this.value)">
      <div style="display:flex;gap:6px;margin-top:8px">
        <select style="flex:1" onchange="STATE.fCourse=this.value;render()">${selOpt(STATE.optCourses,fCourse,isStu()?'All Courses':'Course: All')}</select>
        <select style="flex:1" onchange="STATE.fCat=this.value;render()">${selOpt(STATE.optCats,fCat,'Category: All')}</select>
        <select style="flex:1" onchange="STATE.fSem=this.value;render()">${selOpt(STATE.optSems,fSem,'Sem: All')}</select>
      </div>
    </div>
    ${isStu()&&fCourse&&fCourse===myTok?`<div class="alert">Showing <b>${esc(myTok)}</b> books by default. Change the Course dropdown to see other courses, or set it to <b>All Courses</b> — you can borrow any book regardless of what it's tagged for.</div>`:''}
    ${canCirc()?`<button class="btn btn-full" style="margin-bottom:10px" onclick="addBook()">➕ Add New Book</button>`:''}
    <div class="mono" style="font-size:9.5px;color:var(--muted);margin-bottom:7px">${L.length} TITLES${L.length>60?' · showing first 60, refine search or filters':''}</div>
    ${rows||'<div class="empty">NOTHING FOUND — try All Courses / All Categories</div>'}`;
}
function onSearch(v){
  STATE.query=v;
  clearTimeout(window._sT);
  window._sT=setTimeout(()=>{
    render();
    const e=document.getElementById('q');
    if(e){ e.focus(); e.setSelectionRange(e.value.length,e.value.length); }
  },220);
}

/* ═══ VIEWS: MY BOOKS ═══ */
async function viewMine(){
  const [reqs,iss]=await Promise.all([getRequests(true),getIssues(true)]);
  const my=myOpen(iss);
  const mr=Object.entries(reqs||{}).filter(([i,r])=>r.uid===STATE.user.id&&['waiting','ready'].includes(r.st));
  const cards=mr.map(([id,r])=>{
    const t=STATE.titles[r.tid]||{name:'(unknown)'};
    if(r.st==='ready'){
      const d=r.exp?daysLeft(r.exp):0;
      return `<div class="card" style="border-color:rgba(34,197,94,.4)">
        <h3>✅ READY TO COLLECT <span class="badge badge-ok badge-sm">${d}d left</span></h3>
        <div style="font-size:13px;font-weight:700">${esc(t.name)}</div>
        <div class="tok" style="margin-top:9px">${esc(id)}</div>
        ${r.appt?`<div style="background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.35);border-radius:8px;padding:9px;margin-top:9px;text-align:center">
          <div class="mono" style="font-size:9px;color:var(--muted);letter-spacing:1px">📅 COLLECT AT</div>
          <div style="font-family:var(--head);font-size:19px;letter-spacing:1px;color:var(--ok);margin-top:2px">${esc(apptLine(r.appt))}</div>
          ${r.appt.note?`<div class="mono" style="font-size:9.5px;color:var(--muted);margin-top:3px">${esc(r.appt.note)}</div>`:''}</div>`
        :`<div class="mono" style="font-size:10px;color:var(--muted);text-align:center;margin-top:7px">Show at counter before <b>${fmt(r.exp)}</b></div>`}
        <button class="btn btn-sm btn-ghost btn-full" style="margin-top:9px" onclick="cancelReq('${id}','${r.tid}',true)">Cancel</button></div>`;
    }
    const p=qposOf(reqs,id,r.tid), n=queueFor(reqs,r.tid).length, e=etaFor(iss,r.tid,p);
    return `<div class="card"><h3>⏳ IN QUEUE <span class="badge badge-warning badge-sm">#${p} of ${n}</span></h3>
      <div style="font-size:13px;font-weight:700">${esc(t.name)}</div>
      <div class="mono" style="font-size:9.5px;color:var(--muted);margin-top:4px">${esc(id)} · applied ${fmt(r.dt)}${e!=null?' · est ~'+e+'d':''}</div>
      <button class="btn btn-sm btn-ghost" style="margin-top:9px" onclick="cancelReq('${id}','${r.tid}',false)">Cancel request</button></div>`;
  }).join('');
  const rows=my.map(([id,x])=>{
    const t=STATE.titles[x.tid]||{name:'(unknown)'};
    const d=x.due?daysLeft(x.due):null, f=x.due?fineOf(x.due):0;
    return `<div class="rw"><div style="min-width:0">
      <div style="font-size:12px;font-weight:700">${esc(t.name)}</div>
      <div class="mono" style="font-size:9px;color:var(--muted)">${esc(x.acc)} · taken ${fmt(x.out)}</div></div>
      <div style="text-align:right"><span class="badge badge-sm ${d===null?'badge-unknown':x.recalled?'badge-critical':d<0?'badge-critical':d<=2?'badge-warning':'badge-ok'}">${d===null?'no due':x.recalled?'RETURN NOW':d<0?(-d)+'d LATE':d+'d left'}</span>
      ${x.due?`<div class="mono" style="font-size:8.5px;color:var(--muted);margin-top:3px">due ${dueLong(x.due)}</div>`:''}
      ${f?`<div class="mono" style="font-size:9.5px;color:var(--danger);margin-top:3px">fine so far ₹${f} · growing ₹${STATE.cfg.finePerDay||5}/day</div>`:''}</div></div>`;
  }).join('');
  /* v1.33: overdue banner — states the fine, that it is still growing, and that
     borrowing is blocked. Mirrors the student_portal Library panel banner. */
  const od=myOverdue(iss);
  const odFine=od.reduce((a,[i,x])=>a+fineOf(x.due),0);
  /* Lost/damaged close-outs from this AY — they left myOpen() by design, but
     the student still needs to see what happened and what it cost. */
  const lost=Object.entries(iss||{}).filter(([i,x])=>x.urn===STATE.user.id&&x.outcome)
    .sort((a,b)=>b[1].ret-a[1].ret);
  const lostCard=lost.length?`<div class="card" style="border-color:rgba(245,158,11,.4)">
    <h3 style="color:#fbbf24">📕 LOST / DAMAGED <span class="badge badge-warning badge-sm">${lost.length}</span></h3>
    <div class="mono" style="font-size:10px;color:var(--muted);margin-bottom:9px;line-height:1.5">Closed by the library. Settle any replacement charge at the desk — bring your URN.</div>
    ${lost.map(([id,x])=>{
      const t=STATE.titles[x.tid]||{name:'(unknown)'};
      return `<div class="rw"><div style="min-width:0">
        <div style="font-size:12px;font-weight:700">${esc(t.name)}</div>
        <div class="mono" style="font-size:9px;color:var(--muted)">${esc(x.acc)} · marked ${esc(x.outcome)} ${fmt(x.ret)}</div>
        ${x.lostNote?`<div class="mono" style="font-size:9px;color:var(--muted)">${esc(x.lostNote)}</div>`:''}</div>
      <span class="badge badge-sm badge-warning" style="flex-shrink:0">${x.replaceCost?'₹'+x.replaceCost:'no charge'}</span></div>`;
    }).join('')}</div>`:'';
  const odBanner=od.length?`<div class="card" style="border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.08)">
    <h3 style="color:#f87171">⚠️ ${od.length} BOOK${od.length>1?'S':''} OVERDUE</h3>
    <div style="font-size:11.5px;color:var(--muted);line-height:1.6">
      Please return ${od.length>1?'them':'it'} at the library desk.
      Fine so far <b style="color:#f87171">₹${odFine}</b> (₹${STATE.cfg.finePerDay||5}/day, still counting).<br>
      You cannot request new books until ${od.length>1?'they are':'it is'} returned.</div></div>`:'';
  return `${odBanner}${lostCard}${cards}<div class="card"><h3>📗 WITH ME <span class="badge badge-unknown badge-sm">${my.length}${isStu()?'/'+maxBooks():''}</span></h3>
    ${rows||'<div class="empty">NO BOOKS ISSUED</div>'}</div>`;
}

/* ═══ VIEWS: HISTORY — AY + sem stamped at issue time, never recomputed ═══ */
async function viewHistory(urn,who){
  const id=urn||STATE.user.id;
  const idx=await d2get('library/byUrn/'+id);
  if(!idx||!Object.keys(idx).length) return `<div class="empty">NO LIBRARY HISTORY YET</div>`;
  const iss=await getIssues();
  const groups=[];
  Object.entries(idx).forEach(([ay,sems])=>{
    Object.entries(sems||{}).forEach(([sem,list])=>{
      const items=Object.keys(list||{}).map(k=>iss[k]).filter(Boolean);
      if(items.length) groups.push({ay,sem,items});
    });
  });
  groups.sort((a,b)=> b.ay.localeCompare(a.ay) || Number(b.sem)-Number(a.sem));
  const tot=groups.reduce((a,g)=>a+g.items.length,0);
  const mx=Math.max(1,...groups.map(g=>g.items.length));
  const paid=groups.reduce((a,g)=>a+g.items.reduce((x,i)=>x+(i.fine||0),0),0);
  const open=Object.values(iss||{}).filter(i=>i.urn===id&&!i.ret).length;
  return `<div class="kp">
      <div class="stat-box"><div class="stat-label">Total</div><div class="stat-value">${tot}</div></div>
      <div class="stat-box"><div class="stat-label">Out now</div><div class="stat-value" style="color:var(--blue)">${open}</div></div>
      <div class="stat-box"><div class="stat-label">Fines</div><div class="stat-value" style="color:var(--ok)">₹${paid}</div></div></div>
    <div class="card"><h3>📅 SEM BY SEM${who?' · '+esc(who):''}</h3>
    ${groups.map(g=>{
      const k=g.ay+'|'+g.sem, open=STATE.selSem===k;
      return `<div><div style="display:flex;align-items:center;gap:9px;padding:7px 0;cursor:pointer" onclick="STATE.selSem=${open?'null':`'${k}'`};render()">
        <span class="mono" style="font-size:10px;color:var(--muted);width:104px;flex-shrink:0">${esc(g.ay)} · SEM ${esc(g.sem)}</span>
        <div class="bar-wrap"><div class="bar" style="width:${g.items.length/mx*100}%"></div></div>
        <span class="badge badge-sm badge-unknown">${g.items.length}</span></div>
        ${open?`<table style="width:100%;border-collapse:collapse;font-size:11px;margin:2px 0 9px">${g.items.map(i=>{
          const t=STATE.titles[i.tid]||{name:'(unknown)'};
          return `<tr><td style="padding:6px 3px;border-bottom:1px solid var(--border);max-width:150px">${esc(t.name)}</td>
            <td class="mono" style="padding:6px 3px;border-bottom:1px solid var(--border);color:var(--muted);white-space:nowrap">${fmt(i.out)}→${i.ret?fmt(i.ret):'—'}</td>
            <td style="padding:6px 3px;border-bottom:1px solid var(--border);text-align:right">${i.outcome
              ?`<span class="badge badge-sm badge-warning">${esc(i.outcome)}${i.replaceCost?' ₹'+i.replaceCost:''}</span>`
              :`<span class="badge badge-sm ${i.fine?'badge-critical':'badge-ok'}">${i.fine?'₹'+i.fine:(i.ret?Math.round((i.ret-i.out)/864e5)+'d':'out')}</span>`}</td></tr>`;
        }).join('')}</table>`:''}</div>`;
    }).join('')}</div>`;
}
</script>
<script>
/* ═══ DESK — issue / return ════════════════════════════════════════════════
   Every circulation action stamps byStaff so an absent librarian's cover is
   auditable. Copy status is the source of truth; avail is a derived counter
   that Recount can rebuild if it ever drifts. */
async function viewDesk(){
  const reqs=await getRequests(true);
  await sweepExpired(reqs);
  const r2=await getRequests(true);
