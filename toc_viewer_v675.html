function buildSidebar() {
  const sb = document.getElementById('sidebar');
  SECTIONS.forEach((s, i) => {
    const parts = s.name.split(' ');
    const id = parts[0]; 
    const label = parts.slice(1).join(' ');
    const div = document.createElement('div');
    div.className = 'sec-link';
    div.id = 'sb-' + i;
    div.innerHTML = `<span class="sec-id">${id}</span> ${label.substring(0,30)}${label.length>30?'…':''} <span class="sec-line">~${s.line}</span>`;
    div.onclick = () => scrollToSection(i);
    sb.appendChild(div);
  });
}

function buildCards() {
  const container = document.getElementById('cards-container');
  SECTIONS.forEach((s, i) => {
    const parts = s.name.split(/\s(.+)/);
    const id = parts[0];
    const title = parts[1] || '';
    const span = (s.end || 0) - s.line;
    
    const card = document.createElement('div');
    card.className = 'sec-card';
    card.id = 'sec-' + i;
    
    const fnRows = s.funcs.map(fn => 
      `<div class="fn-row" data-fn="${fn.name.toLowerCase()}">
        <span class="fn-dot">·</span>
        <span class="fn-name">${fn.name}</span>
        <span class="fn-line">${fn.line}</span>
       </div>`
    ).join('');
    
    card.innerHTML = `
      <div class="sec-card-header" onclick="toggleCard(${i})">
        <span class="sec-badge">${id}</span>
        <span class="sec-title">${title}</span>
        <span class="sec-meta">${s.funcs.length} fn</span>
        <span class="sec-line-num">~${s.line}</span>
        <span class="sec-chevron">▾</span>
      </div>
      <div class="fn-grid">${fnRows}</div>
    `;
    container.appendChild(card);
  });
}

function toggleCard(i) {
  const card = document.getElementById('sec-' + i);
  card.classList.toggle('collapsed');
}

function expandAll() {
  document.querySelectorAll('.sec-card').forEach(c => c.classList.remove('collapsed'));
}

function collapseAll() {
  document.querySelectorAll('.sec-card').forEach(c => c.classList.add('collapsed'));
}

function scrollToSection(i) {
  const card = document.getElementById('sec-' + i);
  card.classList.remove('collapsed');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.sec-link').forEach(l => l.classList.remove('active'));
  document.getElementById('sb-' + i).classList.add('active');
}

function doSearch(q) {
  q = q.toLowerCase().trim();
  SECTIONS.forEach((s, i) => {
    const card = document.getElementById('sec-' + i);
    if (!q) {
      card.classList.remove('no-match');
      card.querySelectorAll('.fn-row').forEach(r => { r.classList.remove('dimmed','matched'); });
      return;
    }
    const sectionMatch = s.name.toLowerCase().includes(q);
    let anyFnMatch = false;
    card.querySelectorAll('.fn-row').forEach(r => {
      const fn = r.dataset.fn;
      if (fn.includes(q) || sectionMatch) {
        r.classList.remove('dimmed');
        r.classList.add('matched');
        anyFnMatch = true;
      } else {
        r.classList.add('dimmed');
        r.classList.remove('matched');
      }
    });
    if (sectionMatch || anyFnMatch) {
      card.classList.remove('no-match');
      card.classList.remove('collapsed');
    } else {
      card.classList.add('no-match');
    }
  });
}

function showCopyPanel() {
  const panel = document.getElementById('copyPanel');
  document.getElementById('tocText').value = TOC_TEXT;
  panel.style.display = '';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function hideCopyPanel() {
  document.getElementById('copyPanel').style.display = 'none';
}

function copyTOC() {
  const ta = document.getElementById('tocText');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const toast = document.getElementById('copyToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  });
}

// Init
buildSidebar();
buildCards();

// Collapse large sections by default (>30 funcs)
SECTIONS.forEach((s, i) => {
  if (s.funcs.length > 30) {
    document.getElementById('sec-' + i).classList.add('collapsed');
  }
});
